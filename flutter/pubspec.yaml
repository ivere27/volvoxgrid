name: volvoxgrid
description: VolvoxGrid pixel-rendering grid widget for Flutter
version: 0.7.0
homepage: https://github.com/ivere27/volvoxgrid
repository: https://github.com/ivere27/volvoxgrid/tree/main/flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  fixnum: ^1.1.0
  protobuf: ^6.0.0
  synurang: 0.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  ffigen: ^9.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.github.ivere27.volvoxgrid
        ffiPlugin: true
        pluginClass: VolvoxGridPlugin
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
