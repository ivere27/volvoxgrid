# FFI generation config for VolvoxGrid Flutter plugin.
#
# This generates low-level Dart FFI bindings from the Synurang C header that
# the volvoxgrid_plugin cdylib exports.  The generated bindings are consumed
# by the `synurang` Dart package (which already wraps them); this config is
# provided for completeness and for regenerating if the C ABI changes.
#
# Run:  dart run ffigen --config ffigen.yaml

name: VolvoxGridBindings
description: FFI bindings for VolvoxGrid Synurang plugin
output: 'lib/src/generated/volvoxgrid_bindings_generated.dart'

headers:
  entry-points:
    # The Synurang plugin C header exposes the standard symbols:
    #   Synurang_Invoke_VolvoxGridService
    #   Synurang_Free
    #   Synurang_Stream_VolvoxGridService_Open
    #   Synurang_Stream_Send
    #   Synurang_Stream_Recv
    #   Synurang_Stream_CloseSend
    #   Synurang_Stream_Close
    - '../../plugin/src/volvoxgrid_ffi_plugin.h'

  include-directives:
    - '../../plugin/src/volvoxgrid_ffi_plugin.h'

functions:
  include:
    - 'Synurang_.*'

structs:
  include:
    - 'FfiData'

compiler-opts:
  - '-I../../plugin/src'

preamble: |
  // AUTO GENERATED FILE, DO NOT EDIT.
  // Generated by `package:ffigen`.
  // ignore_for_file: type=lint
