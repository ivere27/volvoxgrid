    BeforeDataRefreshEvent  before_data_refresh    = 54;
    AfterDataRefreshEvent   after_data_refresh     = 55;
    FilterDataEvent         filter_data            = 56;
    ErrorEvent              error                  = 57;
    BeforePageBreakEvent    before_page_break      = 58;
    StartPageEvent          start_page             = 59;
    GetHeaderRowEvent       get_header_row         = 60;
  }
}

