  rpc SetPictureType(SetInt32Prop)          returns (Empty);
  rpc GetPictureType(GridHandle)            returns (Int32Value);
  rpc SetDataMode(SetInt32Prop)             returns (Empty);
  rpc GetDataMode(GridHandle)               returns (Int32Value);
  rpc SetVirtualData(SetBoolProp)           returns (Empty);
  rpc GetVirtualData(GridHandle)            returns (BoolValue);
  rpc SetColData(SetColDataRequest)         returns (Empty);
  rpc GetColData(GetColDataRequest)         returns (ColDataValue);
