  rpc SetColSel(SetColSelRequest)           returns (Empty);
  rpc Select(SelectRequest)                 returns (Empty);
  rpc GetSelection(GridHandle)              returns (SelectionRange);
  rpc ShowCell(ShowCellRequest)             returns (Empty);
