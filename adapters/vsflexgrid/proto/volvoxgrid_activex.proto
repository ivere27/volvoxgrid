syntax = "proto3";
package volvoxgrid.activex;

option go_package = "github.com/ivere27/synurang/volvoxgrid/api";
option java_package = "io.github.ivere27.volvoxgrid";
option java_multiple_files = true;

import "activex.proto";

// ═══════════════════════════════════════════════════════════
// Enums
// ═══════════════════════════════════════════════════════════

enum SelectionMode {
  SELECTION_FREE       = 0;
  SELECTION_BY_ROW     = 1;
  SELECTION_BY_COLUMN  = 2;
  SELECTION_LISTBOX    = 3;
}

enum FocusRectStyle {
  FOCUS_NONE           = 0;
  FOCUS_LIGHT          = 1;
  FOCUS_HEAVY          = 2;
  FOCUS_INSET          = 3;
  FOCUS_RAISED         = 4;
}

enum HighLightStyle {
  HIGHLIGHT_NEVER      = 0;
  HIGHLIGHT_ALWAYS     = 1;
  HIGHLIGHT_WITH_FOCUS = 2;
}

enum EditableMode {
  EDITABLE_NONE        = 0;
  EDITABLE_KBD         = 1;
  EDITABLE_KBD_MOUSE   = 2;
}

enum ShowComboButtonMode {
  COMBO_BUTTON_NEVER   = 0;
  COMBO_BUTTON_ALWAYS  = 1;
  COMBO_BUTTON_EDITING = 2;
}

enum TabBehavior {
  TAB_CONTROLS         = 0;
  TAB_CELLS            = 1;
}

// VSFlexGrid-style combined sort choice carried across COM.
//
// The COM enum stays legacy-shaped in `VolvoxGrid.idl`, but the ActiveX bridge
// uses neutral internal names so it does not mirror the removed core proto
// values directly.
enum FlexSortSpec {
  FLEX_SORT_NONE                    = 0;
  FLEX_SORT_ASCENDING_AUTO          = 1;
  FLEX_SORT_DESCENDING_AUTO         = 2;
  FLEX_SORT_ASCENDING_NUMERIC       = 3;
  FLEX_SORT_DESCENDING_NUMERIC      = 4;
  FLEX_SORT_ASCENDING_STRING_NOCASE = 5;
  FLEX_SORT_DESCENDING_STRING_NOCASE = 6;
  FLEX_SORT_ASCENDING_STRING        = 7;
  FLEX_SORT_DESCENDING_STRING       = 8;
  FLEX_SORT_CUSTOM                  = 9;
  FLEX_SORT_USE_COLUMN              = 10;
}

enum ExplorerBarMode {
  EXPLORER_NONE        = 0;
  EXPLORER_SORT        = 1;
  EXPLORER_MOVE        = 2;
  EXPLORER_SORT_MOVE   = 3;
  EXPLORER_SORT_SHOW   = 5;
  EXPLORER_MOVE_SHOW   = 6;
  EXPLORER_SORT_MOVE_SHOW = 7;
}

enum MergeCellsMode {
  MERGE_NEVER              = 0;
  MERGE_FREE               = 1;
  MERGE_RESTRICT_ROWS      = 2;
  MERGE_RESTRICT_COLS      = 3;
  MERGE_RESTRICT_ALL       = 4;
  MERGE_FIXED_ONLY         = 5;
  MERGE_SPILL              = 6;
  MERGE_OUTLINE            = 7;
}

enum OutlineBarStyle {
  OUTLINE_NONE             = 0;
  OUTLINE_SIMPLE           = 1;
  OUTLINE_SIMPLE_LEAF      = 2;
  OUTLINE_COMPLETE         = 3;
  OUTLINE_COMPLETE_LEAF    = 4;
}

enum SubtotalPosition {
  SUBTOTAL_ABOVE       = 0;
  SUBTOTAL_BELOW       = 1;
}

enum AggregateType {
  AGG_NONE             = 0;
  AGG_CLEAR            = 1;
  AGG_SUM              = 2;
  AGG_PERCENT          = 3;
  AGG_COUNT            = 4;
  AGG_AVERAGE          = 5;
  AGG_MAX              = 6;
  AGG_MIN              = 7;
  AGG_STD_DEV          = 8;
  AGG_VAR              = 9;
}

enum GridLinesMode {
  GRID_NONE            = 0;
  GRID_FLAT            = 1;
  GRID_INSET           = 2;
  GRID_RAISED          = 3;
  GRID_FLAT_HORZ       = 4;
  GRID_FLAT_VERT       = 5;
  GRID_INSET_HORZ      = 6;
  GRID_INSET_VERT      = 7;
  GRID_RAISED_HORZ     = 8;
  GRID_RAISED_VERT     = 9;
}

enum TextStyleMode {
  TEXT_FLAT             = 0;
  TEXT_RAISED           = 1;
  TEXT_INSET            = 2;
  TEXT_RAISED_LIGHT     = 3;
  TEXT_INSET_LIGHT      = 4;
}

// Text rasterization mode for cross-platform clarity control.
//
// NOTE:
// - AUTO chooses the backend/platform default.
// - GRAYSCALE uses standard anti-aliased glyphs.
// - SUBPIXEL favors LCD-like subpixel rendering where supported.
// - MONO favors pixel-sharp monochrome output (legacy/crisp look).
enum TextRenderMode {
  TEXT_RENDER_AUTO      = 0;
  TEXT_RENDER_GRAYSCALE = 1;
  TEXT_RENDER_SUBPIXEL  = 2;
  TEXT_RENDER_MONO      = 3;
}

// Font hinting strategy for text rasterization.
//
// This is intentionally advisory: backends may approximate unsupported modes.
enum TextHintingMode {
  TEXT_HINT_AUTO        = 0;
  TEXT_HINT_NONE        = 1;
  TEXT_HINT_SLIGHT      = 2;
  TEXT_HINT_FULL        = 3;
}

enum ColDataType {
  COL_DATA_STRING      = 0;
  COL_DATA_NUMBER      = 1;
  COL_DATA_DATE        = 2;
  COL_DATA_BOOLEAN     = 3;
  COL_DATA_CURRENCY    = 4;
}

enum Align {
  ALIGN_LEFT_TOP       = 0;
  ALIGN_LEFT_CENTER    = 1;
  ALIGN_LEFT_BOTTOM    = 2;
  ALIGN_CENTER_TOP     = 3;
  ALIGN_CENTER_CENTER  = 4;
  ALIGN_CENTER_BOTTOM  = 5;
  ALIGN_RIGHT_TOP      = 6;
  ALIGN_RIGHT_CENTER   = 7;
  ALIGN_RIGHT_BOTTOM   = 8;
  ALIGN_GENERAL        = 9;
}

enum PictureAlignment {
  PIC_ALIGN_LEFT_TOP       = 0;
  PIC_ALIGN_LEFT_CENTER    = 1;
  PIC_ALIGN_LEFT_BOTTOM    = 2;
  PIC_ALIGN_CENTER_TOP     = 3;
  PIC_ALIGN_CENTER_CENTER  = 4;
  PIC_ALIGN_CENTER_BOTTOM  = 5;
  PIC_ALIGN_RIGHT_TOP      = 6;
  PIC_ALIGN_RIGHT_CENTER   = 7;
  PIC_ALIGN_RIGHT_BOTTOM   = 8;
  PIC_ALIGN_STRETCH        = 9;
  PIC_ALIGN_TILE           = 10;
}

enum CellPropertyType {
  CELL_TEXT             = 0;
  CELL_TEXT_STYLE       = 1;
  CELL_ALIGNMENT        = 2;
  CELL_PICTURE          = 3;
  CELL_PICTURE_ALIGNMENT = 4;
  CELL_CHECKED          = 5;
  CELL_BACK_COLOR       = 6;
  CELL_FORE_COLOR       = 7;
  CELL_FLOOD_COLOR      = 8;
  CELL_FLOOD_PERCENT    = 9;
  CELL_FONT_NAME        = 10;
  CELL_FONT_SIZE        = 11;
  CELL_FONT_BOLD        = 12;
  CELL_FONT_ITALIC      = 13;
  CELL_FONT_UNDERLINE   = 14;
  CELL_FONT_STRIKETHROUGH = 15;
  CELL_FONT_WIDTH       = 16;
  CELL_VALUE            = 17;
  CELL_DATA             = 18;
  CELL_CUSTOM_FORMAT    = 19;
  CELL_LEFT             = 20;
  CELL_TOP              = 21;
  CELL_WIDTH            = 22;
  CELL_HEIGHT           = 23;
  CELL_BUTTON_PICTURE   = 24;
  CELL_COMBO_LIST       = 25;
}

enum AutoSizeMode {
  AUTOSIZE_BOTH_WAYS   = 0;
  AUTOSIZE_COL_WIDTH   = 1;
  AUTOSIZE_ROW_HEIGHT  = 2;
}

enum AutoSearchMode {
  AUTOSEARCH_NONE      = 0;
  AUTOSEARCH_FROM_TOP  = 1;
  AUTOSEARCH_FROM_CURSOR = 2;
}

enum ScrollBarsMode {
  SCROLLBAR_NONE       = 0;
  SCROLLBAR_HORIZONTAL = 1;
  SCROLLBAR_VERTICAL   = 2;
  SCROLLBAR_BOTH       = 3;
}

enum SaveGridFormat {
  SAVE_BINARY          = 0;
  SAVE_TEXT_TAB        = 1;
  SAVE_TEXT_COMMA      = 2;
  SAVE_TEXT_CUSTOM     = 3;
  SAVE_EXCEL           = 4;
}

enum SaveGridScope {
  SAVE_ALL             = 0;
  SAVE_DATA_ONLY       = 1;
  SAVE_FORMAT_ONLY     = 2;
}

enum DragMode {
  DRAG_NONE            = 0;
  DRAG_MANUAL          = 1;
  DRAG_AUTOMATIC       = 2;
}

enum DropMode {
  DROP_NONE            = 0;
  DROP_MANUAL          = 1;
  DROP_AUTOMATIC       = 2;
}

enum PrintOrientation {
  PRINT_PORTRAIT       = 0;
  PRINT_LANDSCAPE      = 1;
}

enum OwnerDrawMode {
  OWNERDRAW_NEVER      = 0;
  OWNERDRAW_CELL       = 1;
  OWNERDRAW_COMPLETE   = 2;
}

enum BorderStyle {
  BORDER_NONE          = 0;
  BORDER_THIN          = 1;
  BORDER_THICK         = 2;
  BORDER_DOTTED        = 3;
  BORDER_DASHED        = 4;
  BORDER_DOUBLE        = 5;
  BORDER_RAISED        = 6;
  BORDER_INSET         = 7;
}

enum FillStyle {
  FILL_SINGLE          = 0;
  FILL_REPEAT          = 1;
}

enum ClearScope {
  CLEAR_EVERYTHING     = 0;
  CLEAR_FORMATTING     = 1;
  CLEAR_DATA           = 2;
  CLEAR_SELECTION      = 3;
}

enum ClearRegion {
  CLEAR_SCROLLABLE     = 0;
  CLEAR_FIXED_ROWS     = 1;
  CLEAR_FIXED_COLS     = 2;
  CLEAR_FIXED_BOTH     = 3;
  CLEAR_ALL_ROWS       = 4;
  CLEAR_ALL_COLS       = 5;
  CLEAR_ALL_BOTH       = 6;
}

enum AppearanceStyle {
  APPEARANCE_FLAT      = 0;
  APPEARANCE_3D        = 1;
  APPEARANCE_3D_LIGHT  = 2;
}

enum CheckedState {
  CHECKED_UNCHECKED    = 0;
  CHECKED_CHECKED      = 1;
  CHECKED_GRAYED       = 2;
}

enum RendererMode {
  RENDERER_CPU  = 0; // Default CPU rendering (tiny-skia)
  RENDERER_GPU  = 1; // GPU rendering (wgpu)
  RENDERER_AUTO = 2; // Auto-detect: GPU if available, else CPU
}

// ═══════════════════════════════════════════════════════════
// Common Messages
// ═══════════════════════════════════════════════════════════

message Empty {}
message GridHandle { int64 id = 1; }
message Int32Value { int64 grid_id = 1; int32 value = 2; }
message DoubleValue { int64 grid_id = 1; double value = 2; }
message BoolValue  { int64 grid_id = 1; bool value = 2; }
message StringValue { int64 grid_id = 1; string value = 2; }
message RowColIndex { int64 grid_id = 1; int32 index = 2; }

message SetBoolProp  { int64 grid_id = 1; bool value = 2; }
message SetAnimationEnabledRequest {
  int64 grid_id = 1;
  bool enabled = 2;
  int32 duration_ms = 3;  // animation duration in milliseconds (0 = use default 200ms)
}
message SetInt32Prop { int64 grid_id = 1; int32 value = 2; }
message SetFloatProp { int64 grid_id = 1; float value = 2; }
message SetColorProp { int64 grid_id = 1; uint32 color = 2; }
message SetImageProp  { int64 grid_id = 1; bytes image_data = 2; }
message SetStringProp { int64 grid_id = 1; string value = 2; }

message SetColInt32Prop {
  int64 grid_id = 1;
  int32 col     = 2;
  int32 value   = 3;
}

// ═══════════════════════════════════════════════════════════
// Lifecycle & Layout Messages
// ═══════════════════════════════════════════════════════════

message CreateGridRequest {
  int32 viewport_width  = 1;
  int32 viewport_height = 2;
  int32 rows            = 3;
  int32 cols            = 4;
  int32 fixed_rows      = 5;
  int32 fixed_cols      = 6;
  float scale           = 7;    // DPI scale factor (0 or 1 = no scaling)
}

message ResizeViewportRequest {
  int64 grid_id = 1;
  int32 width   = 2;
  int32 height  = 3;
}

message SetRowsRequest      { int64 grid_id = 1; int32 rows = 2; }
message SetColsRequest      { int64 grid_id = 1; int32 cols = 2; }
message SetFixedRowsRequest { int64 grid_id = 1; int32 fixed_rows = 2; }
message SetFixedColsRequest { int64 grid_id = 1; int32 fixed_cols = 2; }
message SetFrozenRowsRequest { int64 grid_id = 1; int32 frozen_rows = 2; }
message SetFrozenColsRequest { int64 grid_id = 1; int32 frozen_cols = 2; }

message SetRowHeightRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  int32 height  = 3;
}

message SetColWidthRequest {
  int64 grid_id = 1;
  int32 col     = 2;
  int32 width   = 3;
}

message SetRowHiddenRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  bool  hidden  = 3;
}

message SetColHiddenRequest {
  int64 grid_id = 1;
  int32 col     = 2;
  bool  hidden  = 3;
}

message MoveColRequest {
  int64 grid_id  = 1;
  int32 col      = 2;
  int32 position = 3;
}

message MoveRowRequest {
  int64 grid_id  = 1;
  int32 row      = 2;
  int32 position = 3;
}

message AutoSizeRequest {
  int64 grid_id   = 1;
  int32 col_from  = 2;
  int32 col_to    = 3;
  bool  equal     = 4;
  int32 max_width = 5;
}

message SetAutoSizeModeRequest {
  int64 grid_id    = 1;
  AutoSizeMode mode = 2;
}

message SetFormatStringRequest {
  int64  grid_id       = 1;
  string format_string = 2;
}

message SetScrollBarsRequest {
  int64 grid_id    = 1;
  ScrollBarsMode mode = 2;
}

message SetRendererModeRequest {
  int64 grid_id      = 1;
  RendererMode mode  = 2;
}

// ═══════════════════════════════════════════════════════════
// Cursor & Selection Messages
// ═══════════════════════════════════════════════════════════

message SetRowRequest    { int64 grid_id = 1; int32 row = 2; }
message SetColRequest    { int64 grid_id = 1; int32 col = 2; }
message SetRowSelRequest { int64 grid_id = 1; int32 row_sel = 2; }
message SetColSelRequest { int64 grid_id = 1; int32 col_sel = 2; }

message SelectRequest {
  int64 grid_id  = 1;
  int32 row1     = 2;
  int32 col1     = 3;
  int32 row2     = 4;
  int32 col2     = 5;
}

message ShowCellRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  int32 col     = 3;
}

message SelectionRange {
  int64 grid_id  = 1;
  int32 row1     = 2;
  int32 col1     = 3;
  int32 row2     = 4;
  int32 col2     = 5;
}

message SetSelectionModeRequest {
  int64 grid_id      = 1;
  SelectionMode mode = 2;
}

message SetFocusRectRequest {
  int64 grid_id       = 1;
  FocusRectStyle style = 2;
}

message SetHighLightRequest {
  int64 grid_id        = 1;
  HighLightStyle style = 2;
}

// ═══════════════════════════════════════════════════════════
// Values & Data Messages
// ═══════════════════════════════════════════════════════════

message CellValue {
  oneof value {
    string text   = 1;
    double number = 2;
    bool   flag   = 3;
    bytes  data   = 4;
  }
}

message SetTextRequest {
  int64  grid_id = 1;
  string text    = 2;
}

message GetTextRequest { int64 grid_id = 1; }

message SetTextMatrixRequest {
  int64  grid_id = 1;
  int32  row     = 2;
  int32  col     = 3;
  string text    = 4;
}

message GetTextMatrixRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  int32 col     = 3;
}

message SetTextArrayRequest {
  int64  grid_id = 1;
  int32  index   = 2;
  string text    = 3;
}

message GetTextArrayRequest {
  int64 grid_id = 1;
  int32 index   = 2;
}

message ArrayDataRequest {
  int64           grid_id = 1;
  int32           rows    = 2;
  int32           cols    = 3;
  repeated string values  = 4; // row-major: row * cols + col
}

message SetValueRequest {
  int64     grid_id = 1;
  CellValue value   = 2;
}

message GetValueRequest { int64 grid_id = 1; }

message SetValueMatrixRequest {
  int64     grid_id = 1;
  int32     row     = 2;
  int32     col     = 3;
  CellValue value   = 4;
}

message GetValueMatrixRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  int32 col     = 3;
}

message CellEntry {
  int32     row   = 1;
  int32     col   = 2;
  CellValue value = 3;
}

message SetCellsRequest {
  int64 grid_id            = 1;
  repeated CellEntry cells = 2;
}

message GetCellsRequest {
  int64 grid_id = 1;
  int32 row1    = 2;
  int32 col1    = 3;
  int32 row2    = 4;
  int32 col2    = 5;
}

message CellsData {
  repeated CellEntry cells = 1;
}

message SetCellRequest {
  int64 grid_id          = 1;
  CellPropertyType prop  = 2;
  int32 row1             = 3;
  int32 col1             = 4;
  int32 row2             = 5;
  int32 col2             = 6;
  CellValue value        = 7;
}

message GetCellRequest {
  int64 grid_id          = 1;
  CellPropertyType prop  = 2;
  int32 row              = 3;
  int32 col              = 4;
}

message SetClipRequest {
  int64  grid_id = 1;
  string clip    = 2;
}

message GetClipRequest {
  int64 grid_id = 1;
}

message SetClipSeparatorsRequest {
  int64  grid_id       = 1;
  string col_separator = 2;
  string row_separator = 3;
}

message SetFillStyleRequest {
  int64     grid_id = 1;
  FillStyle style   = 2;
}

message AddItemRequest {
  int64  grid_id = 1;
  string item    = 2;
  int32  index   = 3;
}

message RemoveItemRequest {
  int64 grid_id = 1;
  int32 index   = 2;
}

message ClearRequest {
  int64       grid_id = 1;
  ClearScope  scope   = 2;
  ClearRegion region  = 3;
}

message FindRowRequest {
  int64  grid_id    = 1;
  string text       = 2;
  int32  start_row  = 3;
  int32  col        = 4;
  bool   case_sense = 5;
  bool   full_match = 6;
}

message FindRowRegexRequest {
  int64  grid_id   = 1;
  string pattern   = 2;
  int32  start_row = 3;
  int32  col       = 4;
}

message AggregateRequest {
  int64         grid_id   = 1;
  AggregateType aggregate = 2;
  int32         row1      = 3;
  int32         col1      = 4;
  int32         row2      = 5;
  int32         col2      = 6;
}

// ═══════════════════════════════════════════════════════════
// Editing Messages
// ═══════════════════════════════════════════════════════════

message SetEditableRequest {
  int64        grid_id = 1;
  EditableMode mode    = 2;
}

message EditCellRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  int32 col     = 3;
}

message SetEditMaskRequest {
  int64  grid_id = 1;
  string mask    = 2;
}

message SetColEditMaskRequest {
  int64  grid_id = 1;
  int32  col     = 2;
  string mask    = 3;
}

message SetColComboListRequest {
  int64  grid_id = 1;
  int32  col     = 2;
  // Pipe-delimited combo items; prefix with `|` to make the list editable.
  string list    = 3;
}

message SetComboListRequest {
  int64  grid_id = 1;
  // Pipe-delimited combo items; prefix with `|` to make the list editable.
  string list    = 2;
}

message BuildComboListRequest {
  int64  grid_id = 1;
  string query   = 2;
}

message SetShowComboButtonRequest {
  int64                 grid_id = 1;
  ShowComboButtonMode   mode    = 2;
}

message SetTabBehaviorRequest {
  int64       grid_id = 1;
  TabBehavior behavior = 2;
}

message CommitEditRequest {
  int64  grid_id = 1;
  string text    = 2;
  bool   cancel  = 3;
}

// ═══════════════════════════════════════════════════════════
// Cell Formatting Messages
// ═══════════════════════════════════════════════════════════

message GridStyle {
  AppearanceStyle appearance      = 1;
  uint32 back_color               = 2;
  uint32 fore_color               = 3;
  uint32 back_color_fixed         = 4;
  uint32 fore_color_fixed         = 5;
  uint32 back_color_frozen        = 6;
  uint32 fore_color_frozen        = 7;
  uint32 back_color_bkg           = 10;
  uint32 back_color_alternate     = 11;
  GridLinesMode grid_lines        = 12;
  GridLinesMode grid_lines_fixed  = 13;
  uint32 grid_color               = 14;
  uint32 grid_color_fixed         = 15;
  int32  grid_line_width          = 16;
  TextStyleMode text_style        = 17;
  TextStyleMode text_style_fixed  = 18;
  string font_name                = 19;
  float  font_size                = 20;
  bool   font_bold                = 21;
  bool   font_italic              = 22;
  bool   font_underline           = 23;
  bool   font_strikethrough       = 24;
  float  font_width               = 25;
  uint32 sheet_border             = 26;
  uint32 flood_color              = 27;
  bool   pictures_over            = 28;
  bytes  wallpaper                = 29;
  PictureAlignment wallpaper_alignment = 30;

  // Text clarity controls (cross-platform, runtime configurable).
  // These fields are optional tuning knobs. AUTO defaults preserve legacy behavior.
  TextRenderMode text_render_mode = 31;
  TextHintingMode text_hinting_mode = 32;

  // Snap glyph placement to pixel boundaries for crisper small text.
  // Useful for legacy-style screenshots/UI where smooth positioning looks blurry.
  bool text_pixel_snap = 33;
}

message SetGridStyleRequest {
  int64     grid_id = 1;
  GridStyle style   = 2;
}

message CellStyle {
  uint32 back_color       = 1;
  uint32 fore_color       = 2;
  Align  alignment        = 3;
  TextStyleMode text_style = 4;
  string font_name        = 5;
  float  font_size        = 6;
  bool   font_bold        = 7;
  bool   font_italic      = 8;
  bool   font_underline   = 9;
  bool   font_strikethrough = 10;
  float  font_width       = 11;
  uint32 flood_color      = 12;
  float  flood_percent    = 13;
  BorderStyle border      = 14;
}

message SetCellStyleRequest {
  int64     grid_id = 1;
  CellStyle style   = 2;
}

message GetCellStyleRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  int32 col     = 3;
}

message SetCellStyleRangeRequest {
  int64     grid_id = 1;
  int32     row1    = 2;
  int32     col1    = 3;
  int32     row2    = 4;
  int32     col2    = 5;
  CellStyle style   = 6;
}

message SetColAlignmentRequest {
  int64 grid_id  = 1;
  int32 col      = 2;
  Align alignment = 3;
}

message SetColFormatRequest {
  int64  grid_id = 1;
  int32  col     = 2;
  string format  = 3;
}

message SetColDataTypeRequest {
  int64       grid_id   = 1;
  int32       col       = 2;
  ColDataType data_type = 3;
}

message SetColIndentRequest {
  int64 grid_id = 1;
  int32 col     = 2;
  int32 indent  = 3;
}

message SetColKeyRequest {
  int64  grid_id = 1;
  int32  col     = 2;
  string key     = 3;
}

message GetColIndexRequest {
  int64  grid_id = 1;
  string key     = 2;
}

message SetColSortRequest {
  int64        grid_id = 1;
  int32        col     = 2;
  FlexSortSpec order   = 3;
}

message ImageData {
  bytes  data   = 1;
  string format = 2;
}

message SetCellPictureRequest {
  int64     grid_id = 1;
  int32     row     = 2;
  int32     col     = 3;
  ImageData image   = 4;
}

message GetCellPictureRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  int32 col     = 3;
}

message SetCellPictureAlignmentRequest {
  int64            grid_id   = 1;
