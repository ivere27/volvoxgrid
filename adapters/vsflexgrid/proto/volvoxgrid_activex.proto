// ═══════════════════════════════════════════════════════════
// Service
// ═══════════════════════════════════════════════════════════

service VolvoxGridService {
  option (synurang.v1.activex_service) = {
    prefix: "VG"
    // ── Basic grid structure ──
    properties: { dispid: 1   name: "Rows" }
    properties: { dispid: 2   name: "Cols" }
    properties: { dispid: 3   name: "FixedRows"      custom: true }
    properties: { dispid: 4   name: "FixedCols"       custom: true }
    properties: { dispid: 5   name: "TextMatrix"      custom: true }
    properties: { dispid: 6   name: "Text"             custom: true }
    properties: { dispid: 7   name: "Row" }
    properties: { dispid: 8   name: "Col"             custom: true }
    properties: { dispid: 9   name: "RowHeight"       custom: true }
    properties: { dispid: 10  name: "ColWidth"         custom: true }
    properties: { dispid: 11  name: "FrozenRows"      custom: true }
    properties: { dispid: 12  name: "FrozenCols"      custom: true }
    properties: { dispid: 13  name: "ScrollBars" }
    properties: { dispid: 14  name: "TopRow" }
    properties: { dispid: 15  name: "LeftCol" }
    properties: { dispid: 16  name: "FocusRect" }
    properties: { dispid: 17  name: "HighLight" }
    properties: { dispid: 18  name: "Redraw" }
    properties: { dispid: 19  name: "Picture"          custom: true }
    properties: { dispid: 20  name: "TextArray"        custom: true }
    properties: { dispid: 21  name: "Editable"        custom: true }
    properties: { dispid: 22  name: "RowSel"          custom: true }
    properties: { dispid: 23  name: "ColSel"          custom: true }
    properties: { dispid: 24  name: "FillStyle" }
    properties: { dispid: 25  name: "WordWrap" }
    properties: { dispid: 26  name: "GridStyle"        custom: true }
    // ── Selection & appearance ──
    properties: { dispid: 27  name: "SelectionMode" }
    properties: { dispid: 28  name: "AllowSelection" }
    properties: { dispid: 29  name: "AllowBigSelection" }
    properties: { dispid: 30  name: "AllowUserResizing" set_method: "SetResizePolicy" }
    properties: { dispid: 31  name: "Ellipsis" }
    properties: { dispid: 32  name: "ExtendLastCol" }
    properties: { dispid: 33  name: "SubtotalPosition"  custom: true }
    // ── Colors (extra native API, not standard RPC) ──
