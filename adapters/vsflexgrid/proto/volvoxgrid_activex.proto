// ═══════════════════════════════════════════════════════════
// Render Session Messages (Zero-Copy Bidi Stream)
// ═══════════════════════════════════════════════════════════

message RenderInput {
  int64 grid_id = 1;
  oneof input {
    ViewportState   viewport    = 2;
    PointerEvent    pointer     = 3;
    KeyEvent        key         = 4;
    BufferReady     buffer      = 5;
    ScrollEvent     scroll      = 6;
    EventDecision   event_decision = 7;
    ZoomEvent       zoom        = 8;
    GpuSurfaceReady gpu_surface = 9;
  }
}

message ViewportState {
  float scroll_x = 1;
  float scroll_y = 2;
  int32 width    = 3;
  int32 height   = 4;
}

message PointerEvent {
  enum Type { DOWN = 0; UP = 1; MOVE = 2; }
  Type  type      = 1;
  float x         = 2;
  float y         = 3;
  int32 modifier  = 4;
  int32 button    = 5;
  bool  dbl_click = 6;
}

message ScrollEvent {
  float delta_x = 1;
  float delta_y = 2;
}

message ZoomEvent {
  enum Phase {
    ZOOM_BEGIN  = 0;
    ZOOM_UPDATE = 1;
    ZOOM_END    = 2;
  }
  Phase phase      = 1;
  float scale      = 2; // scale delta (1.0 = no-op)
  float focal_x_px = 3;
  float focal_y_px = 4;
}

message KeyEvent {
  enum Type { KEY_DOWN = 0; KEY_UP = 1; KEY_PRESS = 2; }
  Type   type      = 1;
  int32  key_code  = 2;
  int32  modifier  = 3;
  string character = 4;
}

message BufferReady {
  int64 handle = 1;
  int32 stride = 2;
  int32 width  = 3;
  int32 height = 4;
}

message GpuSurfaceReady {
  int64 surface_handle = 1; // Platform-specific surface handle (ANativeWindow*, HWND, etc.)
  int32 width          = 2;
  int32 height         = 3;
}

// Client decision for a previously emitted cancelable GridEvent.
// `event_id` matches GridEvent.event_id.
message EventDecision {
  int64 grid_id  = 1;
  int64 event_id = 2;
  bool  cancel   = 3;
}

message RenderOutput {
  bool rendered = 1;
  oneof event {
    FrameDone       frame_done      = 2;
    SelectionUpdate selection       = 3;
    CursorChange    cursor          = 4;
    EditRequest     edit_request    = 5;
    ComboRequest    combo_request   = 6;
    TooltipRequest  tooltip_request = 7;
    GpuFrameDone    gpu_frame_done  = 8;
  }
}

message GpuFrameDone {
  int32 dirty_x = 1;
  int32 dirty_y = 2;
  int32 dirty_w = 3;
  int32 dirty_h = 4;
}

message FrameDone {
  int64 handle  = 1;
  int32 dirty_x = 2;
  int32 dirty_y = 3;
  int32 dirty_w = 4;
  int32 dirty_h = 5;
}

message SelectionUpdate {
  int32 row     = 1;
  int32 col     = 2;
  int32 row_sel = 3;
  int32 col_sel = 4;
}

message CursorChange {
  enum CursorType {
    DEFAULT   = 0;
    RESIZE_COL = 1;
    RESIZE_ROW = 2;
    MOVE_COL  = 3;
    TEXT      = 4;
    HAND      = 5;
  }
  CursorType cursor = 1;
}

message EditRequest {
  int32  row           = 1;
  int32  col           = 2;
  float  x             = 3;
  float  y             = 4;
  float  width         = 5;
  float  height        = 6;
  string current_value = 7;
  string edit_mask     = 8;
  int32  max_length    = 9;
}

message ComboRequest {
  int32           row       = 1;
  int32           col       = 2;
  float           x         = 3;
  float           y         = 4;
  float           width     = 5;
  float           height    = 6;
  repeated string items     = 7;
  int32           selected  = 8;
  // True if free-form text entry is allowed.
  bool            editable  = 9;
}

message TooltipRequest {
  float  x    = 1;
  float  y    = 2;
  string text = 3;
}

