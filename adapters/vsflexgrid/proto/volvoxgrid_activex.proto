  rpc SetRowStatus(SetColInt32Prop)         returns (Empty);
  rpc GetRowStatus(RowColIndex)             returns (Int32Value);
  rpc SetCellButtonPicture(SetCellButtonPictureRequest) returns (Empty);
  rpc GetCellButtonPicture(GetCellButtonPictureRequest) returns (ImageData);
