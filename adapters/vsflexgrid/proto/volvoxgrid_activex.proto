  // Lifecycle
  rpc CreateGrid(CreateGridRequest)         returns (GridHandle);
  rpc DestroyGrid(GridHandle)               returns (Empty);

  // Grid Layout
  rpc SetRows(SetRowsRequest)               returns (Empty);
  rpc SetCols(SetColsRequest)               returns (Empty);
  rpc GetRows(GridHandle)                   returns (Int32Value);
  rpc GetCols(GridHandle)                   returns (Int32Value);
  rpc SetFixedRows(SetFixedRowsRequest)     returns (Empty);
  rpc SetFixedCols(SetFixedColsRequest)     returns (Empty);
  rpc SetFrozenRows(SetFrozenRowsRequest)   returns (Empty);
  rpc SetFrozenCols(SetFrozenColsRequest)   returns (Empty);
  rpc SetRowHeight(SetRowHeightRequest)     returns (Empty);
  rpc SetColWidth(SetColWidthRequest)       returns (Empty);
