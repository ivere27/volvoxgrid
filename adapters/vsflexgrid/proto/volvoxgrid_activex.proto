  rpc GetEditSelLength(GridHandle)          returns (Int32Value);
  rpc SetEditSelLength(EditSelRequest)      returns (Empty);
  rpc GetEditSelText(GridHandle)            returns (StringValue);
  rpc GetComboCount(GridHandle)             returns (Int32Value);
  rpc GetComboIndex(GridHandle)             returns (Int32Value);
  rpc SetComboIndex(SetInt32Prop)           returns (Empty);
  rpc GetComboItem(ComboInfoRequest)        returns (StringValue);
  rpc GetComboData(ComboInfoRequest)        returns (StringValue);
  rpc DataRefresh(GridHandle)               returns (Empty);
  rpc LoadGridUrl(LoadGridUrlRequest)       returns (BoolValue);
  rpc AutoSearch(SetAutoSearchRequest)      returns (Int32Value);

