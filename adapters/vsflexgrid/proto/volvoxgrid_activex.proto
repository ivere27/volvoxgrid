    AfterRowColChangeEvent  row_col_change         = 61;
    AfterSelChangeEvent     sel_change             = 62;
    EnterCellEvent          enter_cell             = 6;
    LeaveCellEvent          leave_cell             = 7;
    BeforeEditEvent         before_edit            = 8;
    StartEditEvent          start_edit             = 9;
    AfterEditEvent          after_edit             = 10;
    ValidateEditEvent       validate_edit          = 11;
    ChangeEditEvent         change_edit            = 12;
    CellButtonClickEvent    cell_button_click      = 13;
    KeyDownEditEvent        key_down_edit          = 14;
    KeyPressEditEvent       key_press_edit         = 15;
    KeyUpEditEvent          key_up_edit            = 16;
    SetupEditStyleEvent     setup_edit_style       = 17;
    SetupEditWindowEvent    setup_edit_window      = 18;
    ComboCloseUpEvent       combo_close_up         = 19;
    ComboDropDownEvent      combo_drop_down        = 20;
    CellChangedEvent        cell_changed           = 21;
    RowStatusChangeEvent    row_status_change      = 22;
    BeforeSortEvent         before_sort            = 23;
    AfterSortEvent          after_sort             = 24;
    CompareEvent            compare                = 25;
    BeforeCollapseEvent     before_collapse        = 26;
    AfterCollapseEvent      after_collapse         = 27;
    BeforeScrollEvent       before_scroll          = 28;
    AfterScrollEvent        after_scroll           = 29;
    BeforeScrollTipEvent    before_scroll_tip      = 30;
    BeforeUserResizeEvent   before_user_resize     = 31;
    AfterUserResizeEvent    after_user_resize      = 32;
    AfterUserFreezeEvent    after_user_freeze      = 33;
    BeforeMoveColumnEvent   before_move_column     = 34;
    AfterMoveColumnEvent    after_move_column      = 35;
    BeforeMoveRowEvent      before_move_row        = 36;
    AfterMoveRowEvent       after_move_row         = 37;
    BeforeMouseDownEvent    before_mouse_down      = 38;
    MouseDownEvent          mouse_down_event       = 39;
    MouseUpEvent            mouse_up_event         = 40;
    MouseMoveEvent          mouse_move_event       = 41;
    ClickEvent              click_event            = 42;
    DblClickEvent           dbl_click_event        = 43;
    KeyDownEvent            key_down               = 44;
    KeyPressEvent           key_press              = 45;
    KeyUpEvent              key_up                 = 46;
    DrawCellEvent           draw_cell              = 47;
    DragStartEvent          drag_start             = 48;
    DragOverEvent           drag_over              = 49;
    DragDropEvent           drag_drop              = 50;
    DragCompleteEvent       drag_complete          = 51;
    StartAutoSearchEvent    start_auto_search      = 52;
