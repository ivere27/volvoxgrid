  rpc SetFlingFriction(SetFloatProp)        returns (Empty);
  rpc ResizeViewport(ResizeViewportRequest) returns (Empty);
  // Legacy scroll position parity.
  rpc SetTopRow(SetRowRequest)              returns (Empty);
  rpc GetTopRow(GridHandle)                 returns (Int32Value);
  rpc SetLeftCol(SetColRequest)             returns (Empty);
  rpc GetLeftCol(GridHandle)                returns (Int32Value);
  rpc GetBottomRow(GridHandle)              returns (Int32Value);
