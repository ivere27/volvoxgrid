<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VolvoxSheet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --app-height: 100vh;
    }
    @supports (height: 100svh) {
      :root {
        --app-height: 100svh;
      }
    }
    html, body {
      width: 100%;
      height: var(--app-height);
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    #app {
      width: 100%;
      height: var(--app-height);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import init from "./wasm/volvoxgrid_wasm.js";
    import * as wasm from "./wasm/volvoxgrid_wasm.js";
    import { VolvoxSheet } from "./src/index.ts";

    async function main() {
      await init();
      // Register the v1 protobuf service plugin (required for styles, configure, etc.)
      if (typeof wasm.init_v1_plugin === "function") {
        wasm.init_v1_plugin();
      }

      const sheet = new VolvoxSheet({
        container: document.getElementById("app"),
        wasm,
        rows: 100,
        cols: 26,
        data: [
          ["Name", "Age", "City", "Department", "Salary"],
          ["Alice", "30", "New York", "Engineering", "95000"],
          ["Bob", "25", "London", "Marketing", "72000"],
          ["Charlie", "35", "Tokyo", "Engineering", "105000"],
          ["Diana", "28", "Berlin", "Design", "85000"],
          ["Eve", "32", "Paris", "Marketing", "78000"],
        ],
      });

      // Expose for console debugging
      window.sheet = sheet;
    }

    main().catch(console.error);
  </script>
</body>
</html>
