// VolvoxGrid Protocol Contract
//
// This file is the single source of truth for VolvoxGrid's public API.
// Every host — Flutter, Android, Java, .NET, Go, Web — communicates with
// the Rust grid engine through the messages and service defined here.
//
// ─── Design principles ───
//
// 1. One retained grid model.
//    The engine (engine/src/grid.rs) owns a single VolvoxGrid state object
//    per grid: rows, columns, cells, layout, selection, scrolling, editing,
//    sorting, spans, outline, animations, and pending events. Hosts never
//    own grid logic — they forward input and present rendered output.
//
// 2. Partial-update semantics.
//    All configuration messages use `optional` fields. Only fields that are
//    explicitly set are applied; unset fields leave the current value
//    unchanged. This is implemented in engine/src/config.rs via
//    `if let Some(v) = field { apply(v) }` for every optional field.
//    This lets hosts send sparse updates without knowing or restating
//    the full current configuration.
//
// 3. Two streaming interfaces.
//    - RenderSession: bidirectional stream for the real-time render loop.
//      The host sends input (viewport, pointer, key, buffer) and receives
//      immediate render-coupled outputs (FrameDone, EditRequest, CursorChange).
//    - EventStream: server-streaming for semantic grid events (selection
//      changed, before/after edit, sort, scroll, etc.).
//    The split ensures that frame-rate-sensitive rendering is never blocked
//    by application-level event handling.
//
// 4. Cancelable events via EventDecision.
//    Events with a non-zero `event_id` in GridEvent are cancelable.
//    The host sends an EventDecision on the RenderSession with `cancel=true`
//    to veto the action. The engine waits up to 250 ms for a decision;
//    if none arrives, the event proceeds (cancel=false).
//    Events with `event_id=0` are informational and cannot be canceled.
//
// 5. Language-agnostic transport.
//    Native hosts use Synurang FFI to load `libvolvoxgrid_plugin` and
//    exchange these protobuf messages. Web hosts use wasm-bindgen.
//    Any language that can load a shared library and speak protobuf can
//    become a VolvoxGrid host without engine changes.
//
// ─── Color format ───
//
// All `uint32` color fields use ARGB format:
//   bits 24–31 = alpha, 16–23 = red, 8–15 = green, 0–7 = blue.
// Example: 0xFFFF0000 = opaque red, 0x80000000 = 50% transparent black.
// The CPU render buffer uses RGBA byte order in memory (R at offset+0,
// G at offset+1, B at offset+2, A at offset+3). The engine converts
// ARGB→RGBA during rendering (see engine/src/canvas_cpu.rs fill_rect).
//
// ─── Modifier bitmask ───
//
// The `modifier` field on PointerEvent, KeyEvent, and mouse/keyboard
// GridEvent messages uses a bitmask:
//   0x01 = Shift, 0x02 = Ctrl, 0x04 = Alt, 0x08 = Meta.
// Verified in flutter/lib/volvoxgrid.dart and adapters/sheet/src/volvox-sheet.ts.
//

syntax = "proto3";
package volvoxgrid.v1;

option go_package = "github.com/ivere27/volvoxgrid/api/v1";
option java_package = "io.github.ivere27.volvoxgrid";
option java_multiple_files = true;

// ═══════════════════════════════════════════════════════════
// Building Blocks
//
// Reusable primitives composed throughout the API.
// All color fields are ARGB uint32 (see file header).
// ═══════════════════════════════════════════════════════════

// Font specification. Engine default: platform-default family, size 11.0,
// all decorations off. (engine/src/style.rs GridStyleState defaults)
message Font {
  optional string family        = 1;
  repeated string families      = 2;  // CSS-style fallback chain
  optional float  size          = 3;  // points; engine default 11.0
  optional bool   bold          = 4;
  optional bool   italic        = 5;
  optional bool   underline     = 6;
  optional bool   strikethrough = 7;
  // Horizontal font stretch (condensed/expanded width of the glyphs).
  // VSFlexGrid legacy `font_width` maps to this field.
  optional float  stretch       = 8;
}

// Cell padding in pixels.
// Engine default: left=6, top=2, right=6, bottom=2 (engine/src/style.rs).
message Padding {
  optional int32 left   = 1;
  optional int32 top    = 2;
  optional int32 right  = 3;
  optional int32 bottom = 4;
}

message Border {
  optional BorderStyle style = 1;
  optional uint32      color = 2;  // ARGB
}

// Per-edge borders with a shorthand `all` field.
// Resolution: per-edge > all > inherited.
message Borders {
  Border all    = 1;
  Border top    = 2;
  Border right  = 3;
  Border bottom = 4;
  Border left   = 5;
}

// Engine defaults: style=GRIDLINE_SOLID for data cells, GRIDLINE_INSET
// for fixed cells; color=0xFFC0C0C0; width=1px.
message GridLines {
  optional GridLineStyle     style     = 1;
  optional GridLineDirection direction = 2;
  optional uint32            color     = 3;  // ARGB
  optional int32             width     = 4;  // pixels
}

message Separator {
  optional bool   visible = 1;
  optional uint32 color   = 2;
  optional int32  width   = 3;
}

message TextRendering {
  optional TextRenderMode  mode       = 1;
  optional TextHintingMode hinting    = 2;
  optional bool            pixel_snap = 3;
}

message ImageData {
  bytes  data   = 1;
  string format = 2;  // "png", "bmp", etc.
}

message BarcodeEncodingOptions {
  BarcodeCheckDigitMode    check_digit   = 1;
  BarcodeTextEncoding      text_encoding = 2;
  // QR-only. Ignored for 1D symbologies.
  BarcodeQrErrorCorrection qr_ecc        = 3;
}

message BarcodeRenderOptions {
  // Unset means engine default; foreground defaults to resolved cell foreground,
  // background defaults to transparent.
  optional uint32 foreground = 1;
  optional uint32 background = 2;
  optional ImageAlignment alignment = 3;

  // QR/linear module size. 0 = auto; explicit values are clamped to [1, 16].
  uint32 module_size = 4;
  // Quiet zone modules. 0 = default; explicit values are clamped to [0, 64]
  // for QR and [0, 128] for 1D symbologies.
  uint32 quiet_zone  = 5;

  // 1D-only bar height in pixels. Ignored for QR. 0 = auto.
  uint32 bar_height = 10;
  // 1D narrow bar width in pixels. Ignored for QR. 0 = auto; explicit values
  // are clamped to [1, 32].
  uint32 narrow_bar_width = 11;

  // Default false. When enabled, the engine draws a warning mark over the
  // symbol if the cell is too small for a faithful minimum-size render.
  optional bool show_size_warning = 12;
  // ARGB warning color. Unset means opaque red.
  optional uint32 size_warning_color = 13;

  // Default false. In automatic sizing, distribute modules across the full
  // available barcode rectangle instead of centering an integer-pixel module
  // render that can leave extra side/bottom space.
  optional bool use_full_rect = 14;
}

message BarcodeCaptionOptions {
  // Default BOTTOM for 1D, NONE for QR.
  optional BarcodeCaptionPosition position = 1;
  // Empty/unset means use encoded payload.
  optional string text = 2;
  // Unset means use barcode/cell foreground.
  optional uint32 color = 3;
  // Unset/0 means inherit cell font size.
  optional float font_size = 4;
}

message BarcodeData {
  BarcodeSymbology symbology = 1;
  // Encoded payload. If empty, the engine falls back to the cell's text value.
  // Text/string payloads only; raw binary QR/Code128 byte mode is not exposed.
  string value = 2;
  BarcodeEncodingOptions encoding = 3;
  BarcodeRenderOptions   render   = 4;
  BarcodeCaptionOptions  caption  = 5;
}

message CellRange {
  int32 row1 = 1;
  int32 col1 = 2;
  int32 row2 = 3;
  int32 col2 = 4;
}

// Typed cell value. Maps to CellValueData in engine/src/cell.rs:
//   text → Text(String), number → Number(f64), flag → Bool(bool),
//   raw → Bytes(Vec<u8>), timestamp → Timestamp(i64).
// Unset means Empty (sparse storage — only non-empty cells exist in the
// engine's HashMap<(i32,i32), CellData>).
message CellValue {
  oneof value {
    string text      = 1;
    double number    = 2;
    bool   flag      = 3;
    bytes  raw       = 4;
    int64  timestamp = 5;  // epoch-ms (UTC)
  }
}

// ═══════════════════════════════════════════════════════════
// Enums
// ═══════════════════════════════════════════════════════════

// ── Appearance ──

enum BorderStyle {
  BORDER_NONE   = 0;
  BORDER_THIN   = 1;
  BORDER_THICK  = 2;
  BORDER_DOTTED = 3;
  BORDER_DASHED = 4;
  BORDER_DOUBLE = 5;
}

enum GridLineStyle {
  GRIDLINE_NONE   = 0;
  GRIDLINE_SOLID  = 1;
  GRIDLINE_INSET  = 2;
  GRIDLINE_RAISED = 3;
}

enum GridLineDirection {
  GRIDLINE_BOTH       = 0;
  GRIDLINE_HORIZONTAL = 1;
  GRIDLINE_VERTICAL   = 2;
}

enum BorderAppearance {
  BORDER_APPEARANCE_FLAT   = 0;
  BORDER_APPEARANCE_RAISED = 1;
  BORDER_APPEARANCE_SUBTLE = 2;
}

enum TextEffect {
  TEXT_EFFECT_NONE         = 0;
  TEXT_EFFECT_EMBOSS       = 1;
  TEXT_EFFECT_ENGRAVE      = 2;
  TEXT_EFFECT_EMBOSS_LIGHT = 3;
  TEXT_EFFECT_ENGRAVE_LIGHT = 4;
}

enum TextRenderMode {
  TEXT_RENDER_AUTO      = 0;
  TEXT_RENDER_GRAYSCALE = 1;
  TEXT_RENDER_SUBPIXEL  = 2;
  TEXT_RENDER_MONO      = 3;
}

enum TextHintingMode {
  TEXT_HINT_AUTO   = 0;
  TEXT_HINT_NONE   = 1;
  TEXT_HINT_SLIGHT = 2;
  TEXT_HINT_FULL   = 3;
}

// Cell text alignment: "horizontal_vertical".
// ALIGN_GENERAL (9) is the engine default for data cells. It renders as
// left-center for text and right-center for numeric-looking values.
// The engine uses a heuristic (canvas.rs text_looks_numeric()) to decide
// at render time whether the cell content looks numeric.
enum Align {
  ALIGN_LEFT_TOP      = 0;
  ALIGN_LEFT_CENTER   = 1;
  ALIGN_LEFT_BOTTOM   = 2;
  ALIGN_CENTER_TOP    = 3;
  ALIGN_CENTER_CENTER = 4;
  ALIGN_CENTER_BOTTOM = 5;
  ALIGN_RIGHT_TOP     = 6;
  ALIGN_RIGHT_CENTER  = 7;
  ALIGN_RIGHT_BOTTOM  = 8;
  ALIGN_GENERAL       = 9;  // left for text, right for numbers
}

enum ImageAlignment {
  IMG_ALIGN_LEFT_TOP      = 0;
  IMG_ALIGN_LEFT_CENTER   = 1;
  IMG_ALIGN_LEFT_BOTTOM   = 2;
  IMG_ALIGN_CENTER_TOP    = 3;
  IMG_ALIGN_CENTER_CENTER = 4;
  IMG_ALIGN_CENTER_BOTTOM = 5;
  IMG_ALIGN_RIGHT_TOP     = 6;
  IMG_ALIGN_RIGHT_CENTER  = 7;
  IMG_ALIGN_RIGHT_BOTTOM  = 8;
  IMG_ALIGN_STRETCH       = 9;
  IMG_ALIGN_TILE          = 10;
}

enum BarcodeSymbology {
  BARCODE_NONE     = 0;
  BARCODE_QR       = 1;
  BARCODE_CODE128  = 10;
  BARCODE_CODE39   = 11;
  BARCODE_CODE93   = 12;
  BARCODE_CODE11   = 13;
  BARCODE_EAN13    = 20;
  BARCODE_EAN8     = 21;
  BARCODE_UPC_A    = 22;
  BARCODE_UPC_E    = 23;
  BARCODE_EAN_SUPP = 24;
  BARCODE_ITF      = 30;
  BARCODE_STF      = 31;
  BARCODE_CODABAR  = 32;
}

enum BarcodeCaptionPosition {
  CAPTION_NONE   = 0;
  CAPTION_BOTTOM = 1;
  CAPTION_TOP    = 2;
}

enum BarcodeCheckDigitMode {
  // Symbology default. Mandatory checks are handled by the encoder; optional
  // check digits are not added unless CHECK_DIGIT_GENERATE is set.
  CHECK_DIGIT_DEFAULT  = 0;
  CHECK_DIGIT_NONE     = 1;
  CHECK_DIGIT_GENERATE = 2;
}

enum BarcodeTextEncoding {
  BARCODE_TEXT_AUTO  = 0;
  BARCODE_TEXT_ASCII = 1;
  BARCODE_TEXT_UTF8  = 2;
  BARCODE_TEXT_GS1   = 3;
}

enum BarcodeQrErrorCorrection {
  QR_ECC_DEFAULT  = 0;
  QR_ECC_LOW      = 1;
  QR_ECC_MEDIUM   = 2;
  QR_ECC_QUARTILE = 3;
  QR_ECC_HIGH     = 4;
}

enum BarcodeRenderStatus {
  BARCODE_RENDER_STATUS_UNSPECIFIED          = 0;
  BARCODE_RENDER_STATUS_OK                   = 1;
  BARCODE_RENDER_STATUS_EMPTY_PAYLOAD        = 2;
  BARCODE_RENDER_STATUS_INVALID_PAYLOAD      = 3;
  BARCODE_RENDER_STATUS_UNSUPPORTED_SYMBOLOGY = 4;
}

enum CheckedState {
  CHECKED_UNCHECKED = 0;
  CHECKED_CHECKED   = 1;
  CHECKED_GRAYED    = 2;
}

enum FillHandlePosition {
  FILL_HANDLE_NONE         = 0;
  FILL_HANDLE_BOTTOM_RIGHT = 1;
  FILL_HANDLE_BOTTOM_LEFT  = 2;
  FILL_HANDLE_TOP_RIGHT    = 3;
  FILL_HANDLE_TOP_LEFT     = 4;
  FILL_HANDLE_ALL_CORNERS  = 5;
}

// ── Data ──

enum ColumnDataType {
  COLUMN_DATA_STRING   = 0;
  COLUMN_DATA_NUMBER   = 1;
  COLUMN_DATA_DATE     = 2;
  COLUMN_DATA_BOOLEAN  = 3;
  COLUMN_DATA_CURRENCY = 4;
}

// Type coercion strategy during cell writes and data loading.
//   STRICT (1):   Rejects if type doesn't match column's declared type.
//   FLEXIBLE (2): Attempts conversion (e.g. "123" → Number 123).
//   PARSE_ONLY (3): Parses but doesn't convert (stores original text).
enum CoercionMode {
  COERCION_UNSPECIFIED = 0;
  COERCION_STRICT      = 1;
  COERCION_FLEXIBLE    = 2;
  COERCION_PARSE_ONLY  = 3;
}

// What happens when a cell write fails type validation.
//   REJECT (1):   Cell not written; reported in WriteResult.violations.
//   SET_NULL (2): Clears cell value.
//   SKIP (3):     Keeps old value, no error report.
enum WriteErrorMode {
  WRITE_ERROR_UNSPECIFIED = 0;
  WRITE_ERROR_REJECT     = 1;
  WRITE_ERROR_SET_NULL   = 2;
  WRITE_ERROR_SKIP       = 3;
}

enum CellInteraction {
  CELL_INTERACTION_UNSPECIFIED = 0;
  CELL_INTERACTION_NONE        = 1;
  CELL_INTERACTION_TEXT_LINK   = 2;
  CELL_INTERACTION_BUTTON      = 3;
}

// How the first row of loaded data is interpreted.
//   AUTO (0):      JSON objects use keys as headers; CSV tries to detect.
//   NONE (1):      No headers — uses generic column names (Column 1, 2, …).
//   FIRST_ROW (2): Unconditionally treats first row as column headers.
enum HeaderPolicy {
  HEADER_AUTO      = 0;
  HEADER_NONE      = 1;
  HEADER_FIRST_ROW = 2;
}

// Column type inference strategy during data loading.
//   AUTO_DETECT (0): Scans values to infer type — all numbers → Number,
//                    all true/false → Boolean, all dates → Date, else String.
//   ALL_STRING (1):  Everything stays as text.
//   FROM_SCHEMA (2): Uses existing column data types from grid.
enum TypePolicy {
  TYPE_AUTO_DETECT = 0;
  TYPE_ALL_STRING  = 1;
  TYPE_FROM_SCHEMA = 2;
}

enum LoadDataStatus {
  LOAD_OK      = 0;
  LOAD_PARTIAL = 1;
  LOAD_FAILED  = 2;
}


// ── Selection ──

// How user selection is interpreted. See engine/src/selection.rs.
//
// FREE (0):        Standard rectangular cell-range selection.
//                  Single contiguous range (row, col, row_end, col_end).
// BY_ROW (1):      Any click selects the entire row. Internally the
//                  selection range spans col 0..i32::MAX.
// BY_COLUMN (2):   Any click selects the entire column. Range spans
//                  row 0..i32::MAX.
// LISTBOX (3):     Row-based toggle selection. Tracks selected rows in a
//                  HashSet<i32>. Plain click selects one row, Ctrl+Click
//                  toggles, Shift+Click extends from anchor.
// MULTI_RANGE (4): Multiple independent rectangular ranges. The primary
//                  range plus extra_ranges: Vec<(i32,i32,i32,i32)>.
enum SelectionMode {
  SELECTION_FREE        = 0;
  SELECTION_BY_ROW      = 1;
  SELECTION_BY_COLUMN   = 2;
  SELECTION_LISTBOX     = 3;
  SELECTION_MULTI_RANGE = 4;
}

enum FocusBorderStyle {
  FOCUS_BORDER_NONE   = 0;
  FOCUS_BORDER_THIN   = 1;
  FOCUS_BORDER_THICK  = 2;
  FOCUS_BORDER_INSET  = 3;
  FOCUS_BORDER_RAISED = 4;
}

enum SelectionVisibility {
  SELECTION_VIS_NONE         = 0;
  SELECTION_VIS_ALWAYS       = 1;
  SELECTION_VIS_WHEN_FOCUSED = 2;
}

// ── Editing ──

// Controls how cell editing is activated. See engine/src/input.rs.
//   NONE (0):      Editing disabled.
//   KEY (1):       Enter/F2 starts editing. Character keys auto-start.
//   KEY_CLICK (2): Same as KEY, plus double-click and dropdown click
//                  also start editing.
enum EditTrigger {
  EDIT_TRIGGER_NONE      = 0;
  EDIT_TRIGGER_KEY       = 1;
  EDIT_TRIGGER_KEY_CLICK = 2;
}

enum DropdownTrigger {
  DROPDOWN_NEVER   = 0;
  DROPDOWN_ALWAYS  = 1;
  DROPDOWN_ON_EDIT = 2;
}

enum DropdownItemLayout {
  DROPDOWN_ITEM_AUTO          = 0;
  DROPDOWN_ITEM_LABEL         = 1;
  DROPDOWN_ITEM_VALUE_LABEL   = 2;
  DROPDOWN_ITEM_LABEL_DETAILS = 3;
}

message Dropdown {
  repeated DropdownItem items = 1;
  // When true, the user may type/commit a value not present in `items`.
  bool allow_custom_value = 2;
  DropdownItemLayout item_layout = 3;
  // Unset = use grid/global default; false/true override for this dropdown.
  optional bool searchable = 4;
}

message DropdownItem {
  // Value committed into the cell. If unset, commit `label`.
  optional string value = 1;
  // Text shown to the user.
  optional string label = 2;
  // Optional secondary/detail strings for richer host layouts.
  repeated string details = 3;
  bool disabled = 4;
}

enum TabBehavior {
  TAB_CONTROLS = 0;
  TAB_CELLS    = 1;
}

// ── Sort ──
// Direction and comparison type are orthogonal — separate enums.
// Multi-column sort is supported: pass multiple SortColumn entries to
// Sort(). The engine stores sort_keys: Vec<(col, order)> and compares
// by the first differing key column. See engine/src/sort.rs.

enum SortOrder {
  SORT_NONE       = 0;
  SORT_ASCENDING  = 1;
  SORT_DESCENDING = 2;
}

// Comparison strategy for sorting.
//   AUTO (0):           Tries date, then number, then case-insensitive string.
//   NUMERIC (1):        Parses as f64; non-numeric values sort to the end.
//   STRING (2):         Lexicographic, case-sensitive.
//   STRING_NO_CASE (3): Lexicographic, case-insensitive.
//   CUSTOM (4):         Engine emits CompareEvent on EventStream; host
//                       replies with CompareResponse on RenderSession input
//                       (-1/0/1). Falls back to the generic/date path if no
//                       EventStream subscriber is active or the host does
//                       not reply within 250 ms.
enum SortType {
  SORT_TYPE_AUTO           = 0;
  SORT_TYPE_NUMERIC        = 1;
  SORT_TYPE_STRING         = 2;
  SORT_TYPE_STRING_NO_CASE = 3;
  SORT_TYPE_CUSTOM         = 4;
}

// ── Outline / Tree ──

enum TreeIndicatorStyle {
  TREE_INDICATOR_NONE            = 0;
  TREE_INDICATOR_ARROWS          = 1;
  TREE_INDICATOR_ARROWS_LEAF     = 2;
  TREE_INDICATOR_CONNECTORS      = 3;
  TREE_INDICATOR_CONNECTORS_LEAF = 4;
}

enum GroupTotalPosition {
  GROUP_TOTAL_ABOVE = 0;
  GROUP_TOTAL_BELOW = 1;
}

// Aggregate functions for Subtotal() and Aggregate() RPCs.
// Numeric parsing strips $, commas, and spaces before computing.
//   NONE (0):    No-op.
//   CLEAR (1):   Removes all existing subtotal rows.
//   SUM (2):     Sum of numeric values.
//   PERCENT (3): 100.0 if sum ≠ 0, else 0.0.
//   COUNT (4):   Count of numeric cells.
//   AVERAGE (5): Arithmetic mean.
//   MAX (6):     Maximum value.
//   MIN (7):     Minimum value.
//   STD_DEV (8): Sample standard deviation (N−1 denominator).
//   VAR (9):     Sample variance (N−1 denominator).
//   RANGE (10):  Maximum minus minimum numeric value.
//   COUNT_ALL (11): Count all cells, including non-numeric and empty cells.
//   MEDIAN (12): Median numeric value.
//   COUNT_DISTINCT (13): Count distinct non-empty cell values.
enum AggregateType {
  AGG_NONE           = 0;
  AGG_CLEAR          = 1;
  AGG_SUM            = 2;
  AGG_PERCENT        = 3;
  AGG_COUNT          = 4;
  AGG_AVERAGE        = 5;
  AGG_MAX            = 6;
  AGG_MIN            = 7;
  AGG_STD_DEV        = 8;
  AGG_VAR            = 9;
  AGG_RANGE          = 10;
  AGG_COUNT_ALL      = 11;
  AGG_MEDIAN         = 12;
  AGG_COUNT_DISTINCT = 13;
}

// ── Cell Span ──

// Content-based cell merging. The engine compares adjacent cell values
// and visually merges cells with identical content. See engine/src/span.rs.
// Spans never cross fixed/frozen/pinned boundaries or subtotal rows.
//
//   NONE (0):        No spanning.
//   FREE (1):        Expand in all directions (up/down/left/right).
//   BY_ROW (2):      Vertical spanning only. Left-column dependency:
//                    adjacent left cells must also match.
//   BY_COLUMN (3):   Horizontal spanning only. No above-cell dependency.
//   ADJACENT (4):    Either row OR column spanning (whichever matches).
//   HEADER_ONLY (5): Only span in fixed/frozen cells, not data cells.
//   SPILL (6):       Text spills right into empty adjacent cells.
//   GROUP (7):       Like SPILL but only on subtotal rows.
enum CellSpanMode {
  CELL_SPAN_NONE        = 0;
  CELL_SPAN_FREE        = 1;
  CELL_SPAN_BY_ROW      = 2;
  CELL_SPAN_BY_COLUMN   = 3;
  CELL_SPAN_ADJACENT    = 4;
  CELL_SPAN_HEADER_ONLY = 5;
  CELL_SPAN_SPILL       = 6;
  CELL_SPAN_GROUP       = 7;
}

// Text normalization used when comparing cells for content-based spans
// and subtotal/group keys.
enum SpanCompareMode {
  SPAN_COMPARE_EXACT        = 0;
  SPAN_COMPARE_NO_CASE      = 1;
  SPAN_COMPARE_TRIM_NO_CASE = 2;
  SPAN_COMPARE_INCLUDE_NULLS = 3;
}

// ── Scrolling ──

enum ScrollBarsMode {
  SCROLLBAR_NONE       = 0;
  SCROLLBAR_HORIZONTAL = 1;
  SCROLLBAR_VERTICAL   = 2;
  SCROLLBAR_BOTH       = 3;
}

enum ScrollBarMode {
  SCROLLBAR_MODE_AUTO   = 0;
  SCROLLBAR_MODE_ALWAYS = 1;
  SCROLLBAR_MODE_NEVER  = 2;
}

enum ScrollBarAppearance {
  SCROLLBAR_APPEARANCE_CLASSIC = 0;
  SCROLLBAR_APPEARANCE_FLAT    = 1;
  SCROLLBAR_APPEARANCE_MODERN  = 2;
  SCROLLBAR_APPEARANCE_OVERLAY = 3;
}

message ScrollBarColors {
  optional uint32 thumb        = 1;
  optional uint32 thumb_hover  = 2;
  optional uint32 thumb_active = 3;
  optional uint32 track        = 4;
  optional uint32 arrow        = 5;
  optional uint32 border       = 6;
}

message ScrollBarConfig {
  optional ScrollBarMode       show_h           = 1;
  optional ScrollBarMode       show_v           = 2;
  optional ScrollBarAppearance appearance       = 3;
  optional int32               size             = 4;
  optional int32               min_thumb        = 5;
  optional int32               corner_radius    = 6;
  ScrollBarColors              colors           = 7;
  optional int32               fade_delay_ms    = 8;
  optional int32               fade_duration_ms = 9;
  optional int32               margin           = 10;
}

// ── Layout ──

enum PinPosition {
  PIN_NONE   = 0;
  PIN_TOP    = 1;
  PIN_BOTTOM = 2;
}

enum StickyEdge {
  STICKY_NONE   = 0;
  STICKY_TOP    = 1;
  STICKY_BOTTOM = 2;
  STICKY_LEFT   = 3;
  STICKY_RIGHT  = 4;
  STICKY_BOTH   = 5;
}

// Type-ahead (incremental search) mode. See engine/src/search.rs.
// The engine buffers keystrokes and searches for matching cell text.
//   NONE (0):        Disabled.
//   FROM_START (1):  Search from the first data row.
//   FROM_CURSOR (2): Search from the current cursor row.
// Default type_ahead_delay: 2000 ms.
enum TypeAheadMode {
  TYPE_AHEAD_NONE        = 0;
  TYPE_AHEAD_FROM_START  = 1;
  TYPE_AHEAD_FROM_CURSOR = 2;
}

enum AutoSizeMode {
  AUTOSIZE_BOTH       = 0;
  AUTOSIZE_COL_WIDTH  = 1;
  AUTOSIZE_ROW_HEIGHT = 2;
}

enum DragMode {
  DRAG_NONE      = 0;
  DRAG_MANUAL    = 1;
  DRAG_AUTOMATIC = 2;
}

enum DropMode {
  DROP_NONE      = 0;
  DROP_MANUAL    = 1;
  DROP_AUTOMATIC = 2;
}

enum CustomRenderMode {
  CUSTOM_RENDER_NONE = 0;
  CUSTOM_RENDER_CELL = 1;
  CUSTOM_RENDER_ROW  = 2;
}

enum ApplyScope {
  APPLY_SINGLE    = 0;
  APPLY_SELECTION = 1;
}

// ── Rendering ──

// Rendering backend selection. See GUI.md and TUI.md.
//   AUTO (0): Engine picks CPU or GPU based on host capabilities.
//   CPU (1):  Renders into a host-owned RGBA buffer (most portable).
//   GPU (2):  Renders via wgpu to a host-provided native surface.
//   TUI (5):  Terminal mode — renders ANSI escape sequences.
// If GPU initialization fails, the engine falls back to CPU silently.
enum RendererMode {
  RENDERER_AUTO       = 0;
  RENDERER_CPU        = 1;
  RENDERER_GPU        = 2;
  RENDERER_GPU_VULKAN = 3;
  RENDERER_GPU_GLES   = 4;
  RENDERER_TUI        = 5;
}

enum PresentMode {
  PRESENT_AUTO      = 0;
  PRESENT_FIFO      = 1;
  PRESENT_MAILBOX   = 2;
  PRESENT_IMMEDIATE = 3;
}

enum FramePacingMode {
  FRAME_PACING_MODE_AUTO      = 0;
  FRAME_PACING_MODE_PLATFORM  = 1;
  FRAME_PACING_MODE_UNLIMITED = 2;
  FRAME_PACING_MODE_FIXED     = 3;
}

// ── Clear / Export / Print ──

enum ClearScope {
  CLEAR_SCOPE_UNSPECIFIED = 0;
  CLEAR_EVERYTHING        = 1;
  CLEAR_FORMATTING        = 2;
  CLEAR_DATA              = 3;
  CLEAR_SELECTION         = 4;
}

enum ClearRegion {
  CLEAR_SCROLLABLE  = 0;
  CLEAR_FIXED_ROWS  = 1;
  CLEAR_FIXED_COLS  = 2;
  CLEAR_FIXED_BOTH  = 3;
  CLEAR_ALL_ROWS    = 4;
  CLEAR_ALL_COLS    = 5;
  CLEAR_ALL_BOTH    = 6;
}

// Export formats. See engine/src/save.rs.
//   UNSPECIFIED (0): Invalid in ExportRequest.format.
//   BINARY (1):    FXGD binary — header "FXGD" + dimensions + cell data +
//                  styles + column/row properties. Preserves full fidelity.
//   TSV (2):       Tab-separated values. Text only.
//   CSV (3):       Comma-separated values. Quotes cells containing
//                  separator, newline, or quote characters.
//   DELIMITED (4): Uses the grid's clip_col_separator (default "\t").
//   XLSX (5):      SpreadsheetML XML (Excel 2003 .xml format). Applies
//                  bold to fixed rows, auto-detects numeric cells.
enum ExportFormat {
  EXPORT_FORMAT_UNSPECIFIED = 0;
  EXPORT_BINARY             = 1;
  EXPORT_TSV                = 2;
  EXPORT_CSV                = 3;
  EXPORT_DELIMITED          = 4;
  EXPORT_XLSX               = 5;
}

enum ExportScope {
  EXPORT_SCOPE_UNSPECIFIED = 0;
  EXPORT_ALL               = 1;
  EXPORT_DATA_ONLY         = 2;
  EXPORT_FORMAT_ONLY       = 3;
}

enum PrintOrientation {
  PRINT_PORTRAIT  = 0;
  PRINT_LANDSCAPE = 1;
}

enum NodeRelation {
  NODE_PARENT       = 0;
  NODE_FIRST_CHILD  = 1;
  NODE_LAST_CHILD   = 2;
  NODE_NEXT_SIBLING = 3;
  NODE_PREV_SIBLING = 4;
}

// ── Icons ──

enum IconAlign {
  ICON_ALIGN_INLINE_END   = 0;
  ICON_ALIGN_INLINE_START = 1;
  ICON_ALIGN_START        = 2;
  ICON_ALIGN_END          = 3;
  ICON_ALIGN_CENTER       = 4;
}

// Which sub-element of a cell was hit. Used in ClickEvent to tell the
// host what the user actually clicked on. Maps to HitArea variants in
// engine/src/input.rs.
enum CellHitArea {
  HIT_CELL     = 0;
  HIT_TEXT     = 1;
  HIT_PICTURE  = 2;
  HIT_BUTTON   = 3;
  HIT_CHECKBOX = 4;
  HIT_DROPDOWN = 5;
}

// ═══════════════════════════════════════════════════════════
// Style Composites
//
// Built from building blocks; used in GridConfig, CellStyle,
// HighlightStyle. All use partial-update semantics — only set
// fields override inherited defaults.
// ═══════════════════════════════════════════════════════════

// Override style for a region (fixed rows, frozen rows, etc.).
// Only set fields override the grid-level default.
message RegionStyle {
  optional uint32     background  = 1;
  optional uint32     foreground  = 2;
  Font                font        = 3;
  GridLines           grid_lines  = 4;
  optional TextEffect text_effect = 5;
  Separator           separator   = 6;
  Padding             cell_padding = 7;
}

// Per-cell style override. Composed from building blocks.
message CellStyle {
  optional uint32      background     = 1;
  optional uint32      foreground     = 2;
  optional Align       align          = 3;
  Font                 font           = 4;
  Padding              padding        = 5;
  Borders              borders        = 6;
  optional TextEffect  text_effect    = 7;
  optional float       progress       = 8;
  optional uint32      progress_color = 9;
  optional bool        shrink_to_fit  = 10;
}

// Selection / hover highlight appearance.
// Engine defaults (engine/src/selection.rs):
//   selection background = 0xFF000080 (dark blue)
//   selection foreground = 0xFFFFFFFF (white)
message HighlightStyle {
  optional uint32             background       = 1;  // ARGB
  optional uint32             foreground       = 2;  // ARGB
  Borders                     borders          = 3;
  optional FillHandlePosition fill_handle      = 4;
  optional uint32             fill_handle_color = 5; // ARGB
}

// ═══════════════════════════════════════════════════════════
// Header Style
// ═══════════════════════════════════════════════════════════

message HeaderMarkSize {
  oneof value {
    float ratio = 1;  // 0.0..1.0 of header row height
    int32 px    = 2;
  }
}

// Engine defaults (engine/src/style.rs):
//   color = 0xFFC9D2DE, width = 1px.
message HeaderSeparator {
  optional bool     enabled     = 1;
  optional uint32   color       = 2;  // ARGB
  optional int32    width       = 3;  // pixels
  HeaderMarkSize    height      = 4;
  optional bool     skip_merged = 5;
}

// Engine default: hit_width = 6px (engine/src/style.rs).
message HeaderResizeHandle {
  optional bool     enabled                  = 1;
  optional uint32   color                    = 2;  // ARGB
  optional int32    width                    = 3;  // visual width, pixels
  HeaderMarkSize    height                   = 4;
  optional int32    hit_width                = 5;  // pointer hit area, pixels; default 6
  optional bool     show_only_when_resizable = 6;
}

message HeaderStyle {
  HeaderSeparator    separator     = 1;
  HeaderResizeHandle resize_handle = 2;
}

// ═══════════════════════════════════════════════════════════
// Icon Theme
// ═══════════════════════════════════════════════════════════

// Text glyph values per slot (e.g. Material Icons codepoints).
message IconSlots {
  optional string sort_ascending         = 1;
  optional string sort_descending        = 2;
  optional string sort_none              = 3;
  optional string tree_expanded          = 4;
  optional string tree_collapsed         = 5;
  optional string menu                   = 6;
  optional string filter                 = 7;
  optional string filter_active          = 8;
  optional string columns                = 9;
  optional string drag_handle            = 10;
  optional string checkbox_checked       = 11;
  optional string checkbox_unchecked     = 12;
  optional string checkbox_indeterminate = 13;
}

// Rendering style for a single icon slot.
message IconStyle {
  Font                font  = 1;
  optional uint32     color = 2;
  optional IconAlign  align = 3;
  optional int32      gap   = 4;
}

// Per-slot style overrides.
message IconSlotStyles {
  IconStyle sort_ascending         = 1;
  IconStyle sort_descending        = 2;
  IconStyle sort_none              = 3;
  IconStyle tree_expanded          = 4;
  IconStyle tree_collapsed         = 5;
  IconStyle menu                   = 6;
  IconStyle filter                 = 7;
  IconStyle filter_active          = 8;
  IconStyle columns                = 9;
  IconStyle drag_handle            = 10;
  IconStyle checkbox_checked       = 11;
  IconStyle checkbox_unchecked     = 12;
  IconStyle checkbox_indeterminate = 13;
}

// Image-based icon alternatives (PNG/BMP assets).
message IconPictures {
  ImageData sort_ascending          = 1;
  ImageData sort_descending         = 2;
  ImageData node_open               = 3;
  ImageData node_closed             = 4;
  ImageData checkbox_checked        = 5;
  ImageData checkbox_unchecked      = 6;
  ImageData checkbox_indeterminate  = 7;
}

message IconTheme {
  IconSlots      slots     = 1;
  IconStyle      defaults  = 2;
  IconSlotStyles overrides = 3;
  IconPictures   pictures  = 4;
}

// ═══════════════════════════════════════════════════════════
// Hover Config
// ═══════════════════════════════════════════════════════════

// Hover highlight configuration.
// Internally tracked as a bitmask in engine/src/selection.rs:
//   HOVER_ROW=1, HOVER_COLUMN=2, HOVER_CELL=4.
message HoverConfig {
  optional bool  row    = 1;  // highlight entire row on mouse hover
  optional bool  column = 2;  // highlight entire column on mouse hover
  optional bool  cell   = 3;  // highlight individual cell on mouse hover
  HighlightStyle row_style    = 4;
  HighlightStyle column_style = 5;
  HighlightStyle cell_style   = 6;
}

// ═══════════════════════════════════════════════════════════
// Interaction Policies
//
// Replaced bitmask/combined enums with explicit booleans.
// ═══════════════════════════════════════════════════════════

message ResizePolicy {
  optional bool columns = 1;
  optional bool rows    = 2;
  optional bool uniform = 3;
}

message FreezePolicy {
  optional bool columns = 1;
  optional bool rows    = 2;
}

message HeaderFeatures {
  optional bool sort    = 1;
  optional bool reorder = 2;
  optional bool chooser = 3;
}

// ═══════════════════════════════════════════════════════════
// Grid Configuration
//
// All scalar fields are optional — set fields are applied,
// unset fields are left unchanged (partial-update semantics).
//
// Implementation: engine/src/config.rs apply_config() checks each
// sub-message with `if let Some(...)`, and each field within with
// `if let Some(v) = field { apply(v) }`. Prost `optional` fields
// map to `Option<T>`, giving perfect partial-update semantics.
//
// This means you can send a Configure() RPC with only the fields
// you want to change — everything else stays as-is.
// ═══════════════════════════════════════════════════════════

message GridConfig {
  LayoutConfig      layout      = 1;
  StyleConfig       style       = 2;
  SelectionConfig   selection   = 3;
  EditConfig        editing     = 4;
  ScrollConfig      scrolling   = 5;
  OutlineConfig     outline     = 6;
  SpanConfig        span        = 7;
  InteractionConfig interaction = 8;
  RenderConfig      rendering   = 9;
  string            version     = 10;
  IndicatorsConfig  indicators  = 11;
}

// ── Layout ──
// Pure structural dimensions. Text defaults moved to StyleConfig.
//
// Fixed vs Frozen (engine/src/grid.rs):
//   fixed_rows/cols  = non-scrollable header rows/columns. Always rendered
//                      at the top/left edge. Used for column headers.
//   frozen_rows/cols = non-scrollable DATA rows/columns that appear below/right
//                      of fixed rows/cols. Used for "pinned" data sections.
// Scrollable data starts at row (fixed_rows + frozen_rows) and
// col (fixed_cols + frozen_cols).
//
// Engine defaults: default_row_height=20px, default_col_width=68px.
// TUI mode defaults: row_height=1, col_width=15 (character cells).
message LayoutConfig {
  optional int32 rows               = 1;  // total rows (including fixed)
  optional int32 cols               = 2;  // total cols (including fixed)
  optional int32 fixed_rows         = 3;  // clamped to 0..rows
  optional int32 fixed_cols         = 4;  // clamped to 0..cols
  optional int32 frozen_rows        = 5;  // clamped to 0..(rows - fixed_rows)
  optional int32 frozen_cols        = 6;  // clamped to 0..(cols - fixed_cols)
  optional int32 default_row_height = 7;  // pixels; engine default 20
  optional int32 default_col_width  = 8;  // pixels; engine default 68
  optional bool  right_to_left      = 9;
  optional bool  extend_last_col    = 10; // last column fills remaining viewport width
}

// ── Style ──
// Nested by region. Building blocks eliminate flat field sprawl.
//
// Style resolution priority (engine/src/grid.rs resolve_cell_padding):
//   1. Per-cell override (CellStyle via UpdateCells)
//   2. Per-column override (ColumnDef.padding)
//   3. Region override (StyleConfig.fixed / StyleConfig.frozen)
//   4. Grid-level default (this message)
//
// Engine color defaults (engine/src/style.rs GridStyleState):
//   background      = 0xFFFFFFFF (white)
//   foreground      = 0xFF000000 (black)
//   fixed back      = 0xFFC0C0C0 (light gray)
//   grid line color = 0xFFC0C0C0
//   alternate_background = 0x00000000 (transparent = disabled)
message StyleConfig {
  // Cell defaults
  optional uint32      background           = 1;  // ARGB; default 0xFFFFFFFF
  optional uint32      foreground           = 2;  // ARGB; default 0xFF000000
  optional uint32      alternate_background = 3;  // ARGB; 0x00000000 = off
  Font                 font                 = 4;
  Padding              cell_padding         = 5;
  optional TextEffect  text_effect          = 6;
  optional uint32      progress_color       = 7;  // ARGB

  // Grid lines (scrollable area)
  GridLines            grid_lines           = 10;

  // Region overrides — only set fields override the defaults above.
  // Fixed default: back=0xFFC0C0C0, grid_lines=GRIDLINE_INSET.
  RegionStyle          fixed                = 11;
  RegionStyle          frozen               = 12;

  // Header-specific appearance
  HeaderStyle          header               = 13;

  // Sheet-level
  optional uint32          sheet_background = 20;
  optional uint32          sheet_border     = 21;
  optional BorderAppearance appearance      = 22;

  // Background image
  optional bytes           background_image       = 23;
  optional ImageAlignment  background_image_align = 24;

  // Text rendering
  TextRendering            text_rendering         = 25;

  // Icons
  IconTheme                icons                  = 30;

  // Rendering options
  optional bool             image_over_text       = 31;
  optional bool             show_sort_numbers     = 32;
  optional ApplyScope       apply_scope           = 33;
  optional CustomRenderMode custom_render         = 34;

  // Default cell text behavior (moved from LayoutConfig)
  optional string          format       = 40;
  optional bool            word_wrap    = 41;
  optional int32           ellipsis     = 42;
  optional bool            text_overflow = 43;
}

// ── Selection ──
message SelectionConfig {
  optional SelectionMode       mode                = 1;
  optional FocusBorderStyle    focus_border         = 2;
  optional SelectionVisibility visibility           = 3;
  optional bool                allow                = 4;
  optional bool                header_click_select  = 5;
  HighlightStyle               style                = 6;
  HoverConfig                  hover                = 7;
  HighlightStyle               indicator_row_style  = 8;
  HighlightStyle               indicator_col_style  = 9;
  HighlightStyle               active_cell_style    = 10;
}

// ── Editing ──
// The engine maintains a full edit state machine (engine/src/edit.rs).
// Two UI modes exist:
//   EnterMode (default): Enter commits and moves cursor down.
//     Character keys auto-replace cell content and start editing.
//   EditMode (F2):       Caret placed at end. Escape cancels.
//     Enter commits. Arrow keys move caret within text.
message EditConfig {
  optional EditTrigger     trigger              = 1;
  optional TabBehavior     tab_behavior         = 2;
  optional DropdownTrigger dropdown_trigger      = 3;
  // When true, typing in a dropdown cell searches the list items.
  optional bool            dropdown_search       = 4;
  optional int32           max_length            = 5;  // 0 = unlimited
  optional string          mask                  = 6;  // global edit mask, e.g. "(999) 999-9999"
  // When true, the engine stops handling edit-action keys; the host
  // adapter drives editing via RPC (EditCommand) instead.
  optional bool            host_key_dispatch     = 7;
  // When true, the engine stops handling pointer-driven selection/edit;
  // the host adapter drives via RPC.
  optional bool            host_pointer_dispatch = 8;
  // Enables engine-side compose for platforms without a host IME.
  optional bool            engine_compose        = 9;
  // Selects the active engine-side compose algorithm.
  optional ComposeMethod   compose_method        = 10;
}

// ── Scrolling ──
enum PullToRefreshTheme {
  PULL_TO_REFRESH_THEME_UNSPECIFIED = 0;
  PULL_TO_REFRESH_THEME_TOP_BAND    = 1;
  PULL_TO_REFRESH_THEME_MATERIAL    = 2;
}

message PullToRefreshConfig {
  optional bool               enabled      = 1;
  optional PullToRefreshTheme theme        = 2;
  optional string             text_pull    = 3;
  optional string             text_release = 4;
}

// Engine fling physics (engine/src/scroll.rs):
//   Velocity blending: 35% old + 65% new on each impulse.
//   Damping: velocity *= exp(−friction × dt). Stops at <8.0 px/s.
//   Defaults: fling_impulse_gain=30.0, fling_friction=2.0.
message ScrollConfig {
  ScrollBarConfig         scroll_bar         = 1;
  // If false, fling stops on next user input (no inertial carry-over).
  optional bool           scroll_track       = 2;
  optional bool           scroll_tips        = 3;
  optional bool           fling_enabled      = 4;  // default true
  optional float          fling_impulse_gain = 5;  // default 30.0
  optional float          fling_friction     = 6;  // default 2.0
  optional bool           pinch_zoom_enabled = 7;  // default true
  optional bool           fast_scroll        = 8;  // mobile fast-scroll overlay
  optional ScrollBarsMode scrollbars         = 9;
  PullToRefreshConfig     pull_to_refresh    = 10;
}

// ── Outline / Tree ──
// See engine/src/outline.rs. Subtotal inserts aggregate rows that group
// data by a column's value. Outline levels control tree expand/collapse.
//   outline_level = -1: grand total row
//   outline_level = 0+: nested group levels
message OutlineConfig {
  optional TreeIndicatorStyle tree_indicator       = 1;
  optional int32              tree_column           = 2;  // column index for tree indicators
  optional uint32             tree_color            = 3;  // ARGB; default 0xFF808080
  optional GroupTotalPosition group_total_position  = 4;  // ABOVE or BELOW the group
  // When true, repeated Subtotal() calls with the same group_on_col
  // reuse existing subtotal rows instead of inserting new ones, allowing
  // multiple aggregate columns (e.g. Sales + Cost) in a single row.
  optional bool               multi_totals          = 5;
}

// ── Cell Span ──
// Controls content-based cell merging. See engine/src/span.rs.
message SpanConfig {
  optional CellSpanMode cell_span         = 1;  // span mode for data cells
  optional CellSpanMode cell_span_fixed   = 2;  // span mode for fixed/frozen cells
  optional SpanCompareMode cell_span_compare  = 3;
  optional SpanCompareMode group_span_compare = 4;
}

// ── Interaction ──
message InteractionConfig {
  ResizePolicy        resize          = 1;
  FreezePolicy        freeze          = 2;
  optional TypeAheadMode type_ahead   = 3;
  optional int32      type_ahead_delay = 4;
  optional bool       auto_size_mouse  = 5;
  optional AutoSizeMode auto_size_mode = 6;
  // When true, bulk bind/load paths do a one-time auto-fit of row heights
  // and/or column widths using `auto_size_mode`. Also triggered after
  // Subtotal() insertion (engine/src/outline.rs note_auto_resize_targets).
  // Disable this for very large datasets (e.g. ~1M rows), because
  // auto-fit scans many or all cells to measure text width/height.
  optional bool       auto_resize      = 7;
  optional DragMode   drag_mode        = 8;
  optional DropMode   drop_mode        = 9;
  HeaderFeatures      header_features  = 10;
}

// ── Render layer bit positions (for render_layer_mask bitmask) ──
// The engine renders through 28 independent layers (engine/src/canvas.rs
// layer module). Each layer is guarded by its bit in render_layer_mask.
// Setting bit i enables layer i. Set all bits (-1) to render everything.
enum RenderLayerBit {
  RENDER_LAYER_OVERLAY_BANDS    = 0;
  RENDER_LAYER_INDICATORS       = 1;
  RENDER_LAYER_BACKGROUNDS      = 2;
  RENDER_LAYER_PROGRESS_BARS    = 3;
  RENDER_LAYER_GRID_LINES       = 4;
  RENDER_LAYER_HEADER_MARKS     = 5;
  RENDER_LAYER_BACKGROUND_IMAGE = 6;
  RENDER_LAYER_CELL_BORDERS     = 7;
  RENDER_LAYER_CELL_TEXT        = 8;
  RENDER_LAYER_CELL_PICTURES    = 9;
  RENDER_LAYER_SORT_GLYPHS      = 10;
  RENDER_LAYER_COL_DRAG_MARKER  = 11;
  RENDER_LAYER_CHECKBOXES       = 12;
  RENDER_LAYER_DROPDOWN_BUTTONS = 13;
  RENDER_LAYER_SELECTION        = 14;
  RENDER_LAYER_HOVER_HIGHLIGHT  = 15;
  RENDER_LAYER_EDIT_HIGHLIGHTS  = 16;
  RENDER_LAYER_FOCUS_RECT       = 17;
  RENDER_LAYER_FILL_HANDLE      = 18;
  RENDER_LAYER_OUTLINE          = 19;
  RENDER_LAYER_FROZEN_BORDERS   = 20;
  RENDER_LAYER_ACTIVE_EDITOR    = 21;
  RENDER_LAYER_ACTIVE_DROPDOWN  = 22;
  RENDER_LAYER_SCROLL_BARS      = 23;
  RENDER_LAYER_FAST_SCROLL      = 24;
  RENDER_LAYER_PULL_TO_REFRESH  = 25;
  RENDER_LAYER_DEBUG_OVERLAY    = 26;
  RENDER_LAYER_BARCODES         = 27;
}

// ── Rendering ──
// The engine renders through 28 independent layers (engine/src/canvas.rs).
// Each layer can be individually toggled via render_layer_mask.
message RenderConfig {
  optional RendererMode    renderer_mode         = 1;
  optional bool            debug_overlay         = 2;   // shows FPS, cell counts, memory
  optional bool            animation_enabled     = 3;
  optional int32           animation_duration_ms = 4;
  optional int32           text_layout_cache_cap = 5;   // max entries in text layout cache
  optional PresentMode     present_mode          = 6;   // GPU V-Sync strategy
  optional FramePacingMode frame_pacing_mode     = 7;
  optional int32           target_frame_rate_hz  = 8;   // for FIXED pacing; default 30
  // Bitmask using RenderLayerBit positions. Set bit i to enable layer i.
  // -1 (all bits set) = all layers on. 0 = no layers rendered.
  optional int64           render_layer_mask     = 9;
  optional bool            layer_profiling       = 10;  // per-layer timing in FrameMetrics
  // CPU scroll-blit optimization: reuses previously-rendered pixels
  // when only scroll position changes. Only valid when no animation,
  // no editing, no background image, and not right-to-left.
  optional bool            scroll_blit           = 11;
}

