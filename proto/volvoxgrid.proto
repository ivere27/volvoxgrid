  FRAME_PACING_MODE_UNLIMITED = 2;
  FRAME_PACING_MODE_FIXED     = 3;
}

// ── Clear / Export / Print ──

enum ClearScope {
  CLEAR_EVERYTHING  = 0;
  CLEAR_FORMATTING  = 1;
  CLEAR_DATA        = 2;
  CLEAR_SELECTION   = 3;
}

enum ClearRegion {
  CLEAR_SCROLLABLE  = 0;
  CLEAR_FIXED_ROWS  = 1;
  CLEAR_FIXED_COLS  = 2;
  CLEAR_FIXED_BOTH  = 3;
  CLEAR_ALL_ROWS    = 4;
  CLEAR_ALL_COLS    = 5;
  CLEAR_ALL_BOTH    = 6;
}

enum ExportFormat {
  EXPORT_BINARY    = 0;
  EXPORT_TSV       = 1;
  EXPORT_CSV       = 2;
  EXPORT_DELIMITED = 3;
  EXPORT_XLSX      = 4;
}

enum ExportScope {
  EXPORT_ALL         = 0;
  EXPORT_DATA_ONLY   = 1;
  EXPORT_FORMAT_ONLY = 2;
}

enum PrintOrientation {
  PRINT_PORTRAIT  = 0;
  PRINT_LANDSCAPE = 1;
}

enum NodeRelation {
  NODE_PARENT       = 0;
  NODE_FIRST_CHILD  = 1;
  NODE_LAST_CHILD   = 2;
  NODE_NEXT_SIBLING = 3;
  NODE_PREV_SIBLING = 4;
}

// ── Icons ──

enum IconAlign {
  ICON_ALIGN_INLINE_END   = 0;
  ICON_ALIGN_INLINE_START = 1;
  ICON_ALIGN_START        = 2;
  ICON_ALIGN_END          = 3;
  ICON_ALIGN_CENTER       = 4;
}

enum CellHitArea {
  HIT_CELL     = 0;
  HIT_TEXT     = 1;
  HIT_PICTURE  = 2;
  HIT_BUTTON   = 3;
  HIT_CHECKBOX = 4;
  HIT_DROPDOWN = 5;
}

// ═══════════════════════════════════════════════════════════
// Style Composites
//
// Built from building blocks; used in GridConfig, CellStyle,
// HighlightStyle.
// ═══════════════════════════════════════════════════════════

// Override style for a region (fixed rows, frozen rows, etc.).
// Only set fields override the grid-level default.
message RegionStyle {
  optional uint32     background  = 1;
  optional uint32     foreground  = 2;
  Font                font        = 3;
  GridLines           grid_lines  = 4;
  optional TextEffect text_effect = 5;
  Separator           separator   = 6;
  Padding             cell_padding = 7;
}

// Per-cell style override. Composed from building blocks.
message CellStyle {
  optional uint32      background     = 1;
  optional uint32      foreground     = 2;
  optional Align       align          = 3;
  Font                 font           = 4;
  Padding              padding        = 5;
  Borders              borders        = 6;
  optional TextEffect  text_effect    = 7;
  optional float       progress       = 8;
  optional uint32      progress_color = 9;
  optional bool        shrink_to_fit  = 10;
}

// Selection / hover highlight appearance.
message HighlightStyle {
  optional uint32             background       = 1;
  optional uint32             foreground       = 2;
  Borders                     borders          = 3;
  optional FillHandlePosition fill_handle      = 4;
  optional uint32             fill_handle_color = 5;
}

// ═══════════════════════════════════════════════════════════
// Header Style
// ═══════════════════════════════════════════════════════════

message HeaderMarkSize {
  oneof value {
    float ratio = 1;  // 0.0..1.0 of header row height
    int32 px    = 2;
  }
}

message HeaderSeparator {
  optional bool     enabled     = 1;
  optional uint32   color       = 2;
  optional int32    width       = 3;
  HeaderMarkSize    height      = 4;
  optional bool     skip_merged = 5;
}

message HeaderResizeHandle {
  optional bool     enabled                  = 1;
  optional uint32   color                    = 2;
  optional int32    width                    = 3;
  HeaderMarkSize    height                   = 4;
  optional int32    hit_width                = 5;
  optional bool     show_only_when_resizable = 6;
}

message HeaderStyle {
  HeaderSeparator    separator     = 1;
  HeaderResizeHandle resize_handle = 2;
}

// ═══════════════════════════════════════════════════════════
// Icon Theme
// ═══════════════════════════════════════════════════════════

// Text glyph values per slot (e.g. Material Icons codepoints).
message IconSlots {
  optional string sort_ascending         = 1;
  optional string sort_descending        = 2;
  optional string sort_none              = 3;
  optional string tree_expanded          = 4;
  optional string tree_collapsed         = 5;
  optional string menu                   = 6;
  optional string filter                 = 7;
  optional string filter_active          = 8;
  optional string columns                = 9;
  optional string drag_handle            = 10;
  optional string checkbox_checked       = 11;
  optional string checkbox_unchecked     = 12;
  optional string checkbox_indeterminate = 13;
}

// Rendering style for a single icon slot.
message IconStyle {
  Font                font  = 1;
  optional uint32     color = 2;
  optional IconAlign  align = 3;
  optional int32      gap   = 4;
}

// Per-slot style overrides.
message IconSlotStyles {
  IconStyle sort_ascending         = 1;
  IconStyle sort_descending        = 2;
  IconStyle sort_none              = 3;
  IconStyle tree_expanded          = 4;
  IconStyle tree_collapsed         = 5;
  IconStyle menu                   = 6;
  IconStyle filter                 = 7;
  IconStyle filter_active          = 8;
  IconStyle columns                = 9;
  IconStyle drag_handle            = 10;
  IconStyle checkbox_checked       = 11;
  IconStyle checkbox_unchecked     = 12;
  IconStyle checkbox_indeterminate = 13;
}

// Image-based icon alternatives (PNG/BMP assets).
message IconPictures {
  ImageData sort_ascending          = 1;
  ImageData sort_descending         = 2;
  ImageData node_open               = 3;
  ImageData node_closed             = 4;
  ImageData checkbox_checked        = 5;
  ImageData checkbox_unchecked      = 6;
  ImageData checkbox_indeterminate  = 7;
}

message IconTheme {
  IconSlots      slots     = 1;
  IconStyle      defaults  = 2;
  IconSlotStyles overrides = 3;
  IconPictures   pictures  = 4;
}

// ═══════════════════════════════════════════════════════════
// Hover Config
// ═══════════════════════════════════════════════════════════

message HoverConfig {
  optional bool  row    = 1;
  optional bool  column = 2;
  optional bool  cell   = 3;
  HighlightStyle row_style    = 4;
  HighlightStyle column_style = 5;
  HighlightStyle cell_style   = 6;
}

// ═══════════════════════════════════════════════════════════
// Interaction Policies
//
// Replaced bitmask/combined enums with explicit booleans.
// ═══════════════════════════════════════════════════════════

message ResizePolicy {
  optional bool columns = 1;
  optional bool rows    = 2;
  optional bool uniform = 3;
}

message FreezePolicy {
  optional bool columns = 1;
  optional bool rows    = 2;
}

message HeaderFeatures {
  optional bool sort    = 1;
  optional bool reorder = 2;
  optional bool chooser = 3;
}

// ═══════════════════════════════════════════════════════════
// Grid Configuration
//
// All scalar fields are optional — set fields are applied,
// unset fields are left unchanged (partial-update semantics).
// ═══════════════════════════════════════════════════════════

message GridConfig {
  LayoutConfig      layout      = 1;
  StyleConfig       style       = 2;
  SelectionConfig   selection   = 3;
  EditConfig        editing     = 4;
  ScrollConfig      scrolling   = 5;
  OutlineConfig     outline     = 6;
  SpanConfig        span        = 7;
  InteractionConfig interaction = 8;
  RenderConfig      rendering   = 9;
  string            version     = 10;
  IndicatorsConfig  indicators  = 11;
}

// ── Layout ──
// Pure structural dimensions. Text defaults moved to StyleConfig.
message LayoutConfig {
  optional int32 rows               = 1;
  optional int32 cols               = 2;
  optional int32 fixed_rows         = 3;
  optional int32 fixed_cols         = 4;
  optional int32 frozen_rows        = 5;
  optional int32 frozen_cols        = 6;
  optional int32 default_row_height = 7;
  optional int32 default_col_width  = 8;
  optional bool  right_to_left      = 9;
  optional bool  extend_last_col    = 10;
}

// ── Style ──
// Nested by region. Building blocks eliminate flat field sprawl.
message StyleConfig {
  // Cell defaults
  optional uint32      background           = 1;
  optional uint32      foreground           = 2;
  optional uint32      alternate_background = 3;
  Font                 font                 = 4;
  Padding              cell_padding         = 5;
  optional TextEffect  text_effect          = 6;
  optional uint32      progress_color       = 7;

  // Grid lines (scrollable area)
  GridLines            grid_lines           = 10;

  // Region overrides — only set fields override the defaults above
  RegionStyle          fixed                = 11;
  RegionStyle          frozen               = 12;

  // Header-specific appearance
  HeaderStyle          header               = 13;

  // Sheet-level
  optional uint32          sheet_background = 20;
  optional uint32          sheet_border     = 21;
  optional BorderAppearance appearance      = 22;

  // Background image
  optional bytes           background_image       = 23;
  optional ImageAlignment  background_image_align = 24;

  // Text rendering
  TextRendering            text_rendering         = 25;

  // Icons
  IconTheme                icons                  = 30;

  // Rendering options
  optional bool             image_over_text       = 31;
  optional bool             show_sort_numbers     = 32;
  optional ApplyScope       apply_scope           = 33;
  optional CustomRenderMode custom_render         = 34;

  // Default cell text behavior (moved from LayoutConfig)
  optional string          format       = 40;
  optional bool            word_wrap    = 41;
  optional int32           ellipsis     = 42;
  optional bool            text_overflow = 43;
}

// ── Selection ──
message SelectionConfig {
  optional SelectionMode       mode                = 1;
  optional FocusBorderStyle    focus_border         = 2;
  optional SelectionVisibility visibility           = 3;
  optional bool                allow                = 4;
  optional bool                header_click_select  = 5;
  HighlightStyle               style                = 6;
  HoverConfig                  hover                = 7;
  HighlightStyle               indicator_row_style  = 8;
  HighlightStyle               indicator_col_style  = 9;
  HighlightStyle               active_cell_style    = 10;
}

// ── Editing ──
message EditConfig {
  optional EditTrigger     trigger              = 1;
  optional TabBehavior     tab_behavior         = 2;
  optional DropdownTrigger dropdown_trigger      = 3;
  optional bool            dropdown_search       = 4;
  optional int32           max_length            = 5;
  optional string          mask                  = 6;
  optional bool            host_key_dispatch     = 7;
  optional bool            host_pointer_dispatch = 8;
}

// ── Scrolling ──
message ScrollConfig {
  ScrollBarConfig         scroll_bar         = 1;
  optional bool           scroll_track       = 2;
  optional bool           scroll_tips        = 3;
  optional bool           fling_enabled      = 4;
  optional float          fling_impulse_gain = 5;
  optional float          fling_friction     = 6;
  optional bool           pinch_zoom_enabled = 7;
  optional bool           fast_scroll        = 8;
  optional ScrollBarsMode scrollbars         = 9;
}

// ── Outline / Tree ──
message OutlineConfig {
  optional TreeIndicatorStyle tree_indicator       = 1;
  optional int32              tree_column           = 2;
  optional uint32             tree_color            = 3;
  optional GroupTotalPosition group_total_position  = 4;
  optional bool               multi_totals          = 5;
}

// ── Cell Span ──
message SpanConfig {
  optional CellSpanMode cell_span         = 1;
  optional CellSpanMode cell_span_fixed   = 2;
  optional int32        cell_span_compare = 3;
  optional int32        group_span_compare = 4;
}

// ── Interaction ──
message InteractionConfig {
  ResizePolicy        resize          = 1;
  FreezePolicy        freeze          = 2;
  optional TypeAheadMode type_ahead   = 3;
  optional int32      type_ahead_delay = 4;
  optional bool       auto_size_mouse  = 5;
  optional AutoSizeMode auto_size_mode = 6;
  optional bool       auto_resize      = 7;
  optional DragMode   drag_mode        = 8;
  optional DropMode   drop_mode        = 9;
  HeaderFeatures      header_features  = 10;
}

// ── Render layer bit positions (for render_layer_mask bitmask) ──
enum RenderLayerBit {
  RENDER_LAYER_OVERLAY_BANDS    = 0;
  RENDER_LAYER_INDICATORS       = 1;
  RENDER_LAYER_BACKGROUNDS      = 2;
  RENDER_LAYER_PROGRESS_BARS    = 3;
  RENDER_LAYER_GRID_LINES       = 4;
  RENDER_LAYER_HEADER_MARKS     = 5;
  RENDER_LAYER_BACKGROUND_IMAGE = 6;
  RENDER_LAYER_CELL_BORDERS     = 7;
  RENDER_LAYER_CELL_TEXT        = 8;
  RENDER_LAYER_CELL_PICTURES    = 9;
  RENDER_LAYER_SORT_GLYPHS      = 10;
  RENDER_LAYER_COL_DRAG_MARKER  = 11;
  RENDER_LAYER_CHECKBOXES       = 12;
  RENDER_LAYER_DROPDOWN_BUTTONS = 13;
  RENDER_LAYER_SELECTION        = 14;
  RENDER_LAYER_HOVER_HIGHLIGHT  = 15;
  RENDER_LAYER_EDIT_HIGHLIGHTS  = 16;
  RENDER_LAYER_FOCUS_RECT       = 17;
  RENDER_LAYER_FILL_HANDLE      = 18;
  RENDER_LAYER_OUTLINE          = 19;
  RENDER_LAYER_FROZEN_BORDERS   = 20;
  RENDER_LAYER_ACTIVE_EDITOR    = 21;
  RENDER_LAYER_ACTIVE_DROPDOWN  = 22;
  RENDER_LAYER_SCROLL_BARS      = 23;
  RENDER_LAYER_FAST_SCROLL      = 24;
  RENDER_LAYER_DEBUG_OVERLAY    = 25;
}

// ── Rendering ──
message RenderConfig {
  optional RendererMode    renderer_mode         = 1;
  optional bool            debug_overlay         = 2;
  optional bool            animation_enabled     = 3;
  optional int32           animation_duration_ms = 4;
  optional int32           text_layout_cache_cap = 5;
  optional PresentMode     present_mode          = 6;
  optional FramePacingMode frame_pacing_mode     = 7;
  optional int32           target_frame_rate_hz  = 8;
  optional int64           render_layer_mask     = 9;   // bitmask using RenderLayerBit; -1 = all on
  optional bool            layer_profiling       = 10;  // collect per-layer timings without requiring debug overlay
  optional bool            scroll_blit           = 11;
}

// ═══════════════════════════════════════════════════════════
// Indicators
// ═══════════════════════════════════════════════════════════

enum RowIndicatorSlotKind {
  ROW_INDICATOR_SLOT_NONE        = 0;
  ROW_INDICATOR_SLOT_NUMBERS     = 1;
  ROW_INDICATOR_SLOT_CURRENT     = 2;
  ROW_INDICATOR_SLOT_SELECTION   = 3;
  ROW_INDICATOR_SLOT_CHECKBOX    = 4;
  ROW_INDICATOR_SLOT_HANDLE      = 5;
  ROW_INDICATOR_SLOT_EDITING     = 6;
  ROW_INDICATOR_SLOT_MODIFIED    = 7;
  ROW_INDICATOR_SLOT_ERROR       = 8;
  ROW_INDICATOR_SLOT_NEW_ROW     = 9;
  ROW_INDICATOR_SLOT_EXPANDER    = 10;
  ROW_INDICATOR_SLOT_RESIZE      = 11;
  ROW_INDICATOR_SLOT_ACTION      = 12;
  ROW_INDICATOR_SLOT_STATUS_ICON = 13;
  ROW_INDICATOR_SLOT_CUSTOM      = 14;
}

enum RowIndicatorMode {
  ROW_INDICATOR_NONE        = 0;
  ROW_INDICATOR_NUMBERS     = 1;
  ROW_INDICATOR_CURRENT     = 2;
  ROW_INDICATOR_SELECTION   = 4;
  ROW_INDICATOR_CHECKBOX    = 8;
  ROW_INDICATOR_HANDLE      = 16;
  ROW_INDICATOR_EDITING     = 32;
  ROW_INDICATOR_MODIFIED    = 64;
  ROW_INDICATOR_ERROR       = 128;
  ROW_INDICATOR_NEW_ROW     = 256;
  ROW_INDICATOR_EXPANDER    = 512;
  ROW_INDICATOR_RESIZE      = 1024;
  ROW_INDICATOR_ACTION      = 2048;
  ROW_INDICATOR_STATUS_ICON = 4096;
  ROW_INDICATOR_CUSTOM      = 8192;
}

enum ColIndicatorCellMode {
  COL_INDICATOR_CELL_NONE          = 0;
  COL_INDICATOR_CELL_HEADER_TEXT   = 1;
  COL_INDICATOR_CELL_SORT_GLYPH   = 2;
  COL_INDICATOR_CELL_SORT_PRIORITY = 4;
  COL_INDICATOR_CELL_FILTER_BUTTON = 8;
  COL_INDICATOR_CELL_FILTER_STATE  = 16;
  COL_INDICATOR_CELL_MENU_BUTTON   = 32;
  COL_INDICATOR_CELL_CHOOSER       = 64;
  COL_INDICATOR_CELL_DRAG_REORDER  = 128;
  COL_INDICATOR_CELL_HIDDEN_MARKER = 256;
  COL_INDICATOR_CELL_RESIZE_HANDLE = 512;
  COL_INDICATOR_CELL_SELECT_ALL    = 1024;
  COL_INDICATOR_CELL_STATUS_ICON   = 2048;
  COL_INDICATOR_CELL_CUSTOM        = 4096;
}

message RowIndicatorSlot {
  optional RowIndicatorSlotKind kind       = 1;
  optional int32                width      = 2;
  optional bool                 visible    = 3;
  optional string               custom_key = 4;
  optional bytes                data       = 5;
}

message RowIndicatorConfig {
  optional bool             visible       = 1;
  optional int32            width         = 2;
  optional uint32           mode_bits     = 3;
  optional uint32           background    = 4;
  optional uint32           foreground    = 5;
  optional GridLineStyle    grid_lines    = 6;
  optional uint32           grid_color    = 7;
  optional bool             auto_size     = 8;
  optional bool             allow_resize  = 9;
  optional bool             allow_select  = 10;
  optional bool             allow_reorder = 11;
  repeated RowIndicatorSlot slots         = 12;
}

message ColIndicatorRowDef {
  optional int32 index    = 1;
  optional int32 height   = 2;
}

message ColIndicatorCell {
  optional int32  row1       = 1;
  optional int32  row2       = 2;
  optional int32  col1       = 3;
  optional int32  col2       = 4;
  optional string text       = 5;
  optional uint32 mode_bits  = 6;
  optional string custom_key = 7;
  optional bytes  data       = 8;
}

message ColIndicatorConfig {
  optional bool              visible            = 1;
  optional int32             default_row_height = 2;
  optional int32             band_rows          = 3;
  optional uint32            mode_bits          = 4;
  optional uint32            background         = 5;
  optional uint32            foreground         = 6;
  optional GridLineStyle     grid_lines         = 7;
  optional uint32            grid_color         = 8;
  optional bool              auto_size          = 9;
  optional bool              allow_resize       = 10;
  optional bool              allow_reorder      = 11;
  optional bool              allow_menu         = 12;
  repeated ColIndicatorRowDef row_defs           = 13;
  repeated ColIndicatorCell   cells              = 14;
}

message CornerIndicatorConfig {
  optional bool   visible    = 1;
  optional uint32 mode_bits  = 2;
  optional uint32 background = 3;
  optional uint32 foreground = 4;
  optional string custom_key = 5;
  optional bytes  data       = 6;
}

message IndicatorsConfig {
  RowIndicatorConfig    row_start          = 1;
  RowIndicatorConfig    row_end            = 2;
  ColIndicatorConfig    col_top            = 3;
  ColIndicatorConfig    col_bottom         = 4;
  CornerIndicatorConfig corner_top_start   = 5;
  CornerIndicatorConfig corner_top_end     = 6;
  CornerIndicatorConfig corner_bottom_start = 7;
  CornerIndicatorConfig corner_bottom_end  = 8;
}

// ═══════════════════════════════════════════════════════════
// Column & Row Definitions
// ═══════════════════════════════════════════════════════════

message ColumnDef {
  int32                   index          = 1;
  optional int32          width          = 2;
  optional int32          min_width      = 3;
  optional int32          max_width      = 4;
  optional string         caption        = 5;
  optional Align          align          = 6;
  optional Align          fixed_align    = 7;
  optional ColumnDataType data_type      = 8;
  optional string         format         = 9;
  optional string         key            = 10;
  optional SortOrder      sort_order     = 11;
  optional SortType       sort_type      = 12;
  // Pipe-delimited dropdown items; prefix with `|` to make the list editable.
  optional string         dropdown_items = 13;
  optional string         edit_mask      = 14;
  optional int32          indent         = 15;
  optional bool           hidden         = 16;
  optional bool           span           = 17;
  repeated ImageData      image_list     = 18;
  optional bytes          data           = 19;
  optional StickyEdge     sticky         = 20;
  Padding                 padding        = 21;
  Padding                 fixed_padding  = 22;
  optional bool           nullable       = 23;
  optional CoercionMode   coercion_mode  = 24;
  optional WriteErrorMode error_mode     = 25;
  optional CellInteraction interaction   = 26;
}

message DefineColumnsRequest {
  int64              grid_id = 1;
  repeated ColumnDef columns = 2;
}

message RowDef {
  int32                index         = 1;
  optional int32       height        = 2;
  optional bool        hidden        = 3;
  optional bool        is_subtotal   = 4;
  optional int32       outline_level = 5;
  optional bool        is_collapsed  = 6;
  optional bytes       data          = 7;
  optional int32       status        = 8;
  optional bool        span          = 9;
  optional PinPosition pin           = 10;
  optional StickyEdge  sticky        = 11;
}

message DefineRowsRequest {
  int64           grid_id = 1;
  repeated RowDef rows    = 2;
}

// ═══════════════════════════════════════════════════════════
// Cell Data
// ═══════════════════════════════════════════════════════════

message CellUpdate {
  int32 row = 1;
  int32 col = 2;
  CellValue              value          = 3;
  CellStyle              style          = 4;
  optional CheckedState  checked        = 5;
  ImageData              picture        = 6;
  optional ImageAlignment picture_align = 7;
  ImageData              button_picture = 8;
  // Pipe-delimited dropdown items; prefix with `|` to make the list editable.
  optional string        dropdown_items = 9;
  optional StickyEdge    sticky_row     = 10;
  optional StickyEdge    sticky_col     = 11;
  optional CellInteraction interaction  = 12;
}

message UpdateCellsRequest {
  int64               grid_id = 1;
  repeated CellUpdate cells   = 2;
  bool                atomic  = 3;
}

message GetCellsRequest {
  int64 grid_id       = 1;
  int32 row1          = 2;
  int32 col1          = 3;
  int32 row2          = 4;
  int32 col2          = 5;
  bool  include_style = 6;
  bool  include_checked = 7;
  bool  include_typed = 8;
}

message CellData {
  int32                   row         = 1;
  int32                   col         = 2;
  CellValue               value       = 3;
  CellStyle               style       = 4;
  CheckedState            checked     = 5;
  optional CellInteraction interaction = 6;
}

message CellsResponse {
  repeated CellData cells = 1;
}

message TypeViolation {
  int32          row      = 1;
  int32          col      = 2;
  ColumnDataType expected = 3;
  CellValue      actual   = 4;
  string         reason   = 5;
}

message WriteResult {
  int32                  written_count  = 1;
  int32                  rejected_count = 2;
  repeated TypeViolation violations     = 3;
}

message LoadTableRequest {
  int64              grid_id = 1;
  int32              rows    = 2;
  int32              cols    = 3;
  repeated CellValue values  = 4;
  bool               atomic  = 5;
}

message FieldMapping {
  string field = 1;
  oneof target {
    int32  col_index = 2;
    string col_key   = 3;
  }
}

message CsvOptions {
  optional string delimiter       = 1;
  optional string quote_char      = 2;
  optional bool   trim_whitespace = 3;
}

message JsonOptions {
  optional string data_path = 1;
}

message LoadDataOptions {
  oneof format {
    CsvOptions  csv  = 1;
    JsonOptions json = 2;
  }

  optional HeaderPolicy   header_policy       = 10;
  repeated FieldMapping   field_map           = 11;
  optional TypePolicy     type_policy         = 12;
  optional CoercionMode   coercion            = 13;
  optional WriteErrorMode error_mode          = 14;
  optional string         date_format         = 15;
  optional string         decimal_char        = 16;
  optional bool           auto_create_columns = 17;
  optional LoadMode       mode                = 18;
  optional bool           atomic              = 19;
  optional int32          skip_rows           = 20;
  optional int32          max_rows            = 21;
}

message LoadDataRequest {
  int64                    grid_id = 1;
  bytes                    data    = 2;
  optional LoadDataOptions options = 3;
}

message LoadDataResult {
  LoadDataStatus       status           = 1;
  int32                rows             = 2;
  int32                cols             = 3;
  int32                rejected         = 4;
  repeated TypeViolation violations     = 5;
  repeated string      warnings         = 6;
  repeated ColumnDef   inferred_columns = 7;
}


message ClearRequest {
  int64       grid_id = 1;
  ClearScope  scope   = 2;
  ClearRegion region  = 3;
}

// ═══════════════════════════════════════════════════════════
// Row / Column Manipulation
// ═══════════════════════════════════════════════════════════

message InsertRowsRequest {
  int64           grid_id = 1;
  int32           index   = 2;
  int32           count   = 3;
  repeated string text    = 4;
}

message RemoveRowsRequest {
  int64 grid_id = 1;
  int32 index   = 2;
  int32 count   = 3;
}

message MoveColumnRequest {
  int64 grid_id  = 1;
  int32 col      = 2;
  int32 position = 3;
}

message MoveRowRequest {
  int64 grid_id  = 1;
  int32 row      = 2;
  int32 position = 3;
}

// ═══════════════════════════════════════════════════════════
// Selection & Navigation
// ═══════════════════════════════════════════════════════════

message SelectRequest {
  int64              grid_id    = 1;
  int32              active_row = 2;
  int32              active_col = 3;
  repeated CellRange ranges     = 4;
  optional bool      show       = 5;
}

message SelectionState {
  int32              active_row = 1;
  int32              active_col = 2;
  repeated CellRange ranges     = 3;
  int32              top_row    = 4;
  int32              left_col   = 5;
  int32              bottom_row = 6;
  int32              right_col  = 7;
  int32              mouse_row  = 8;
  int32              mouse_col  = 9;
}

// ═══════════════════════════════════════════════════════════
// Editing
// ═══════════════════════════════════════════════════════════

message HighlightRegion {
  CellRange      range       = 1;
  HighlightStyle style       = 2;
  optional int32 ref_id      = 3;
  optional int32 text_start  = 4;
  optional int32 text_length = 5;
}

message EditSetHighlights {
  repeated HighlightRegion regions = 1;
}

message EditCommand {
  int64 grid_id = 1;
  oneof command {
    EditStart         start          = 2;
    EditCommit        commit         = 3;
    EditCancel        cancel         = 4;
    EditSetText       set_text       = 5;
    EditSetSelection  set_selection  = 6;
    EditFinish        finish         = 7;
    EditSetHighlights set_highlights = 8;
    EditSetPreedit    set_preedit    = 9;
  }
}

message EditStart {
  int32           row          = 1;
  int32           col          = 2;
  optional bool   select_all   = 3;
  optional bool   caret_end    = 4;
  optional string seed_text    = 5;
  optional bool   formula_mode = 6;
}

message EditCommit  { optional string text = 1; }
message EditCancel  {}
message EditSetText { string text = 1; }
message EditSetSelection { int32 start = 1; int32 length = 2; }
message EditSetPreedit { string text = 1; int32 cursor = 2; bool commit = 3; }
message EditFinish  {}

enum EditUiMode {
  EDIT_UI_MODE_ENTER = 0;
  EDIT_UI_MODE_EDIT  = 1;
}

message EditState {
  bool       active       = 1;
  int32      row          = 2;
  int32      col          = 3;
  string     text         = 4;
  int32      sel_start    = 5;
  int32      sel_length   = 6;
  bool       composing    = 7;
  string     preedit_text = 8;
  EditUiMode ui_mode      = 9;
}

// ═══════════════════════════════════════════════════════════
// Actions
// ═══════════════════════════════════════════════════════════

message SortColumn {
  int32              col   = 1;
  optional SortOrder order = 2;
  optional SortType  type  = 3;
}

message SortRequest {
  int64               grid_id      = 1;
  repeated SortColumn sort_columns = 2;
}

message SubtotalRequest {
  int64         grid_id       = 1;
  AggregateType aggregate     = 2;
  int32         group_on_col  = 3;
  int32         aggregate_col = 4;
  string        caption       = 5;
  uint32        background    = 6;
  uint32        foreground    = 7;
  bool          add_outline   = 8;
}

message AutoSizeRequest {
  int64 grid_id   = 1;
  int32 col_from  = 2;
  int32 col_to    = 3;
  bool  equal     = 4;
  int32 max_width = 5;
}

message OutlineRequest {
  int64 grid_id = 1;
  int32 level   = 2;
}

message GetNodeRequest {
  int64                 grid_id  = 1;
  int32                 row      = 2;
  optional NodeRelation relation = 3;
}

message NodeInfo {
  int32 row         = 1;
  int32 level       = 2;
  bool  is_expanded = 3;
  int32 child_count = 4;
  int32 parent_row  = 5;
  int32 first_child = 6;
  int32 last_child  = 7;
}

message FindRequest {
  int64 grid_id   = 1;
  int32 col       = 2;
  int32 start_row = 3;
  oneof query {
    TextQuery  text_query  = 4;
    RegexQuery regex_query = 5;
  }
}

message TextQuery {
  string text           = 1;
  bool   case_sensitive = 2;
  bool   full_match     = 3;
}

message RegexQuery {
  string pattern = 1;
}

message FindResponse {
  int32 row = 1;
}

message AggregateRequest {
  int64         grid_id   = 1;
  AggregateType aggregate = 2;
  int32         row1      = 3;
  int32         col1      = 4;
  int32         row2      = 5;
  int32         col2      = 6;
}

message AggregateResponse {
  double value = 1;
}

message GetMergedRangeRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  int32 col     = 3;
}

message MergeCellsRequest {
  int64     grid_id = 1;
  CellRange range   = 2;
}

message UnmergeCellsRequest {
  int64     grid_id = 1;
  CellRange range   = 2;
}

message MergedRegionsResponse {
  repeated CellRange ranges = 1;
}

message MemoryUsageResponse {
  int64 total_bytes       = 1;
  int64 cell_data_bytes   = 2;
  int64 style_bytes       = 3;
  int64 layout_bytes      = 4;
  int64 column_bytes      = 5;
  int64 row_bytes         = 6;
  int64 selection_bytes   = 7;
  int64 animation_bytes   = 8;
  int64 text_engine_bytes = 9;
  int64 event_bytes       = 10;
  int64 misc_bytes        = 11;
  int32 cell_count        = 12;
  int32 rows              = 13;
  int32 cols              = 14;
}

// ═══════════════════════════════════════════════════════════
// Clipboard
// ═══════════════════════════════════════════════════════════

message ClipboardCommand {
  int64 grid_id = 1;
  oneof command {
    ClipboardCopy   copy   = 2;
    ClipboardCut    cut    = 3;
    ClipboardPaste  paste  = 4;
    ClipboardDelete delete = 5;
  }
}

message ClipboardCopy   {}
message ClipboardCut    {}
message ClipboardPaste  { string text = 1; bytes rich_data = 2; }
message ClipboardDelete {}

message ClipboardResponse {
  string text      = 1;
  bytes  rich_data = 2;
}

// ═══════════════════════════════════════════════════════════
// Export / Print / Archive
// ═══════════════════════════════════════════════════════════

message ExportRequest {
  int64        grid_id = 1;
  ExportFormat format  = 2;
  ExportScope  scope   = 3;
}

message ExportResponse {
  bytes        data   = 1;
  ExportFormat format = 2;
}

message PrintRequest {
  int64                    grid_id     = 1;
  optional PrintOrientation orientation = 2;
  optional int32           margin_left   = 3;
  optional int32           margin_top    = 4;
  optional int32           margin_right  = 5;
  optional int32           margin_bottom = 6;
  optional string          header        = 7;
  optional string          footer        = 8;
  optional bool            show_page_numbers = 9;
}

message PrintResponse { repeated PrintPage pages = 1; }

message PrintPage {
  int32 page_number = 1;
  bytes image_data  = 2;
  int32 width       = 3;
  int32 height      = 4;
}

message ArchiveRequest {
  int64 grid_id = 1;
  string name   = 2;
  enum Action { SAVE = 0; LOAD = 1; DELETE = 2; LIST = 3; }
  Action action = 3;
  bytes  data   = 4;
}

message ArchiveResponse {
  bytes           data  = 1;
  repeated string names = 2;
}

// ═══════════════════════════════════════════════════════════
// Lifecycle & Viewport
// ═══════════════════════════════════════════════════════════

message Empty {}
message GridHandle { int64 id = 1; }

enum ErrorCode {
  ERROR_UNKNOWN          = 0;
  ERROR_INVALID_ARGUMENT = 1;
  ERROR_NOT_FOUND        = 2;
  ERROR_INVALID_STATE    = 3;
  ERROR_TYPE_VIOLATION   = 4;
  ERROR_DECODE_FAILED    = 5;
  ERROR_ENCODE_FAILED    = 6;
  ERROR_NOT_IMPLEMENTED  = 7;
  ERROR_INTERNAL         = 8;
}

message CreateRequest {
  int32      viewport_width  = 1;
  int32      viewport_height = 2;
  float      scale           = 3;
  GridConfig config          = 4;
}

message CreateResponse {
  GridHandle      handle   = 1;
  repeated string warnings = 2;
}

message ResizeViewportRequest {
  int64 grid_id = 1;
  int32 width   = 2;
  int32 height  = 3;
}

message ShowCellRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  int32 col     = 3;
}

message SetRowRequest {
  int64 grid_id = 1;
  int32 row     = 2;
}

message SetColRequest {
  int64 grid_id = 1;
  int32 col     = 2;
}

message SetRedrawRequest {
  int64 grid_id = 1;
  bool  enabled = 2;
}

message ConfigureRequest {
  int64      grid_id = 1;
  GridConfig config  = 2;
}

message LoadFontDataRequest {
  bytes           data       = 1;
  string          font_name  = 2;
  repeated string font_names = 3;
}

message LoadDemoRequest {
  int64  grid_id = 1;
  string demo    = 2;
}

// ═══════════════════════════════════════════════════════════
// Render Session (bidirectional stream)
// ═══════════════════════════════════════════════════════════

message RenderInput {
  int64 grid_id = 1;
  oneof input {
    ViewportState   viewport       = 2;
    PointerEvent    pointer        = 3;
    KeyEvent        key            = 4;
    BufferReady     buffer         = 5;
    ScrollEvent     scroll         = 6;
    EventDecision   event_decision = 7;
    ZoomEvent       zoom           = 8;
    GpuSurfaceReady gpu_surface    = 9;
  }
}

message ViewportState {
  float scroll_x = 1;
  float scroll_y = 2;
  int32 width    = 3;
  int32 height   = 4;
}

message PointerEvent {
  enum Type { DOWN = 0; UP = 1; MOVE = 2; }
  Type  type      = 1;
  float x         = 2;
  float y         = 3;
  int32 modifier  = 4;
  int32 button    = 5;
  bool  dbl_click = 6;
}

message ScrollEvent {
  float delta_x = 1;
  float delta_y = 2;
}

message ZoomEvent {
  enum Phase { ZOOM_BEGIN = 0; ZOOM_UPDATE = 1; ZOOM_END = 2; }
  Phase phase      = 1;
  float scale      = 2;
  float focal_x_px = 3;
  float focal_y_px = 4;
}

message KeyEvent {
  enum Type { KEY_DOWN = 0; KEY_UP = 1; KEY_PRESS = 2; }
  Type   type      = 1;
  int32  key_code  = 2;
  int32  modifier  = 3;
  string character = 4;
}

message BufferReady {
  int64 handle = 1;
  int32 stride = 2;
  int32 width  = 3;
  int32 height = 4;
}

message GpuSurfaceReady {
  int64 surface_handle = 1;
  int32 width          = 2;
  int32 height         = 3;
}

message EventDecision {
  int64 grid_id  = 1;
  int64 event_id = 2;
  bool  cancel   = 3;
}

message RenderOutput {
  bool rendered = 1;
  oneof event {
    FrameDone       frame_done       = 2;
    SelectionUpdate selection        = 3;
    CursorChange    cursor           = 4;
    EditRequest     edit_request     = 5;
    DropdownRequest dropdown_request = 6;
    TooltipRequest  tooltip_request  = 7;
    GpuFrameDone    gpu_frame_done   = 8;
  }
}

message FrameDone {
  int64 handle  = 1;
  int32 dirty_x = 2;
  int32 dirty_y = 3;
  int32 dirty_w = 4;
  int32 dirty_h = 5;
  FrameMetrics metrics = 6;
}

message GpuFrameDone {
  int32 dirty_x = 1;
  int32 dirty_y = 2;
  int32 dirty_w = 3;
  int32 dirty_h = 4;
  FrameMetrics metrics = 5;
}

message FrameMetrics {
  float frame_time_ms = 1;
  float fps = 2;
  repeated float layer_times_us = 3;
  repeated uint32 zone_cell_counts = 4;
  int32 instance_count = 5;
}

message SelectionUpdate {
  int32              active_row = 1;
  int32              active_col = 2;
  repeated CellRange ranges     = 3;
}

message CursorChange {
  enum CursorType {
    DEFAULT    = 0;
    RESIZE_COL = 1;
    RESIZE_ROW = 2;
    MOVE_COL   = 3;
    TEXT       = 4;
    HAND       = 5;
  }
  CursorType cursor = 1;
}

message EditRequest {
  int32      row           = 1;
  int32      col           = 2;
  float      x             = 3;
  float      y             = 4;
  float      width         = 5;
  float      height        = 6;
  string     current_value = 7;
  string     edit_mask     = 8;
  int32      max_length    = 9;
  int32      sel_start     = 10;
  int32      sel_length    = 11;
  EditUiMode ui_mode       = 12;
}

message DropdownRequest {
  int32           row      = 1;
  int32           col      = 2;
  float           x        = 3;
  float           y        = 4;
  float           width    = 5;
  float           height   = 6;
  repeated string items    = 7;
  int32           selected = 8;
  // True if free-form text entry is allowed.
  bool            editable = 9;
}

message TooltipRequest {
  float  x    = 1;
  float  y    = 2;
  string text = 3;
}

// ═══════════════════════════════════════════════════════════
// Event Stream
//
// `cancel` fields removed from event messages.
// Use EventDecision channel to cancel cancelable events.
// ═══════════════════════════════════════════════════════════

message GridEvent {
  int64 grid_id  = 1;
  int64 event_id = 100;
  oneof event {
    // Navigation
    CellFocusChangingEvent  cell_focus_changing  = 2;
    CellFocusChangedEvent   cell_focus_changed   = 3;
    SelectionChangingEvent  selection_changing    = 4;
    SelectionChangedEvent   selection_changed     = 5;
    EnterCellEvent          enter_cell            = 6;
    LeaveCellEvent          leave_cell            = 7;
    // Editing
    BeforeEditEvent         before_edit           = 8;
    StartEditEvent          start_edit            = 9;
    AfterEditEvent          after_edit            = 10;
    CellEditValidateEvent   cell_edit_validate    = 11;
    CellEditChangeEvent     cell_edit_change      = 12;
    KeyDownEditEvent        key_down_edit         = 14;
    KeyPressEditEvent       key_press_edit        = 15;
    KeyUpEditEvent          key_up_edit           = 16;
    CellEditConfigureStyleEvent  cell_edit_configure_style  = 17;
    CellEditConfigureWindowEvent cell_edit_configure_window = 18;
    DropdownClosedEvent     dropdown_closed       = 19;
    DropdownOpenedEvent     dropdown_opened       = 20;
    // Data
    CellChangedEvent        cell_changed          = 21;
    RowStatusChangeEvent    row_status_change     = 22;
    // Sort
    BeforeSortEvent         before_sort           = 23;
    AfterSortEvent          after_sort            = 24;
    CompareEvent            compare               = 25;
    // Outline
    BeforeNodeToggleEvent   before_node_toggle    = 26;
    AfterNodeToggleEvent    after_node_toggle     = 27;
    // Scroll
    BeforeScrollEvent       before_scroll         = 28;
    AfterScrollEvent        after_scroll          = 29;
    ScrollTooltipEvent      scroll_tooltip        = 30;
    // Resize & Freeze
    BeforeUserResizeEvent   before_user_resize    = 31;
    AfterUserResizeEvent    after_user_resize     = 32;
    AfterUserFreezeEvent    after_user_freeze     = 33;
    // Column/Row move
    BeforeMoveColumnEvent   before_move_column    = 34;
    AfterMoveColumnEvent    after_move_column     = 35;
    BeforeMoveRowEvent      before_move_row       = 36;
    AfterMoveRowEvent       after_move_row        = 37;
    // Mouse
    BeforeMouseDownEvent    before_mouse_down     = 38;
    MouseDownEvent          mouse_down            = 39;
    MouseUpEvent            mouse_up              = 40;
    MouseMoveEvent          mouse_move            = 41;
    ClickEvent              click                 = 42;
    DblClickEvent           dbl_click             = 43;
    // Keyboard
    KeyDownEvent            key_down              = 44;
    KeyPressEvent           key_press             = 45;
    KeyUpEvent              key_up                = 46;
    // Drawing
    CustomRenderCellEvent   custom_render_cell    = 47;
    // Drag & Drop
    DragStartEvent          drag_start            = 48;
    DragOverEvent           drag_over             = 49;
    DragDropEvent           drag_drop             = 50;
    DragCompleteEvent       drag_complete         = 51;
    // Search
    TypeAheadStartedEvent   type_ahead_started    = 52;
    TypeAheadEndedEvent     type_ahead_ended      = 53;
    // Data refresh
    DataRefreshingEvent     data_refreshing       = 54;
    DataRefreshedEvent      data_refreshed        = 55;
    FilterDataEvent         filter_data           = 56;
    // Error
    ErrorEvent              error                 = 57;
    // Print
    BeforePageBreakEvent    before_page_break     = 58;
    StartPageEvent          start_page            = 59;
    GetHeaderRowEvent       get_header_row        = 60;
  }
}

// ── Navigation Events ──
message CellFocusChangingEvent {
  int32 old_row = 1; int32 old_col = 2;
  int32 new_row = 3; int32 new_col = 4;
}
message CellFocusChangedEvent {
  int32 old_row = 1; int32 old_col = 2;
  int32 new_row = 3; int32 new_col = 4;
}
message SelectionChangingEvent {
  repeated CellRange old_ranges = 1;
  repeated CellRange new_ranges = 2;
  int32              active_row = 3;
  int32              active_col = 4;
}
message SelectionChangedEvent {
  repeated CellRange old_ranges = 1;
  repeated CellRange new_ranges = 2;
  int32              active_row = 3;
  int32              active_col = 4;
}
message EnterCellEvent { int32 row = 1; int32 col = 2; }
message LeaveCellEvent { int32 row = 1; int32 col = 2; }

// ── Edit Events ──
message BeforeEditEvent   { int32 row = 1; int32 col = 2; }
message StartEditEvent    { int32 row = 1; int32 col = 2; }
message AfterEditEvent    { int32 row = 1; int32 col = 2; string old_text = 3; string new_text = 4; }
message CellEditValidateEvent { int32 row = 1; int32 col = 2; string edit_text = 3; }
message CellEditChangeEvent   { string text = 1; }
message KeyDownEditEvent  { int32 key_code = 1; int32 modifier = 2; }
message KeyPressEditEvent { int32 key_ascii = 1; }
message KeyUpEditEvent    { int32 key_code = 1; int32 modifier = 2; }
message CellEditConfigureStyleEvent  { int32 row = 1; int32 col = 2; }
message CellEditConfigureWindowEvent { int32 row = 1; int32 col = 2; }
message DropdownClosedEvent {}
message DropdownOpenedEvent {}

// ── Data Events ──
message CellChangedEvent     { int32 row = 1; int32 col = 2; string old_text = 3; string new_text = 4; }
message RowStatusChangeEvent { int32 row = 1; int32 status = 2; }

// ── Sort Events ──
message BeforeSortEvent { int32 col = 1; }
message AfterSortEvent  { int32 col = 1; }
message CompareEvent    { int32 row1 = 1; int32 row2 = 2; int32 col = 3; int32 result = 4; }

// ── Outline Events ──
message BeforeNodeToggleEvent { int32 row = 1; bool collapse = 2; }
message AfterNodeToggleEvent  { int32 row = 1; bool collapse = 2; }

// ── Scroll Events ──
message BeforeScrollEvent {
  int32 old_top_row  = 1; int32 old_left_col = 2;
  int32 new_top_row  = 3; int32 new_left_col = 4;
}
message AfterScrollEvent {
  int32 old_top_row  = 1; int32 old_left_col = 2;
  int32 new_top_row  = 3; int32 new_left_col = 4;
}
message ScrollTooltipEvent { string text = 1; }

// ── Resize & Freeze Events ──
message BeforeUserResizeEvent { int32 row = 1; int32 col = 2; }
message AfterUserResizeEvent  { int32 row = 1; int32 col = 2; }
message AfterUserFreezeEvent  { int32 frozen_rows = 1; int32 frozen_cols = 2; }

// ── Move Events ──
message BeforeMoveColumnEvent { int32 col = 1; int32 new_position = 2; }
message AfterMoveColumnEvent  { int32 col = 1; int32 old_position = 2; }
message BeforeMoveRowEvent    { int32 row = 1; int32 new_position = 2; }
message AfterMoveRowEvent     { int32 row = 1; int32 old_position = 2; }

// ── Mouse Events ──
message BeforeMouseDownEvent { int32 row = 1; int32 col = 2; }
message MouseDownEvent  { int32 button = 1; int32 modifier = 2; float x = 3; float y = 4; }
message MouseUpEvent    { int32 button = 1; int32 modifier = 2; float x = 3; float y = 4; }
message MouseMoveEvent  { int32 button = 1; int32 modifier = 2; float x = 3; float y = 4; }
message ClickEvent      { int32 row = 1; int32 col = 2; CellHitArea hit_area = 3; CellInteraction interaction = 4; }
message DblClickEvent   { int32 row = 1; int32 col = 2; }

// ── Keyboard Events ──
message KeyDownEvent  { int32 key_code = 1; int32 modifier = 2; }
message KeyPressEvent { int32 key_ascii = 1; }
message KeyUpEvent    { int32 key_code = 1; int32 modifier = 2; }

// ── Draw Events ──
message CustomRenderCellEvent {
  int32     row    = 1;
  int32     col    = 2;
  float     x      = 3;
  float     y      = 4;
  float     width  = 5;
  float     height = 6;
  string    text   = 7;
  CellStyle style  = 8;
  bool      done   = 9;
}

// ── Drag & Drop Events ──
message DragStartEvent    { int32 row = 1; int32 col = 2; }
message DragOverEvent     { int32 row = 1; int32 col = 2; float x = 3; float y = 4; }
message DragDropEvent     { int32 row = 1; int32 col = 2; }
message DragCompleteEvent { bool success = 1; }

// ── Search Events ──
message TypeAheadStartedEvent { int32 col = 1; string text = 2; }
message TypeAheadEndedEvent   {}

// ── Data Refresh Events ──
message DataRefreshingEvent {}
message DataRefreshedEvent  {}
message FilterDataEvent { int32 row = 1; int32 col = 2; string text = 3; }

// ── Error Events ──
message ErrorEvent { int32 code = 1; string message = 2; }

// ── Print Events ──
message BeforePageBreakEvent { int32 row = 1; }
message StartPageEvent       { int32 page = 1; }
message GetHeaderRowEvent    { int32 page = 1; }

// ═══════════════════════════════════════════════════════════
// Service
// ═══════════════════════════════════════════════════════════

service VolvoxGridService {
  // ── Lifecycle ──
  rpc Create(CreateRequest)               returns (CreateResponse);
  rpc Destroy(GridHandle)                 returns (Empty);

  // ── Configuration ──
  rpc Configure(ConfigureRequest)         returns (Empty);
  rpc GetConfig(GridHandle)               returns (GridConfig);
  rpc LoadFontData(LoadFontDataRequest)   returns (Empty);

  // ── Structure ──
  rpc DefineColumns(DefineColumnsRequest) returns (Empty);
  rpc GetSchema(GridHandle)               returns (DefineColumnsRequest);
  rpc DefineRows(DefineRowsRequest)       returns (Empty);
  rpc InsertRows(InsertRowsRequest)       returns (Empty);
  rpc RemoveRows(RemoveRowsRequest)       returns (Empty);
  rpc MoveColumn(MoveColumnRequest)       returns (Empty);
  rpc MoveRow(MoveRowRequest)             returns (Empty);

  // ── Data ──
  rpc UpdateCells(UpdateCellsRequest)     returns (WriteResult);
  rpc GetCells(GetCellsRequest)           returns (CellsResponse);
  rpc LoadTable(LoadTableRequest)         returns (WriteResult);
  rpc LoadData(LoadDataRequest)           returns (LoadDataResult);
  rpc Clear(ClearRequest)                 returns (Empty);

  // ── Selection ──
  rpc Select(SelectRequest)               returns (Empty);
  rpc GetSelection(GridHandle)            returns (SelectionState);
  rpc ShowCell(ShowCellRequest)           returns (Empty);
  rpc SetTopRow(SetRowRequest)            returns (Empty);
  rpc SetLeftCol(SetColRequest)           returns (Empty);

  // ── Editing ──
  rpc Edit(EditCommand)                   returns (EditState);

  // ── Actions ──
  rpc Sort(SortRequest)                   returns (Empty);
  rpc Subtotal(SubtotalRequest)           returns (Empty);
  rpc AutoSize(AutoSizeRequest)           returns (Empty);
  rpc Outline(OutlineRequest)             returns (Empty);
  rpc GetNode(GetNodeRequest)             returns (NodeInfo);
  rpc Find(FindRequest)                   returns (FindResponse);
  rpc Aggregate(AggregateRequest)         returns (AggregateResponse);
  rpc GetMergedRange(GetMergedRangeRequest) returns (CellRange);
  rpc MergeCells(MergeCellsRequest)       returns (Empty);
  rpc UnmergeCells(UnmergeCellsRequest)   returns (Empty);
  rpc GetMergedRegions(GridHandle)        returns (MergedRegionsResponse);
  rpc GetMemoryUsage(GridHandle)          returns (MemoryUsageResponse);

  // ── Clipboard ──
  rpc Clipboard(ClipboardCommand)         returns (ClipboardResponse);

  // ── Export / Print / Archive ──
  rpc Export(ExportRequest)               returns (ExportResponse);
  rpc Print(PrintRequest)                 returns (PrintResponse);
  rpc Archive(ArchiveRequest)             returns (ArchiveResponse);

  // ── Render Control ──
  rpc ResizeViewport(ResizeViewportRequest) returns (Empty);
  rpc SetRedraw(SetRedrawRequest)         returns (Empty);
  rpc Refresh(GridHandle)                 returns (Empty);

  // ── Demo ──
  rpc LoadDemo(LoadDemoRequest)           returns (Empty);

  // ── Streaming ──
  rpc RenderSession(stream RenderInput)   returns (stream RenderOutput);
  rpc EventStream(GridHandle)             returns (stream GridEvent);
}
