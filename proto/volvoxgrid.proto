  ROW_INDICATOR_SLOT_RESIZE      = 11;
  ROW_INDICATOR_SLOT_ACTION      = 12;
  ROW_INDICATOR_SLOT_STATUS_ICON = 13;
  ROW_INDICATOR_SLOT_CUSTOM      = 14;
