  PIN_BOTTOM = 2;
}

enum StickyEdge {
  STICKY_NONE   = 0;
  STICKY_TOP    = 1;
  STICKY_BOTTOM = 2;
  STICKY_LEFT   = 3;
  STICKY_RIGHT  = 4;
  STICKY_BOTH   = 5;
}

enum TypeAheadMode {
  TYPE_AHEAD_NONE        = 0;
  TYPE_AHEAD_FROM_START  = 1;
  TYPE_AHEAD_FROM_CURSOR = 2;
}

enum AutoSizeMode {
  AUTOSIZE_BOTH       = 0;
  AUTOSIZE_COL_WIDTH  = 1;
  AUTOSIZE_ROW_HEIGHT = 2;
}

enum DragMode {
  DRAG_NONE      = 0;
  DRAG_MANUAL    = 1;
  DRAG_AUTOMATIC = 2;
}

enum DropMode {
  DROP_NONE      = 0;
  DROP_MANUAL    = 1;
  DROP_AUTOMATIC = 2;
}

enum CustomRenderMode {
  CUSTOM_RENDER_NONE = 0;
  CUSTOM_RENDER_CELL = 1;
  CUSTOM_RENDER_ROW  = 2;
}

enum ApplyScope {
  APPLY_SINGLE    = 0;
  APPLY_SELECTION = 1;
}

// ── Rendering ──

enum RendererMode {
  RENDERER_AUTO       = 0;
