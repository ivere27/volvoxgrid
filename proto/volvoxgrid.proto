  SORT_TYPE_STRING_NO_CASE = 3;
  SORT_TYPE_CUSTOM         = 4;
}

// ── Outline / Tree ──

enum TreeIndicatorStyle {
  TREE_INDICATOR_NONE            = 0;
  TREE_INDICATOR_ARROWS          = 1;
  TREE_INDICATOR_ARROWS_LEAF     = 2;
  TREE_INDICATOR_CONNECTORS      = 3;
  TREE_INDICATOR_CONNECTORS_LEAF = 4;
}

enum GroupTotalPosition {
  GROUP_TOTAL_ABOVE = 0;
  GROUP_TOTAL_BELOW = 1;
