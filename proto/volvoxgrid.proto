syntax = "proto3";
package volvoxgrid.v1;

option go_package = "github.com/ivere27/volvoxgrid/api/v1";
option java_package = "io.github.ivere27.volvoxgrid";
option java_multiple_files = true;

// ═══════════════════════════════════════════════════════════
// Building Blocks
//
// Reusable primitives composed throughout the API.
// ═══════════════════════════════════════════════════════════

message Font {
  optional string family        = 1;
  repeated string families      = 2;  // CSS-style fallback chain
  optional float  size          = 3;
  optional bool   bold          = 4;
  optional bool   italic        = 5;
  optional bool   underline     = 6;
  optional bool   strikethrough = 7;
  optional float  width         = 8;  // font stretch
}

message Padding {
  optional int32 left   = 1;
  optional int32 top    = 2;
  optional int32 right  = 3;
  optional int32 bottom = 4;
}

message Border {
  optional BorderStyle style = 1;
  optional uint32      color = 2;
}

// Per-edge borders with a shorthand `all` field.
// Resolution: per-edge > all > inherited.
message Borders {
  Border all    = 1;
  Border top    = 2;
  Border right  = 3;
  Border bottom = 4;
  Border left   = 5;
}

message GridLines {
  optional GridLineStyle     style     = 1;
  optional GridLineDirection direction = 2;
  optional uint32            color     = 3;
  optional int32             width     = 4;
}

message Separator {
  optional bool   visible = 1;
  optional uint32 color   = 2;
  optional int32  width   = 3;
}

message TextRendering {
  optional TextRenderMode  mode       = 1;
  optional TextHintingMode hinting    = 2;
  optional bool            pixel_snap = 3;
}

message ImageData {
  bytes  data   = 1;
  string format = 2;  // "png", "bmp", etc.
}

message CellRange {
  int32 row1 = 1;
  int32 col1 = 2;
  int32 row2 = 3;
  int32 col2 = 4;
}

message CellValue {
  oneof value {
    string text      = 1;
    double number    = 2;
    bool   flag      = 3;
    bytes  raw       = 4;
    int64  timestamp = 5;  // epoch-ms
  }
}

// ═══════════════════════════════════════════════════════════
// Enums
// ═══════════════════════════════════════════════════════════

