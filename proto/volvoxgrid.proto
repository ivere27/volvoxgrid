  COL_INDICATOR_CELL_HEADER_TEXT   = 1;
  COL_INDICATOR_CELL_SORT_GLYPH   = 2;
  COL_INDICATOR_CELL_SORT_PRIORITY = 4;
  COL_INDICATOR_CELL_FILTER_BUTTON = 8;
  COL_INDICATOR_CELL_FILTER_STATE  = 16;
  COL_INDICATOR_CELL_MENU_BUTTON   = 32;
  COL_INDICATOR_CELL_CHOOSER       = 64;
  COL_INDICATOR_CELL_DRAG_REORDER  = 128;
  COL_INDICATOR_CELL_HIDDEN_MARKER = 256;
  COL_INDICATOR_CELL_RESIZE_HANDLE = 512;
  COL_INDICATOR_CELL_SELECT_ALL    = 1024;
  COL_INDICATOR_CELL_STATUS_ICON   = 2048;
  COL_INDICATOR_CELL_CUSTOM        = 4096;
}

message RowIndicatorSlot {
  optional RowIndicatorSlotKind kind       = 1;
  optional int32                width      = 2;
  optional bool                 visible    = 3;
  optional string               custom_key = 4;
  optional bytes                data       = 5;
}

message RowIndicatorConfig {
  optional bool             visible       = 1;
  optional int32            width         = 2;
  optional uint32           mode_bits     = 3;
  optional uint32           background    = 4;
  optional uint32           foreground    = 5;
  optional GridLineStyle    grid_lines    = 6;
  optional uint32           grid_color    = 7;
  optional bool             auto_size     = 8;
  optional bool             allow_resize  = 9;
  optional bool             allow_select  = 10;
  optional bool             allow_reorder = 11;
  repeated RowIndicatorSlot slots         = 12;
}

message ColIndicatorRowDef {
  optional int32 index    = 1;
  optional int32 height   = 2;
}

message ColIndicatorCell {
  optional int32  row1       = 1;
  optional int32  row2       = 2;
  optional int32  col1       = 3;
  optional int32  col2       = 4;
  optional string text       = 5;
  optional uint32 mode_bits  = 6;
  optional string custom_key = 7;
  optional bytes  data       = 8;
}

message ColIndicatorConfig {
  optional bool              visible            = 1;
  optional int32             default_row_height = 2;
  optional int32             band_rows          = 3;
  optional uint32            mode_bits          = 4;
  optional uint32            background         = 5;
  optional uint32            foreground         = 6;
  optional GridLineStyle     grid_lines         = 7;
  optional uint32            grid_color         = 8;
  optional bool              auto_size          = 9;
  optional bool              allow_resize       = 10;
  optional bool              allow_reorder      = 11;
  optional bool              allow_menu         = 12;
  repeated ColIndicatorRowDef row_defs           = 13;
  repeated ColIndicatorCell   cells              = 14;
}

message CornerIndicatorConfig {
  optional bool   visible    = 1;
  optional uint32 mode_bits  = 2;
  optional uint32 background = 3;
  optional uint32 foreground = 4;
  optional string custom_key = 5;
  optional bytes  data       = 6;
}

message IndicatorsConfig {
  RowIndicatorConfig    row_start          = 1;
  RowIndicatorConfig    row_end            = 2;
  ColIndicatorConfig    col_top            = 3;
  ColIndicatorConfig    col_bottom         = 4;
  CornerIndicatorConfig corner_top_start   = 5;
  CornerIndicatorConfig corner_top_end     = 6;
  CornerIndicatorConfig corner_bottom_start = 7;
  CornerIndicatorConfig corner_bottom_end  = 8;
}

// ═══════════════════════════════════════════════════════════
// Column & Row Definitions
//
// Sent via DefineColumns() / DefineRows() to configure
// per-column/row properties. Uses partial-update semantics —
// only set fields override existing properties.
// ═══════════════════════════════════════════════════════════

message ColumnDef {
  int32                   index          = 1;
  optional int32          width          = 2;
  optional int32          min_width      = 3;
  optional int32          max_width      = 4;
  optional string         caption        = 5;
  optional Align          align          = 6;
  optional Align          fixed_align    = 7;
  optional ColumnDataType data_type      = 8;
  optional string         format         = 9;
  optional string         key            = 10;
  optional SortOrder      sort_order     = 11;
  optional SortType       sort_type      = 12;
  optional Dropdown       dropdown      = 13;
  optional string         edit_mask      = 14;
  optional int32          indent         = 15;
  optional bool           hidden         = 16;
  optional bool           span           = 17;
  repeated ImageData      image_list     = 18;
  optional bytes          data           = 19;
  optional StickyEdge     sticky         = 20;
  Padding                 padding        = 21;
  Padding                 fixed_padding  = 22;
  optional bool           nullable       = 23;
  optional CoercionMode   coercion_mode  = 24;
  optional WriteErrorMode error_mode     = 25;
  optional CellInteraction interaction   = 26;
  optional uint32         progress_color = 27;
}

message DefineColumnsRequest {
  int64              grid_id = 1;
  repeated ColumnDef columns = 2;
}

message SchemaResponse {
  repeated ColumnDef columns = 1;
}

message RowDef {
  int32                index         = 1;
  optional int32       height        = 2;   // pixels; 0 or negative = use default
  optional bool        hidden        = 3;   // zero visual height when true
  optional bool        is_subtotal   = 4;   // marks row as aggregate subtotal
  optional int32       outline_level = 5;   // -1 = grand total, 0+ = nesting level
  optional bool        is_collapsed  = 6;   // whether subtree below is collapsed
  optional bytes       data          = 7;   // application-specific row data
  RowStatus            status        = 8;
  optional bool        span          = 9;   // enable spanning for this row
  optional PinPosition pin           = 10;  // pin to TOP or BOTTOM of viewport
  optional StickyEdge  sticky        = 11;  // stick to edge during scroll
}

// Host-defined row status with an explicit namespace/discriminator.
// `code` is interpreted only within `domain`; the engine assigns no
// built-in meaning to row status values.
message RowStatus {
  string domain = 1;
  int32  code   = 2;
}

message DefineRowsRequest {
  int64           grid_id = 1;
  repeated RowDef rows    = 2;
}

// ═══════════════════════════════════════════════════════════
// Cell Data
//
// Cells are stored sparsely in the engine: HashMap<(i32,i32), CellData>
// where CellData = { text: String, extra: Option<Box<CellExtra>> }.
// Only non-empty cells consume memory. The slim CellData layout is
// 32 bytes; rarely-used properties (picture, progress, dropdown, etc.)
// are boxed in CellExtra to avoid bloating every cell.
//
// Display-row to logical-row mapping (row_map/col_map in CellStore)
// enables O(1) post-sort access without physically moving cell data.
// ═══════════════════════════════════════════════════════════

message CellUpdate {
  int32 row = 1;
  int32 col = 2;
  CellValue              value          = 3;
  CellStyle              style          = 4;
  optional CheckedState  checked        = 5;
  ImageData              picture        = 6;
  optional ImageAlignment picture_align = 7;
  ImageData              button_picture = 8;
  optional Dropdown      dropdown       = 9;
  optional StickyEdge    sticky_row     = 10;
  optional StickyEdge    sticky_col     = 11;
  optional CellInteraction interaction  = 12;
  // Full replacement, not a sparse barcode patch. Send `symbology` every time;
  // `BARCODE_NONE` clears an existing barcode.
  optional BarcodeData   barcode        = 13;
}

message UpdateCellsRequest {
  int64               grid_id = 1;
  repeated CellUpdate cells   = 2;
  // When true, writes to a preview grid first; if any type violations
  // occur the original grid is untouched and WriteResult.rejected_count > 0.
  bool                atomic  = 3;
}

message GetCellsRequest {
  int64 grid_id       = 1;
  int32 row1          = 2;
  int32 col1          = 3;
  int32 row2          = 4;
  int32 col2          = 5;
  bool  include_style = 6;
  bool  include_checked = 7;
  bool  include_typed = 8;
  // Opt-in: run the per-cell barcode encode probe and populate
  // `CellData.barcode_status`. Off by default because encoding is not free.
  bool  include_barcode_status = 9;
}

message CellData {
  int32                   row         = 1;
  int32                   col         = 2;
  CellValue               value       = 3;
  CellStyle               style       = 4;
  CheckedState            checked     = 5;
  optional CellInteraction interaction = 6;
  // Readback counterpart of `CellUpdate.barcode = 13`.
  optional BarcodeData    barcode     = 7;
  // Readback/probe status for `barcode`. Present only when the request sets
  // `include_barcode_status`. Field 8 is intentionally independent from
  // `CellUpdate.barcode = 13`; the messages have different purposes.
  optional BarcodeRenderStatus barcode_status = 8;
}

message CellsResponse {
  repeated CellData cells = 1;
}

message TypeViolation {
  int32          row      = 1;
  int32          col      = 2;
  ColumnDataType expected = 3;
  CellValue      actual   = 4;
  string         reason   = 5;
}

message WriteResult {
  int32                  written_count  = 1;
  int32                  rejected_count = 2;
  repeated TypeViolation violations     = 3;
}

// Bulk-load a table from a flat array of values.
// Values are row-major: element at index (r * cols + c) goes to cell (r, c).
message LoadTableRequest {
  int64              grid_id = 1;
  int32              rows    = 2;
  int32              cols    = 3;
  repeated CellValue values  = 4;  // length must equal rows × cols
  bool               atomic  = 5;
}

message FieldMapping {
  string field = 1;
  oneof target {
    int32  col_index = 2;
    string col_key   = 3;
  }
}

message CsvOptions {
  optional string delimiter       = 1;
  optional string quote_char      = 2;
  optional bool   trim_whitespace = 3;
}

message JsonOptions {
  optional string data_path = 1;
}

message LoadDataOptions {
  oneof format {
    CsvOptions  csv  = 1;
    JsonOptions json = 2;
  }

  optional HeaderPolicy   header_policy       = 10;
  repeated FieldMapping   field_map           = 11;
  optional TypePolicy     type_policy         = 12;
  optional CoercionMode   coercion            = 13;
  optional WriteErrorMode error_mode          = 14;
  optional string         date_format         = 15;
  optional string         decimal_char        = 16;
  optional bool           auto_create_columns = 17;
  optional bool           atomic              = 19;
  optional int32          skip_rows           = 20;
  optional int32          max_rows            = 21;
}

// Load structured data (CSV or JSON) into the grid, replacing existing data.
// The engine parses the data, infers types, validates values, and
// populates cells. See engine/src/load.rs.
//
// JSON supports 5 shapes: array of objects, array of arrays,
// {columns,data}, object with all-array values, or single object.
// JSONPath navigation via JsonOptions.data_path (e.g. "results.items").
message LoadDataRequest {
  int64                    grid_id = 1;
  bytes                    data    = 2;  // UTF-8 CSV or JSON bytes
  optional LoadDataOptions options = 3;
}

// Append structured data (CSV or JSON) after existing grid rows.
message AppendDataRequest {
  int64                    grid_id = 1;
  bytes                    data    = 2;  // UTF-8 CSV or JSON bytes
  optional LoadDataOptions options = 3;
}

message LoadDataResult {
  LoadDataStatus       status           = 1;
  int32                rows             = 2;
  int32                cols             = 3;
  int32                rejected         = 4;
  repeated TypeViolation violations     = 5;
  repeated string      warnings         = 6;
  repeated ColumnDef   inferred_columns = 7;
}


message ClearRequest {
  int64       grid_id = 1;
  ClearScope  scope   = 2;
  ClearRegion region  = 3;
}

// ═══════════════════════════════════════════════════════════
// Row / Column Manipulation
// ═══════════════════════════════════════════════════════════

message InsertRowsRequest {
  int64           grid_id = 1;
  int32           index   = 2;
  int32           count   = 3;
  repeated string text    = 4;
}

message RemoveRowsRequest {
  int64 grid_id = 1;
  int32 index   = 2;
  int32 count   = 3;
}

message MoveColumnRequest {
  int64 grid_id  = 1;
  int32 col      = 2;
  int32 position = 3;
}

message MoveRowRequest {
  int64 grid_id  = 1;
  int32 row      = 2;
  int32 position = 3;
}

// ═══════════════════════════════════════════════════════════
// Selection & Navigation
// ═══════════════════════════════════════════════════════════

message SelectRequest {
  int64              grid_id    = 1;
  int32              active_row = 2;
  int32              active_col = 3;
  repeated CellRange ranges     = 4;
  optional bool      show       = 5;
}

message SelectionState {
  int32              active_row = 1;
  int32              active_col = 2;
  repeated CellRange ranges     = 3;
  int32              top_row    = 4;
  int32              left_col   = 5;
  int32              bottom_row = 6;
  int32              right_col  = 7;
  int32              mouse_row  = 8;
  int32              mouse_col  = 9;
}

// ═══════════════════════════════════════════════════════════
// Editing
// ═══════════════════════════════════════════════════════════

message HighlightRegion {
  CellRange      range       = 1;
  HighlightStyle style       = 2;
  optional int32 ref_id      = 3;
  optional int32 text_start  = 4;
  optional int32 text_length = 5;
}

message EditSetHighlights {
  repeated HighlightRegion regions = 1;
}

message EditCommand {
  int64 grid_id = 1;
  oneof command {
    EditStart         start          = 2;
    EditCommit        commit         = 3;
    EditCancel        cancel         = 4;
    EditSetText       set_text       = 5;
    EditSetSelection  set_selection  = 6;
    EditFinish        finish         = 7;
    EditSetHighlights set_highlights = 8;
    EditSetPreedit    set_preedit    = 9;
  }
}

message EditStart {
  int32           row          = 1;
  int32           col          = 2;
  optional bool   select_all   = 3;
  optional bool   caret_end    = 4;
  optional string seed_text    = 5;
  optional bool   formula_mode = 6;
}

message EditCommit  { optional string text = 1; }
message EditCancel  {}
message EditSetText { string text = 1; }
message EditSetSelection { int32 start = 1; int32 length = 2; }
message EditSetPreedit { string text = 1; int32 cursor = 2; bool commit = 3; }
message EditFinish  {}

enum ComposeMethod {
  COMPOSE_METHOD_NONE     = 0;
  COMPOSE_METHOD_HANGUL   = 1;
  COMPOSE_METHOD_DEAD_KEY = 2;
  COMPOSE_METHOD_TELEX    = 3;
}

// Edit UI mode. See engine/src/edit.rs EditUiMode.
//   ENTER (0): Spreadsheet-style. Enter commits and moves cursor down.
//              Character keys replace cell content. Up/Down commit and move.
//   EDIT (1):  F2 mode. Caret placed at end of existing text.
//              Escape cancels and restores original value.
//              Arrow keys move caret within text, not the grid cursor.
enum EditUiMode {
  EDIT_UI_MODE_ENTER = 0;
  EDIT_UI_MODE_EDIT  = 1;
}

// Returned by Edit() RPC. Reflects the engine's current edit state.
message EditState {
  bool       active       = 1;   // true if a cell is being edited
  int32      row          = 2;   // row being edited
  int32      col          = 3;   // column being edited
  string     text         = 4;   // current editor text
  int32      sel_start    = 5;   // caret/selection start position
  int32      sel_length   = 6;   // selection length (0 = caret only)
  bool       composing    = 7;   // true during IME composition
  string     preedit_text = 8;   // IME preedit string
  EditUiMode ui_mode      = 9;
  float      x            = 10;  // viewport-local cell rect X
  float      y            = 11;  // viewport-local cell rect Y
  float      width        = 12;  // cell rect width
  float      height       = 13;  // cell rect height
  int32      max_length   = 14;  // 0 = unlimited
}

// ═══════════════════════════════════════════════════════════
// Actions
// ═══════════════════════════════════════════════════════════

message SortColumn {
  int32              col   = 1;
  optional SortOrder order = 2;
  optional SortType  type  = 3;
}

// Multi-column sort. The engine builds sort_keys from sort_columns
// and compares by the first differing key column. Subtotal rows are
// excluded from sort — each group between subtotal boundaries is
// sorted independently to preserve outline structure.
message SortRequest {
  int64               grid_id      = 1;
  repeated SortColumn sort_columns = 2;
}

// Insert aggregate subtotal rows. See engine/src/outline.rs.
// Detects group boundaries by comparing cell values in group_on_col.
// Set group_on_col=-1 for a grand total only (no grouping).
// Use AGG_CLEAR to remove all subtotal rows.
message SubtotalRequest {
  int64         grid_id       = 1;
  AggregateType aggregate     = 2;
  int32         group_on_col  = 3;   // column to group/break on; -1 = grand total only
  int32         aggregate_col = 4;   // column to compute aggregate on
  string        caption       = 5;   // label for subtotal rows
  uint32        background    = 6;   // ARGB for subtotal row background
  uint32        foreground    = 7;   // ARGB for subtotal row foreground
  bool          add_outline   = 8;   // set outline_level for tree expand/collapse
  Font          font          = 9;
}

message SubtotalResult {
  repeated int32 rows = 1;
}

message AutoSizeRequest {
  int64 grid_id   = 1;
  int32 col_from  = 2;
  int32 col_to    = 3;
  bool  equal     = 4;
  int32 max_width = 5;
}

message OutlineRequest {
  int64 grid_id = 1;
  int32 level   = 2;
}

message GetNodeRequest {
  int64                 grid_id  = 1;
  int32                 row      = 2;
  optional NodeRelation relation = 3;
}

message NodeInfo {
  int32 row         = 1;
  int32 level       = 2;
  bool  is_expanded = 3;
  int32 child_count = 4;
  int32 parent_row  = 5;
  int32 first_child = 6;
  int32 last_child  = 7;
}

message FindRequest {
  int64 grid_id   = 1;
  int32 col       = 2;
  int32 start_row = 3;
  oneof query {
    TextQuery  text_query  = 4;
    RegexQuery regex_query = 5;
  }
}

message TextQuery {
  string text           = 1;
  bool   case_sensitive = 2;
  bool   full_match     = 3;
}

message RegexQuery {
  string pattern = 1;
}

message FindResponse {
  int32 row = 1;
}

message AggregateRequest {
  int64         grid_id   = 1;
  AggregateType aggregate = 2;
  int32         row1      = 3;
  int32         col1      = 4;
  int32         row2      = 5;
  int32         col2      = 6;
}

message AggregateResponse {
  double value = 1;
}

message GetMergedRangeRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  int32 col     = 3;
}

// Explicit user-initiated cell merge (spreadsheet-style).
// Separate from content-based spans (CellSpanMode).
// Overlapping merges discard the older range. See engine/src/merge_registry.rs.
message MergeCellsRequest {
  int64     grid_id = 1;
  CellRange range   = 2;
}

message UnmergeCellsRequest {
  int64     grid_id = 1;
  CellRange range   = 2;
}

message MergedRegionsResponse {
  repeated CellRange ranges = 1;
}

message MemoryUsageResponse {
  int64 total_bytes       = 1;
  int64 cell_data_bytes   = 2;
  int64 style_bytes       = 3;
  int64 layout_bytes      = 4;
  int64 column_bytes      = 5;
  int64 row_bytes         = 6;
  int64 selection_bytes   = 7;
  int64 animation_bytes   = 8;
  int64 text_engine_bytes = 9;
  int64 event_bytes       = 10;
  int64 misc_bytes        = 11;
  int32 cell_count        = 12;
  int32 rows              = 13;
  int32 cols              = 14;
}

// ═══════════════════════════════════════════════════════════
// Clipboard
//
// See engine/src/clipboard.rs.
// Copy/Cut produce tab-separated text (configurable via
// clip_col_separator/clip_row_separator on the grid).
// Paste splits input by those separators and writes starting
// at the current cursor position. Cut = Copy + Delete.
// ═══════════════════════════════════════════════════════════

message ClipboardCommand {
  int64 grid_id = 1;
  oneof command {
    ClipboardCopy   copy   = 2;
    ClipboardCut    cut    = 3;
    ClipboardPaste  paste  = 4;
    ClipboardDelete delete = 5;
  }
}

message ClipboardCopy   {}
message ClipboardCut    {}
message ClipboardPaste  { string text = 1; bytes rich_data = 2; }
message ClipboardDelete {}

message ClipboardResponse {
  string text      = 1;
  bytes  rich_data = 2;
}

// ═══════════════════════════════════════════════════════════
// Export / Print / Archive
// ═══════════════════════════════════════════════════════════

message ExportRequest {
  int64        grid_id = 1;
  ExportFormat format  = 2;
  ExportScope  scope   = 3;
}

message ExportResponse {
  bytes        data   = 1;
  ExportFormat format = 2;
}

message PrintRequest {
  int64                    grid_id     = 1;
  optional PrintOrientation orientation = 2;
  optional int32           margin_left   = 3;
  optional int32           margin_top    = 4;
  optional int32           margin_right  = 5;
  optional int32           margin_bottom = 6;
  optional string          header        = 7;
  optional string          footer        = 8;
  optional bool            show_page_numbers = 9;
}

message PrintResponse { repeated PrintPage pages = 1; }

// Each page is a PNG-encoded RGBA image. See engine/src/print.rs.
// Page dimensions at 96 DPI: portrait 816×1056 px, landscape 1056×816 px.
// Header/footer placeholders: &P = page number, &N = total pages.
message PrintPage {
  int32 page_number = 1;  // 1-based
  bytes image_data  = 2;  // PNG-encoded RGBA buffer
  int32 width       = 3;  // pixels
  int32 height      = 4;  // pixels
}

// Named grid snapshots using the FXAR1 archive format.
// See engine/src/save.rs.
//   ACTION_UNSPECIFIED: Invalid.
//   SAVE:               Serializes grid into a named entry in the archive blob.
//   LOAD:               Deserializes a named entry back into the grid.
//   DELETE:             Removes a named entry from the archive.
//   LIST:               Returns the list of entry names without loading.
message ArchiveRequest {
  int64 grid_id = 1;
  string name   = 2;
  enum Action { ACTION_UNSPECIFIED = 0; SAVE = 1; LOAD = 2; DELETE = 3; LIST = 4; }
  Action action = 3;
  bytes  data   = 4;  // archive blob (FXAR1 format)
}

message ArchiveResponse {
  bytes           data  = 1;
  repeated string names = 2;
}

// ═══════════════════════════════════════════════════════════
// Lifecycle & Viewport
// ═══════════════════════════════════════════════════════════

enum ErrorCode {
  ERROR_UNKNOWN          = 0;
  ERROR_INVALID_ARGUMENT = 1;
  ERROR_NOT_FOUND        = 2;
  ERROR_INVALID_STATE    = 3;
  ERROR_TYPE_VIOLATION   = 4;
  ERROR_DECODE_FAILED    = 5;
  ERROR_ENCODE_FAILED    = 6;
  ERROR_NOT_IMPLEMENTED  = 7;
  ERROR_INTERNAL         = 8;
}

// Create a new grid instance. Returns a grid id used by all subsequent RPCs.
// The engine allocates a VolvoxGrid with the given viewport and optional config.
message CreateRequest {
  int32      viewport_width  = 1;  // pixels
  int32      viewport_height = 2;  // pixels
  float      scale           = 3;  // DPI scale factor (1.0 = no scaling)
  GridConfig config          = 4;  // optional initial configuration
}

message CreateResponse {
  int64           grid_id  = 1;
  repeated string warnings = 2;
}

message DestroyRequest { int64 grid_id = 1; }

message GetConfigRequest { int64 grid_id = 1; }

message GetSchemaRequest { int64 grid_id = 1; }

message GetSelectionRequest { int64 grid_id = 1; }

message GetMergedRegionsRequest { int64 grid_id = 1; }

message GetMemoryUsageRequest { int64 grid_id = 1; }

message RefreshRequest { int64 grid_id = 1; }

message EventStreamRequest { int64 grid_id = 1; }

message ResizeViewportRequest {
  int64 grid_id = 1;
  int32 width   = 2;
  int32 height  = 3;
}

message ShowCellRequest {
  int64 grid_id = 1;
  int32 row     = 2;
  int32 col     = 3;
}

message SetRowRequest {
  int64 grid_id = 1;
  int32 row     = 2;
}

message SetColRequest {
  int64 grid_id = 1;
  int32 col     = 2;
}

// Enable/disable rendering. When transitioning from disabled to enabled,
// the engine suppresses the next animation frame and forces an immediate
// dirty repaint (plugin/src/lib.rs SetRedraw). Useful for batching many
// mutations without intermediate renders.
message SetRedrawRequest {
  int64 grid_id = 1;
  bool  enabled = 2;
}

message ConfigureRequest {
  int64      grid_id = 1;
  GridConfig config  = 2;
}

message LoadFontDataRequest {
  bytes           data       = 1;
  string          font_name  = 2;
  repeated string font_names = 3;
}

message LoadDemoRequest {
  int64  grid_id = 1;
  string demo    = 2;
}

enum DemoDataFormat {
  DEMO_DATA_FORMAT_UNSPECIFIED = 0;
  DEMO_DATA_FORMAT_JSON        = 1;
}

message GetDemoDataRequest {
  string demo = 1;
}

message GetDemoDataResponse {
  string         demo   = 1;
  DemoDataFormat format = 2;
  bytes          data   = 3;
}

// ═══════════════════════════════════════════════════════════
// RPC Response Wrappers
//
// Mutator responses carry operation summaries. Use GetConfig/GetSchema/
// GetSelection for full-state snapshots and EventStream for async change
// notifications.
// ═══════════════════════════════════════════════════════════

message DestroyResponse {}
message ConfigureResponse {}
message LoadFontDataResponse {}
message DefineColumnsResponse {}
message DefineRowsResponse {}

message InsertRowsResponse {
  int32 inserted_count = 1;
  int32 new_row_count  = 2;
  int32 first_row      = 3;  // inserted range [first_row, first_row+inserted_count)
}

message RemoveRowsResponse {
  int32 removed_count = 1;
  int32 new_row_count = 2;
}

message MoveColumnResponse {}
message MoveRowResponse {}

message ClearResponse {
  int32 cleared_count = 1;  // cells cleared
}

message SelectResponse {
  SelectionState selection = 1;  // post-clamp/validate snapshot
}

message ShowCellResponse {
  int32 top_row  = 1;  // post-scroll clamped values
  int32 left_col = 2;
}

message SetTopRowResponse {
  int32 top_row = 1;  // clamped
}

message SetLeftColResponse {
  int32 left_col = 1;  // clamped
}

message SortResponse {}
message AutoSizeResponse {}
message OutlineResponse {}

message MergeCellsResponse {
  CellRange merged = 1;
}

message UnmergeCellsResponse {
  int32 unmerged_count = 1;
}

message ResizeViewportResponse {
  int32 viewport_width  = 1;
  int32 viewport_height = 2;
}

message SetRedrawResponse {}
message RefreshResponse {}
message LoadDemoResponse {}

// ═══════════════════════════════════════════════════════════
// Render Session (bidirectional stream)
//
// The render session is the real-time render loop between host and engine.
// See plugin/src/lib.rs render_session().
//
// Typical CPU host flow:
//   1. Host opens RenderSession stream
//   2. Host sends ViewportState on resize
//   3. Host allocates RGBA buffer, sends BufferReady
//   4. Engine renders into buffer, returns FrameDone with dirty rect
//   5. Host blits dirty rect to screen
//   6. Host forwards pointer/key/scroll events as they occur
//   7. Engine returns EditRequest/DropdownRequest/CursorChange as needed
//
// GPU flow replaces step 3-4: host sends GpuSurfaceReady, engine
// renders via wgpu directly to the native surface.
//
// The session also carries EventDecision responses from the host
// (see file header, "Cancelable events via EventDecision") and
// CompareResponse answers for SORT_TYPE_CUSTOM (see CompareEvent).
// ═══════════════════════════════════════════════════════════

message RenderInput {
  int64 grid_id = 1;
  oneof input {
    ViewportState   viewport       = 2;
    PointerEvent    pointer        = 3;
    KeyEvent        key            = 4;
    BufferReady     buffer         = 5;
    ScrollEvent     scroll         = 6;
    EventDecision   event_decision = 7;
    ZoomEvent       zoom           = 8;
    GpuSurfaceReady gpu_surface    = 9;
    TerminalInputBytes terminal_input        = 10;
    TerminalCapabilities terminal_capabilities = 11;
    TerminalViewport terminal_viewport       = 12;
    TerminalCommand terminal_command         = 13;
    CompareResponse compare_response         = 14;
  }
}

// Host response to a CompareEvent emitted on EventStream during
// SORT_TYPE_CUSTOM. result: <0 = row1 before row2, 0 = equal,
// >0 = row1 after row2. request_id must echo the CompareEvent.
message CompareResponse {
  int64 request_id = 1;
  int32 result     = 2;
}

message ViewportState {
  float scroll_x = 1;
  float scroll_y = 2;
  int32 width    = 3;
  int32 height   = 4;
}

message PointerEvent {
  enum Type { TYPE_UNSPECIFIED = 0; DOWN = 1; UP = 2; MOVE = 3; }
  Type  type      = 1;
  float x         = 2;  // viewport-local X coordinate
  float y         = 3;  // viewport-local Y coordinate
  // Modifier bitmask: 0x01=Shift, 0x02=Ctrl, 0x04=Alt, 0x08=Meta.
  int32 modifier  = 4;
  // Button bitmask: 0x01=primary (left), 0x02=secondary (right).
  int32 button    = 5;
  bool  dbl_click = 6;
}

message ScrollEvent {
  float delta_x = 1;
  float delta_y = 2;
}

message ZoomEvent {
  enum Phase { ZOOM_PHASE_UNSPECIFIED = 0; ZOOM_BEGIN = 1; ZOOM_UPDATE = 2; ZOOM_END = 3; }
  Phase phase      = 1;
  float scale      = 2;
  float focal_x_px = 3;
  float focal_y_px = 4;
}

// Key codes use web/Windows virtual key values:
//   13=Enter, 27=Escape, 9=Tab, 32=Space, 8=Backspace, 46=Delete,
//   37/38/39/40=Arrow Left/Up/Right/Down, 33/34=PageUp/PageDown,
//   36/35=Home/End, 113=F2, 65=A, 67=C, 86=V, 88=X.
// KEY_PRESS carries the character for text input; KEY_DOWN/UP carry key_code.
message KeyEvent {
  enum Type { KEY_TYPE_UNSPECIFIED = 0; KEY_DOWN = 1; KEY_UP = 2; KEY_PRESS = 3; }
  Type   type      = 1;
  int32  key_code  = 2;
  // Modifier bitmask: 0x01=Shift, 0x02=Ctrl, 0x04=Alt, 0x08=Meta.
  int32  modifier  = 3;
  string character = 4;  // for KEY_PRESS: the typed character
}

// CPU rendering: host provides an RGBA buffer for the engine to render into.
// The engine writes pixels in RGBA byte order (R at offset+0, G+1, B+2, A+3).
// The plugin maps the buffer via `handle` as a raw pointer and calls the CPU
// renderer. See plugin/src/lib.rs BufferReady handling.
message BufferReady {
  int64 handle = 1;    // platform-specific shared memory handle (cast to *mut u8)
  int32 stride = 2;    // bytes per row (≥ width × 4)
  int32 width  = 3;    // buffer width in pixels
  int32 height = 4;    // buffer height in pixels
  int32 capacity = 5;  // total buffer size in bytes
}

enum TerminalColorLevel {
  TERMINAL_COLOR_LEVEL_AUTO      = 0;
  TERMINAL_COLOR_LEVEL_TRUECOLOR = 1;
  TERMINAL_COLOR_LEVEL_256       = 2;
  TERMINAL_COLOR_LEVEL_16        = 3;
}

message TerminalInputBytes {
  bytes data = 1;
}

message TerminalCapabilities {
  TerminalColorLevel color_level    = 1;
  bool               sgr_mouse      = 2;
  bool               focus_events   = 3;
  bool               bracketed_paste = 4;
}

message TerminalViewport {
  int32 origin_x   = 1;
  int32 origin_y   = 2;
  int32 width      = 3;
  int32 height     = 4;
  bool  fullscreen = 5;
}

message TerminalCommand {
  enum Kind {
    TERMINAL_COMMAND_NONE = 0;
    TERMINAL_COMMAND_EXIT = 1;
  }

  Kind kind = 1;
}

// GPU rendering: host provides a native surface for wgpu.
// handle=0 means surface destroyed. See plugin/src/lib.rs GpuSurfaceReady.
// If GPU initialization fails, the plugin falls back to CPU mode silently.
message GpuSurfaceReady {
  int64 surface_handle = 1;  // platform-specific native surface (0 = destroyed)
  int32 width          = 2;  // surface width in pixels
  int32 height         = 3;  // surface height in pixels
}

// Response to a cancelable GridEvent. Sent on the RenderSession stream.
//
// The engine waits up to 250 ms for this message (DECISION_TIMEOUT in
// plugin/src/lib.rs). If no decision arrives, the event auto-proceeds
// with cancel=false. Expired actions are resolved at the start of each
// render_session loop iteration.
//
// Cancelable events: BeforeEdit, BeforeDropdownOpen, CellEditValidate, BeforeSort,
// BeforeNodeToggle, BeforeScroll, BeforeUserResize, BeforeMoveColumn,
// BeforeMoveRow, BeforeMouseDown. Print-only BeforePageBreak is emitted
// during synchronous rendering and is informational in this API.
message EventDecision {
  int64 grid_id  = 1;
  int64 event_id = 2;  // must match the event_id from GridEvent
  bool  cancel   = 3;  // true = veto the action, false = allow
}

// Immediate render-coupled output from the engine.
// These are NOT the same as semantic GridEvent messages — they exist so
// the host can react immediately to render-time UI needs (cursor shape,
// edit overlay position, selection feedback, frame completion).
message RenderOutput {
  // true if pixels were actually painted this frame.
  // false if grid was clean (no changes). Hosts can skip compositing
  // when rendered=false.
  bool rendered = 1;
  oneof event {
    FrameDone       frame_done       = 2;
    SelectionUpdate selection        = 3;
    CursorChange    cursor           = 4;
    EditRequest     edit_request     = 5;
    DropdownRequest dropdown_request = 6;
    TooltipRequest  tooltip_request  = 7;
    GpuFrameDone    gpu_frame_done   = 8;
  }
}

// CPU frame completion. The dirty rect tells the host which region
// of the RGBA buffer was modified — the host only needs to blit this
// rectangle to screen, not the full buffer.
message FrameDone {
  int64 handle  = 1;  // echoed from BufferReady.handle
  int32 dirty_x = 2;  // dirty region origin X (pixels)
  int32 dirty_y = 3;  // dirty region origin Y (pixels)
  int32 dirty_w = 4;  // dirty region width (0 if nothing changed)
  int32 dirty_h = 5;  // dirty region height (0 if nothing changed)
  FrameMetrics metrics = 6;
  int32 bytes_written    = 7;
  int32 required_capacity = 8;  // if buffer was too small
  FrameKind frame_kind   = 9;
}

enum FrameKind {
  FRAME_KIND_FRAME         = 0;
  FRAME_KIND_SESSION_START = 1;
  FRAME_KIND_SESSION_END   = 2;
}

message GpuFrameDone {
  int32 dirty_x = 1;
  int32 dirty_y = 2;
  int32 dirty_w = 3;
  int32 dirty_h = 4;
  FrameMetrics metrics = 5;
}

message FrameMetrics {
  float frame_time_ms = 1;          // total frame render time
  float fps = 2;                    // smoothed FPS (exponential moving average)
  repeated float layer_times_us = 3;   // per-layer microseconds (28 entries if layer_profiling on)
  // Cell counts by zone: [scrollable, sticky, pinned, fixed].
  repeated uint32 zone_cell_counts = 4;
  int32 instance_count = 5;         // GPU draw calls or CPU region count
}

message SelectionUpdate {
  int32              active_row = 1;
  int32              active_col = 2;
  repeated CellRange ranges     = 3;
}

message CursorChange {
  enum CursorType {
    DEFAULT    = 0;
    RESIZE_COL = 1;
    RESIZE_ROW = 2;
    MOVE_COL   = 3;
    TEXT       = 4;
    HAND       = 5;
  }
  CursorType cursor = 1;
}

// Emitted on RenderOutput when the engine wants the host to show an
// edit overlay. The host should position a native text input at (x,y)
// with the given dimensions and pre-fill it with current_value.
// See plugin/src/lib.rs build_edit_request().
message EditRequest {
  int32      row           = 1;
  int32      col           = 2;
  float      x             = 3;   // viewport-local cell rect X
  float      y             = 4;   // viewport-local cell rect Y
  float      width         = 5;   // cell rect width
  float      height        = 6;   // cell rect height
  string     current_value = 7;   // text to pre-fill
  string     edit_mask     = 8;   // format mask, e.g. "(999) 999-9999"
  int32      max_length    = 9;   // 0 = unlimited
  int32      sel_start     = 10;  // text selection start (caret position)
  int32      sel_length    = 11;  // text selection length
  // ENTER (0): Enter commits and moves cursor. Character keys replace content.
  // EDIT (1):  F2 mode. Caret at end. Escape cancels.
  EditUiMode ui_mode       = 12;
}

message DropdownRequest {
  int32           row      = 1;
  int32           col      = 2;
  float           x        = 3;
  float           y        = 4;
  float           width    = 5;
  float           height   = 6;
  repeated string items    = 7;
  int32           selected = 8;
  // True if free-form text entry is allowed.
  bool            editable = 9;
}

message TooltipRequest {
  float  x    = 1;
  float  y    = 2;
  string text = 3;
}

// ═══════════════════════════════════════════════════════════
// Event Stream
//
// Semantic grid events delivered via EventStream(). The engine
// maintains a FIFO EventQueue (VecDeque<QueuedGridEvent>). The
// plugin drains it on push: every enqueue, destroy, and stream
// cancel wakes a per-grid condvar, so delivery is sub-millisecond
// and idle streams consume no CPU.
//
// event_id = 0: informational, cannot be canceled.
// event_id > 0: cancelable — host must send EventDecision on
//               RenderSession within 250 ms or the event auto-proceeds.
//
// `cancel` fields were removed from event messages. Use EventDecision
// on the RenderSession to cancel cancelable events.
// ═══════════════════════════════════════════════════════════

message GridEvent {
  int64 grid_id  = 1;
  // 0 = non-cancelable (informational only).
  // Non-zero = cancelable — send EventDecision with this ID to allow/veto.
  int64 event_id = 100;
  oneof event {
    // Navigation
    CellFocusChangingEvent  cell_focus_changing  = 2;
    CellFocusChangedEvent   cell_focus_changed   = 3;
    SelectionChangingEvent  selection_changing    = 4;
    SelectionChangedEvent   selection_changed     = 5;
    EnterCellEvent          enter_cell            = 6;
    LeaveCellEvent          leave_cell            = 7;
    // Editing
    BeforeEditEvent         before_edit           = 8;
    StartEditEvent          start_edit            = 9;
    AfterEditEvent          after_edit            = 10;
    CellEditValidateEvent   cell_edit_validate    = 11;
    CellEditChangeEvent     cell_edit_change      = 12;
    KeyDownEditEvent        key_down_edit         = 14;
    KeyPressEditEvent       key_press_edit        = 15;
    KeyUpEditEvent          key_up_edit           = 16;
    CellEditConfigureStyleEvent  cell_edit_configure_style  = 17;
    CellEditConfigureWindowEvent cell_edit_configure_window = 18;
    DropdownClosedEvent     dropdown_closed       = 19;
    DropdownOpenedEvent     dropdown_opened       = 20;
    // Data
    CellChangedEvent        cell_changed          = 21;
    RowStatusChangeEvent    row_status_change     = 22;
    // Sort
    BeforeSortEvent         before_sort           = 23;
    AfterSortEvent          after_sort            = 24;
    CompareEvent            compare               = 25;
    // Outline
    BeforeNodeToggleEvent   before_node_toggle    = 26;
    AfterNodeToggleEvent    after_node_toggle     = 27;
    // Scroll
    BeforeScrollEvent       before_scroll         = 28;
    AfterScrollEvent        after_scroll          = 29;
    ScrollTooltipEvent      scroll_tooltip        = 30;
    // Resize & Freeze
    BeforeUserResizeEvent   before_user_resize    = 31;
    AfterUserResizeEvent    after_user_resize     = 32;
    AfterUserFreezeEvent    after_user_freeze     = 33;
    // Column/Row move
    BeforeMoveColumnEvent   before_move_column    = 34;
    AfterMoveColumnEvent    after_move_column     = 35;
    BeforeMoveRowEvent      before_move_row       = 36;
    AfterMoveRowEvent       after_move_row        = 37;
    // Mouse
    BeforeMouseDownEvent    before_mouse_down     = 38;
    MouseDownEvent          mouse_down            = 39;
    MouseUpEvent            mouse_up              = 40;
    MouseMoveEvent          mouse_move            = 41;
    ClickEvent              click                 = 42;
    DblClickEvent           dbl_click             = 43;
    // Keyboard
    KeyDownEvent            key_down              = 44;
    KeyPressEvent           key_press             = 45;
    KeyUpEvent              key_up                = 46;
    // Drawing
    CustomRenderCellEvent   custom_render_cell    = 47;
    // Drag & Drop
    DragStartEvent          drag_start            = 48;
    DragOverEvent           drag_over             = 49;
    DragDropEvent           drag_drop             = 50;
    DragCompleteEvent       drag_complete         = 51;
    // Search
    TypeAheadStartedEvent   type_ahead_started    = 52;
    TypeAheadEndedEvent     type_ahead_ended      = 53;
    // Data refresh
    DataRefreshingEvent     data_refreshing       = 54;
    DataRefreshedEvent      data_refreshed        = 55;
    FilterDataEvent         filter_data           = 56;
    // Error
    ErrorEvent              error                 = 57;
    // Print
    BeforePageBreakEvent    before_page_break     = 58;
    StartPageEvent          start_page            = 59;
    GetHeaderRowEvent       get_header_row        = 60;
    // Pull to refresh
    PullToRefreshTriggeredEvent pull_to_refresh_triggered = 61;
    PullToRefreshCanceledEvent pull_to_refresh_canceled = 62;
    BeforeDropdownOpenEvent before_dropdown_open = 63;
  }
}

// ── Navigation Events ──
message CellFocusChangingEvent {  // cancelable
  int32 old_row = 1; int32 old_col = 2;
  int32 new_row = 3; int32 new_col = 4;
}
message CellFocusChangedEvent {  // informational
  int32 old_row = 1; int32 old_col = 2;
  int32 new_row = 3; int32 new_col = 4;
}
message SelectionChangingEvent {  // cancelable
  repeated CellRange old_ranges = 1;
  repeated CellRange new_ranges = 2;
  int32              active_row = 3;
  int32              active_col = 4;
}
message SelectionChangedEvent {  // informational
  repeated CellRange old_ranges = 1;
  repeated CellRange new_ranges = 2;
  int32              active_row = 3;
  int32              active_col = 4;
}
message EnterCellEvent { int32 row = 1; int32 col = 2; }
message LeaveCellEvent { int32 row = 1; int32 col = 2; }

// ── Edit Events ──
message BeforeEditEvent   { int32 row = 1; int32 col = 2; }  // cancelable
message StartEditEvent    { int32 row = 1; int32 col = 2; }  // informational
message AfterEditEvent    { int32 row = 1; int32 col = 2; string old_text = 3; string new_text = 4; }  // informational; old_text==new_text on cancel
message CellEditValidateEvent { int32 row = 1; int32 col = 2; string edit_text = 3; }  // cancelable: cancel keeps editor open
message CellEditChangeEvent   { string text = 1; }  // fired on every character insert
message KeyDownEditEvent  { int32 key_code = 1; int32 modifier = 2; }
message KeyPressEditEvent { int32 key_ascii = 1; }
message KeyUpEditEvent    { int32 key_code = 1; int32 modifier = 2; }
message CellEditConfigureStyleEvent  { int32 row = 1; int32 col = 2; }
message CellEditConfigureWindowEvent { int32 row = 1; int32 col = 2; }
message BeforeDropdownOpenEvent {
  int32 row = 1;
  int32 col = 2;
  // Viewport-local cell rect. Hosts can use this when canceling the
  // engine list and opening their own positioned popup.
  float x = 3;
  float y = 4;
  float width = 5;
  float height = 6;
  Dropdown dropdown = 7;
  string current_value = 8;
  int32 selected_index = 9;
}  // cancelable
message DropdownClosedEvent {}
message DropdownOpenedEvent {}

// ── Data Events ──
message CellChangedEvent     { int32 row = 1; int32 col = 2; string old_text = 3; string new_text = 4; }
message RowStatusChangeEvent { int32 row = 1; RowStatus status = 2; }

// ── Sort Events ──
message BeforeSortEvent { int32 col = 1; }  // cancelable
message AfterSortEvent  { int32 col = 1; }  // informational
// Synchronous request for SORT_TYPE_CUSTOM. The host must reply on
// the RenderSession with a CompareResponse echoing request_id.
// The engine waits up to 250 ms; on timeout the comparison falls
// back to the generic/date path used by SORT_TYPE_AUTO.
message CompareEvent    { int64 request_id = 1; int32 row1 = 2; int32 row2 = 3; int32 col = 4; }

// ── Outline Events ──
message BeforeNodeToggleEvent { int32 row = 1; bool collapse = 2; }  // cancelable
message AfterNodeToggleEvent  { int32 row = 1; bool collapse = 2; }  // informational

// ── Scroll Events ──
message BeforeScrollEvent {
  int32 old_top_row  = 1; int32 old_left_col = 2;
  int32 new_top_row  = 3; int32 new_left_col = 4;
}  // cancelable
message AfterScrollEvent {
  int32 old_top_row  = 1; int32 old_left_col = 2;
  int32 new_top_row  = 3; int32 new_left_col = 4;
}
message ScrollTooltipEvent { string text = 1; }

// ── Resize & Freeze Events ──
message BeforeUserResizeEvent { int32 row = 1; int32 col = 2; }  // cancelable
message AfterUserResizeEvent  { int32 row = 1; int32 col = 2; }
message AfterUserFreezeEvent  { int32 frozen_rows = 1; int32 frozen_cols = 2; }

// ── Move Events ──
message BeforeMoveColumnEvent { int32 col = 1; int32 new_position = 2; }  // cancelable
message AfterMoveColumnEvent  { int32 col = 1; int32 old_position = 2; }
message BeforeMoveRowEvent    { int32 row = 1; int32 new_position = 2; }  // cancelable
message AfterMoveRowEvent     { int32 row = 1; int32 old_position = 2; }

// ── Mouse Events ──
// button: 0x01=primary, 0x02=secondary.
// modifier: 0x01=Shift, 0x02=Ctrl, 0x04=Alt, 0x08=Meta.
message BeforeMouseDownEvent { int32 row = 1; int32 col = 2; }  // cancelable
message MouseDownEvent  { int32 button = 1; int32 modifier = 2; float x = 3; float y = 4; }
message MouseUpEvent    { int32 button = 1; int32 modifier = 2; float x = 3; float y = 4; }
message MouseMoveEvent  { int32 button = 1; int32 modifier = 2; float x = 3; float y = 4; }
message ClickEvent      { int32 row = 1; int32 col = 2; CellHitArea hit_area = 3; CellInteraction interaction = 4; }
message DblClickEvent   { int32 row = 1; int32 col = 2; }

// ── Keyboard Events ──
// modifier: 0x01=Shift, 0x02=Ctrl, 0x04=Alt, 0x08=Meta.
message KeyDownEvent  { int32 key_code = 1; int32 modifier = 2; }
message KeyPressEvent { int32 key_ascii = 1; }
message KeyUpEvent    { int32 key_code = 1; int32 modifier = 2; }

// ── Draw Events ──
message CustomRenderCellEvent {
  int32     row    = 1;
  int32     col    = 2;
  float     x      = 3;
  float     y      = 4;
  float     width  = 5;
  float     height = 6;
  string    text   = 7;
  CellStyle style  = 8;
  bool      done   = 9;
}

// ── Drag & Drop Events ──
message DragStartEvent    { int32 row = 1; int32 col = 2; }
message DragOverEvent     { int32 row = 1; int32 col = 2; float x = 3; float y = 4; }
message DragDropEvent     { int32 row = 1; int32 col = 2; }
message DragCompleteEvent { bool success = 1; }

// ── Search Events ──
message TypeAheadStartedEvent { int32 col = 1; string text = 2; }
message TypeAheadEndedEvent   {}

// ── Data Refresh Events ──
message DataRefreshingEvent {}
message DataRefreshedEvent  {}
message FilterDataEvent { int32 row = 1; int32 col = 2; string text = 3; }

// ── Pull to Refresh Events ──
message PullToRefreshTriggeredEvent {}
message PullToRefreshCanceledEvent {}

// ── Error Events ──
message ErrorEvent { int32 code = 1; string message = 2; }

// ── Print Events ──
message BeforePageBreakEvent { int32 row = 1; }  // print notification
message StartPageEvent       { int32 page = 1; }
message GetHeaderRowEvent    { int32 page = 1; }

// ═══════════════════════════════════════════════════════════
// Service
//
// The protobuf service exposed by the native plugin over Synurang FFI
// (or directly via wasm-bindgen for web hosts).
//
// Typical host lifecycle:
//   1. Create()          — allocate a grid with initial viewport and config
//   2. Configure()       — apply additional settings (partial-update)
//   3. DefineColumns()   — set column properties
//   4. UpdateCells() or LoadData() — populate data
//   5. RenderSession()   — open bidirectional stream for real-time rendering
//   6. EventStream()     — open server stream for semantic events
//   7. … interact …
//   8. Destroy()         — release the grid
//
// All RPCs except RenderSession/EventStream are unary request-response.
// Mutator responses carry operation summaries; use GetConfig/GetSchema/
// GetSelection for full snapshots and EventStream for async notifications.
// ═══════════════════════════════════════════════════════════

service VolvoxGridService {
  // ── Lifecycle ──
  rpc Create(CreateRequest)               returns (CreateResponse);
  rpc Destroy(DestroyRequest)             returns (DestroyResponse);

  // ── Configuration ──
  rpc Configure(ConfigureRequest)         returns (ConfigureResponse);
  rpc GetConfig(GetConfigRequest)         returns (GridConfig);
  rpc LoadFontData(LoadFontDataRequest)   returns (LoadFontDataResponse);

  // ── Structure ──
  rpc DefineColumns(DefineColumnsRequest) returns (DefineColumnsResponse);
  rpc GetSchema(GetSchemaRequest)         returns (SchemaResponse);
  rpc DefineRows(DefineRowsRequest)       returns (DefineRowsResponse);
  rpc InsertRows(InsertRowsRequest)       returns (InsertRowsResponse);
  rpc RemoveRows(RemoveRowsRequest)       returns (RemoveRowsResponse);
  rpc MoveColumn(MoveColumnRequest)       returns (MoveColumnResponse);
  rpc MoveRow(MoveRowRequest)             returns (MoveRowResponse);

  // ── Data ──
  rpc UpdateCells(UpdateCellsRequest)     returns (WriteResult);
  rpc GetCells(GetCellsRequest)           returns (CellsResponse);
  rpc LoadTable(LoadTableRequest)         returns (WriteResult);
  rpc LoadData(LoadDataRequest)           returns (LoadDataResult);
  rpc AppendData(AppendDataRequest)       returns (LoadDataResult);
  rpc Clear(ClearRequest)                 returns (ClearResponse);

  // ── Selection ──
  rpc Select(SelectRequest)               returns (SelectResponse);
  rpc GetSelection(GetSelectionRequest)   returns (SelectionState);
  rpc ShowCell(ShowCellRequest)           returns (ShowCellResponse);
  rpc SetTopRow(SetRowRequest)            returns (SetTopRowResponse);
  rpc SetLeftCol(SetColRequest)           returns (SetLeftColResponse);

  // ── Editing ──
  rpc Edit(EditCommand)                   returns (EditState);

  // ── Actions ──
  rpc Sort(SortRequest)                   returns (SortResponse);
  rpc Subtotal(SubtotalRequest)           returns (SubtotalResult);
  rpc AutoSize(AutoSizeRequest)           returns (AutoSizeResponse);
  rpc Outline(OutlineRequest)             returns (OutlineResponse);
  rpc GetNode(GetNodeRequest)             returns (NodeInfo);
  rpc Find(FindRequest)                   returns (FindResponse);
  rpc Aggregate(AggregateRequest)         returns (AggregateResponse);
  rpc GetMergedRange(GetMergedRangeRequest) returns (CellRange);
  rpc MergeCells(MergeCellsRequest)       returns (MergeCellsResponse);
  rpc UnmergeCells(UnmergeCellsRequest)   returns (UnmergeCellsResponse);
  rpc GetMergedRegions(GetMergedRegionsRequest) returns (MergedRegionsResponse);
  rpc GetMemoryUsage(GetMemoryUsageRequest) returns (MemoryUsageResponse);

  // ── Clipboard ──
  rpc Clipboard(ClipboardCommand)         returns (ClipboardResponse);

  // ── Export / Print / Archive ──
  rpc Export(ExportRequest)               returns (ExportResponse);
  rpc Print(PrintRequest)                 returns (PrintResponse);
  rpc Archive(ArchiveRequest)             returns (ArchiveResponse);

  // ── Render Control ──
  rpc ResizeViewport(ResizeViewportRequest) returns (ResizeViewportResponse);
  rpc SetRedraw(SetRedrawRequest)         returns (SetRedrawResponse);
  rpc Refresh(RefreshRequest)             returns (RefreshResponse);

  // ── Demo ──
  rpc LoadDemo(LoadDemoRequest)           returns (LoadDemoResponse);
  rpc GetDemoData(GetDemoDataRequest)     returns (GetDemoDataResponse);

  // ── Streaming ──
  // Bidirectional: host sends input (pointer, key, buffer, event decisions),
  // engine returns render-coupled output (frames, edit/dropdown requests).
  rpc RenderSession(stream RenderInput)   returns (stream RenderOutput);
  // Server-streaming: engine pushes semantic grid events.
  // Delivery is fully event-driven — every enqueue/destroy/cancel
  // wakes a per-grid condvar; no polling, no idle CPU cost.
  rpc EventStream(EventStreamRequest)     returns (stream GridEvent);
}
