// ── Scrolling ──

enum ScrollBarsMode {
  SCROLLBAR_NONE       = 0;
  SCROLLBAR_HORIZONTAL = 1;
  SCROLLBAR_VERTICAL   = 2;
  SCROLLBAR_BOTH       = 3;
}

enum ScrollBarMode {
  SCROLLBAR_MODE_AUTO   = 0;
  SCROLLBAR_MODE_ALWAYS = 1;
  SCROLLBAR_MODE_NEVER  = 2;
}

enum ScrollBarAppearance {
  SCROLLBAR_APPEARANCE_CLASSIC = 0;
  SCROLLBAR_APPEARANCE_FLAT    = 1;
  SCROLLBAR_APPEARANCE_MODERN  = 2;
  SCROLLBAR_APPEARANCE_OVERLAY = 3;
}

message ScrollBarColors {
  optional uint32 thumb        = 1;
  optional uint32 thumb_hover  = 2;
  optional uint32 thumb_active = 3;
  optional uint32 track        = 4;
  optional uint32 arrow        = 5;
  optional uint32 border       = 6;
}

message ScrollBarConfig {
  optional ScrollBarMode       show_h           = 1;
  optional ScrollBarMode       show_v           = 2;
  optional ScrollBarAppearance appearance       = 3;
  optional int32               size             = 4;
  optional int32               min_thumb        = 5;
  optional int32               corner_radius    = 6;
  ScrollBarColors              colors           = 7;
  optional int32               fade_delay_ms    = 8;
  optional int32               fade_duration_ms = 9;
  optional int32               margin           = 10;
}

// ── Layout ──

enum PinPosition {
  PIN_NONE   = 0;
